<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Wandering Art — Pixel Entity</title>
  <style>
    :root{
      --bg:#020207;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
    body{
      display:grid;
      place-items:center;
      color:white;
      -webkit-font-smoothing:none;
      font-smooth:never;
      touch-action:none;
      cursor:none;
    }
    #stage{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 48%, rgba(11,255,212,.05), transparent 34%),
        radial-gradient(circle at 48% 50%, rgba(14,80,100,.10), transparent 48%),
        #020207;
    }
    canvas{
      display:block;
      width:min(100vw, calc(100vh * 1.384615));
      height:min(100vh, calc(100vw / 1.384615));
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter:
        contrast(1.08)
        saturate(1.12)
        drop-shadow(0 0 22px rgba(0,255,214,.16))
        drop-shadow(0 0 56px rgba(35,255,87,.08));
    }
    #stage::before{
      content:"";
      position:absolute;
      inset:-20%;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.020) 50%, rgba(0,0,0,.035) 50%),
        radial-gradient(circle at 50% 45%, transparent 0 42%, rgba(0,0,0,.42) 79%);
      background-size:100% 4px, 100% 100%;
      mix-blend-mode:screen;
      opacity:.62;
    }
    #stage::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(255,0,170,.028), transparent 18%, transparent 82%, rgba(0,255,180,.035)),
        radial-gradient(circle at center, transparent 0 62%, rgba(0,0,0,.72) 100%);
    }
    @media (prefers-reduced-motion: reduce){
      canvas{filter:contrast(1.06) saturate(1.08) drop-shadow(0 0 18px rgba(0,255,214,.12));}
    }
  </style>
</head>
<body>
  <main id="stage" aria-label="Wandering Art — autonomous pixel entity">
    <canvas id="entity" width="360" height="260"></canvas>
  </main>

  <script>
  (() => {
    'use strict';

    const STATIC_PREVIEW = new URLSearchParams(location.search).has('static');
    const canvas = document.getElementById('entity');
    const ctx = canvas.getContext('2d', { alpha: false });
    const W = canvas.width;
    const H = canvas.height;
    ctx.imageSmoothingEnabled = false;

    const C = {
      bg: '#020207',
      black: '#000006',
      ink: '#01020a',
      cyan0: '#063941',
      cyan1: '#087f89',
      cyan2: '#0bb8bd',
      cyan3: '#13e1df',
      cyan4: '#69fff3',
      hair0: '#57dccd',
      hair1: '#a8fff2',
      white: '#f7fff8',
      green0: '#0a5f24',
      green1: '#22e64f',
      green2: '#a2ff75',
      magenta: '#ff2bd6',
      red: '#ff3159',
      amber: '#ffd35d'
    };

    const moods = [
      { name:'neutral',     dwell:[5200, 9200], eye:0.84, smile:0.05, open:0.04, brow:0.05, anger:0.00, sad:0.00, blush:0.00, tear:0.00, gazeX:0.00, gazeY:0.00, tilt:0.00, accent:0.00 },
      { name:'interested',  dwell:[4200, 7600], eye:0.92, smile:0.12, open:0.06, brow:0.32, anger:0.00, sad:0.00, blush:0.05, tear:0.00, gazeX:0.55, gazeY:-0.15, tilt:-0.045, accent:0.05 },
      { name:'surprised',   dwell:[2100, 3900], eye:1.24, smile:0.00, open:0.73, brow:0.68, anger:0.00, sad:0.02, blush:0.00, tear:0.00, gazeX:0.00, gazeY:-0.10, tilt:0.018, accent:0.20 },
      { name:'happy',       dwell:[3600, 7000], eye:0.76, smile:0.67, open:0.14, brow:0.12, anger:0.00, sad:0.00, blush:0.28, tear:0.00, gazeX:-0.12, gazeY:0.00, tilt:0.030, accent:0.14 },
      { name:'laugh',       dwell:[2400, 4900], eye:0.56, smile:0.94, open:0.86, brow:0.18, anger:0.00, sad:0.00, blush:0.44, tear:0.00, gazeX:0.08, gazeY:-0.10, tilt:0.045, accent:0.18 },
      { name:'cry',         dwell:[3000, 6200], eye:0.64, smile:-0.56, open:0.27, brow:0.20, anger:0.00, sad:0.82, blush:0.18, tear:1.00, gazeX:-0.30, gazeY:0.44, tilt:-0.025, accent:0.00 },
      { name:'angry',       dwell:[2400, 5200], eye:0.62, smile:-0.22, open:0.05, brow:-0.08, anger:0.98, sad:0.00, blush:0.00, tear:0.00, gazeX:0.00, gazeY:-0.18, tilt:0.015, accent:0.78 },
      { name:'shy',         dwell:[3500, 7200], eye:0.59, smile:0.20, open:0.05, brow:0.14, anger:0.00, sad:0.15, blush:0.92, tear:0.00, gazeX:-0.78, gazeY:0.62, tilt:-0.060, accent:0.08 }
    ];

    let current = moods[0];
    let previous = moods[0];
    let target = moods[1];
    let transitionStart = performance.now();
    let transitionMs = 1700;
    let nextMoodAt = performance.now() + 5200;

    let blinkAt = performance.now() + rnd(1200, 4200);
    let blinkUntil = 0;
    let blinkStrength = 0;

    let gaze = {x:0, y:0, tx:0, ty:0};
    let nextGazeAt = performance.now() + 1200;

    let glitchUntil = 0;
    let glitchAt = performance.now() + rnd(3600, 11000);

    const dust = Array.from({ length: 132 }, (_, i) => ({
      x: Math.floor(hash(i * 18.31) * W),
      y: Math.floor(hash(i * 91.72) * H),
      a: .18 + hash(i * 5.27) * .62,
      s: hash(i * 12.13) > .84 ? 2 : 1,
      c: hash(i * 33.41) > .72 ? C.green1 : C.cyan4
    }));

    function rnd(min, max){ return min + Math.random() * (max - min); }
    function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
    function lerp(a, b, t){ return a + (b - a) * t; }
    function ease(t){ return t*t*(3-2*t); }
    function hash(n){ return (Math.sin(n * 127.1 + 311.7) * 43758.5453) % 1 < 0 ? ((Math.sin(n * 127.1 + 311.7) * 43758.5453) % 1) + 1 : (Math.sin(n * 127.1 + 311.7) * 43758.5453) % 1; }

    function mixMood(a, b, k){
      const o = { name: b.name };
      for (const key of ['eye','smile','open','brow','anger','sad','blush','tear','gazeX','gazeY','tilt','accent']) {
        o[key] = lerp(a[key], b[key], k);
      }
      return o;
    }

    function chooseMood(now){
      previous = current;
      let options = moods.filter(m => m.name !== current.name);
      if (current.name === 'surprised') options = options.filter(m => m.name !== 'surprised');
      target = options[Math.floor(Math.random() * options.length)];
      transitionStart = now;
      transitionMs = rnd(1050, 2200);
      const dwell = target.dwell;
      nextMoodAt = now + transitionMs + rnd(dwell[0], dwell[1]);
    }

    function updateAutonomy(now){
      if (now > nextMoodAt) chooseMood(now);
      const k = ease(clamp((now - transitionStart) / transitionMs, 0, 1));
      current = mixMood(previous, target, k);

      if (now > blinkAt) {
        blinkUntil = now + rnd(95, 170);
        blinkAt = now + rnd(1600, 5400);
        if (Math.random() > .84) blinkAt += 180;
      }
      const b = clamp(1 - Math.abs(now - (blinkUntil - 80)) / 82, 0, 1);
      blinkStrength = Math.max(blinkStrength * .68, b);

      if (now > nextGazeAt) {
        gaze.tx = clamp(current.gazeX + rnd(-.45, .45), -1.3, 1.3);
        gaze.ty = clamp(current.gazeY + rnd(-.30, .30), -.75, .95);
        nextGazeAt = now + rnd(900, 2800);
      }
      gaze.x = lerp(gaze.x, gaze.tx, .022);
      gaze.y = lerp(gaze.y, gaze.ty, .022);

      if (now > glitchAt) {
        glitchUntil = now + rnd(75, 210);
        glitchAt = now + rnd(4200, 14500);
      }
    }

    function rect(x,y,w,h,color){
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
    }

    function poly(points, color){
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(Math.round(points[0][0]), Math.round(points[0][1]));
      for (let i=1;i<points.length;i++) ctx.lineTo(Math.round(points[i][0]), Math.round(points[i][1]));
      ctx.closePath();
      ctx.fill();
    }

    function path(color, commands){
      ctx.fillStyle = color;
      ctx.beginPath();
      for (const c of commands) {
        if (c[0] === 'M') ctx.moveTo(c[1], c[2]);
        if (c[0] === 'L') ctx.lineTo(c[1], c[2]);
        if (c[0] === 'Q') ctx.quadraticCurveTo(c[1], c[2], c[3], c[4]);
        if (c[0] === 'C') ctx.bezierCurveTo(c[1], c[2], c[3], c[4], c[5], c[6]);
      }
      ctx.closePath();
      ctx.fill();
    }

    function ellipse(x,y,rx,ry,color){
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(Math.round(x), Math.round(y), rx, ry, 0, 0, Math.PI*2);
      ctx.fill();
    }

    function line(x1,y1,x2,y2,width,color){
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'butt';
      ctx.lineJoin = 'miter';
      ctx.beginPath();
      ctx.moveTo(Math.round(x1),Math.round(y1));
      ctx.lineTo(Math.round(x2),Math.round(y2));
      ctx.stroke();
    }

    function dither(x,y,w,h,color,step=4,density=.48,phase=0){
      ctx.fillStyle = color;
      for (let yy=Math.round(y); yy<y+h; yy+=step) {
        for (let xx=Math.round(x); xx<x+w; xx+=step) {
          const n = hash(xx * 2.77 + yy * 8.13 + phase);
          if (((xx+yy)/step | 0) % 2 === 0 && n < density) ctx.fillRect(xx, yy, Math.max(1, step-2), Math.max(1, step-2));
        }
      }
    }

    function drawBackground(now){
      ctx.fillStyle = C.bg;
      ctx.fillRect(0,0,W,H);

      const t = now * .001;
      for (let i=0;i<dust.length;i++) {
        const p = dust[i];
        if (p.x > 98 && p.x < 262 && p.y > 34 && p.y < 228) continue;
        const flicker = .45 + .55 * Math.sin(t * (1.1 + i * .002) + i * 4.1);
        if (flicker * p.a < .32) continue;
        ctx.globalAlpha = clamp(flicker * p.a, .08, .82);
        rect(p.x, p.y, p.s, p.s, p.c);
      }
      ctx.globalAlpha = 1;

      for (let y=0;y<H;y+=7) {
        if (hash(y + Math.floor(t * 2)) > .86) {
          ctx.globalAlpha = .035;
          rect(0, y, W, 1, C.cyan4);
          ctx.globalAlpha = 1;
        }
      }
    }

    function drawHairBack(t){
      path(C.black, [
        ['M',79,235],['C',75,182,82,123,96,78],['C',110,31,143,15,184,17],
        ['C',244,20,282,63,286,132],['C',290,184,268,222,248,250],
        ['L',78,250]
      ]);
      path(C.hair0, [
        ['M',86,238],['C',87,181,89,124,104,76],['C',121,30,151,21,185,24],
        ['C',236,28,271,66,275,130],['C',279,178,260,213,239,242],
        ['L',86,242]
      ]);
      dither(238, 66, 45, 132, C.black, 3, .36, 8);
      dither(92, 68, 38, 128, C.cyan4, 4, .24, 18);
      line(270,73,283,132,3,C.black);
      line(96,104,84,169,4,C.black);
    }

    function drawShouldersAndNeck(p, t){
      path(C.black, [
        ['M',115,255],['C',126,214,137,198,152,191],['C',167,186,194,187,210,194],
        ['C',230,202,244,219,254,255],['L',115,255]
      ]);
      path(C.cyan2, [
        ['M',126,255],['C',135,219,146,203,159,198],['C',174,194,194,195,206,201],
        ['C',223,209,235,226,244,255],['L',126,255]
      ]);
      path(C.cyan0, [
        ['M',154,196],['C',166,207,181,211,199,201],['L',205,255],['L',148,255]
      ]);
      dither(133,219,101,34,C.cyan4,4,.20, t*3);
      line(151,198,143,244,3,C.black);
      line(210,201,226,246,3,C.black);
      rect(162,206,29,5,C.black);
      rect(166,205,23,3,C.cyan4);
    }

    function drawFaceBase(p, t){
      path(C.black, [
        ['M',117,120],['C',115,72,141,39,183,38],['C',228,39,253,73,253,125],
        ['C',253,178,221,207,181,209],['C',139,207,116,174,117,120]
      ]);
      path(C.cyan3, [
        ['M',125,120],['C',123,78,145,47,184,47],['C',223,48,245,78,245,126],
        ['C',244,172,217,199,181,201],['C',145,199,124,169,125,120]
      ]);
      path(C.cyan2, [
        ['M',207,49],['C',238,66,249,97,244,135],['C',240,173,221,196,183,201],
        ['C',222,166,223,101,207,49]
      ]);
      path(C.cyan1, [
        ['M',216,68],['C',239,85,247,123,238,157],['C',231,178,217,192,195,199],
        ['C',218,164,224,111,216,68]
      ]);
      dither(203,69,42,105,C.black,3,.30, t*2);
      dither(132,87,38,78,C.cyan4,4,.18, t);
      dither(179,50,48,33,C.cyan1,3,.17, 15);
      rect(202,190,16,5,C.black);
      rect(134,150,13,4,C.cyan4);
    }

    function drawHairFront(p, t){
      path(C.black, [
        ['M',89,230],['C',89,181,95,137,111,91],['C',124,54,139,29,170,18],
        ['C',158,54,143,83,131,110],['C',120,139,116,179,122,224],['L',89,230]
      ]);
      path(C.white, [
        ['M',96,230],['C',96,182,102,139,117,94],['C',130,58,143,37,164,27],
        ['C',153,60,139,86,128,114],['C',119,140,116,177,122,220],['L',96,230]
      ]);
      path(C.white, [
        ['M',120,47],['C',140,18,188,15,222,34],['C',194,35,169,46,151,71],['C',139,88,132,111,128,132],['C',116,98,111,68,120,47]
      ]);
      path(C.hair1, [
        ['M',204,29],['C',239,36,264,68,268,113],['C',260,87,246,67,225,53],['C',231,79,230,97,222,117],['C',218,80,213,52,204,29]
      ]);
      dither(105,77,33,121,C.cyan2,4,.20, t*4);
      dither(135,31,68,38,C.cyan4,4,.18, t*3);
      poly([[129,88],[141,83],[135,116],[124,128]], C.green1);
      rect(137,118,4,18,C.black);
      line(108,72,101,134,3,C.black);
      line(154,34,136,76,3,C.black);
      line(228,55,236,106,3,C.black);
    }

    function drawBrows(p){
      const base = 82 - p.brow * 8;
      const anger = p.anger;
      const sad = p.sad;
      const leftOuterY = base - anger*5 + sad*5;
      const leftInnerY = base + anger*11 - sad*8;
      const rightInnerY = base + anger*11 - sad*8;
      const rightOuterY = base - anger*5 + sad*5;
      line(122, leftOuterY, 163, leftInnerY, 5, C.black);
      line(197, rightInnerY, 239, rightOuterY, 5, C.black);
      if (p.anger > .2) {
        line(127, leftOuterY+5, 161, leftInnerY+6, 2, C.red);
        line(199, rightInnerY+6, 235, rightOuterY+5, 2, C.red);
      }
    }

    function eyeShape(cx, cy, w, h, color){
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(cx - w/2, cy);
      ctx.quadraticCurveTo(cx, cy - h, cx + w/2, cy);
      ctx.quadraticCurveTo(cx, cy + h*.92, cx - w/2, cy);
      ctx.fill();
    }

    function drawEye(cx, cy, side, p, t){
      const open = clamp(p.eye * (1 - blinkStrength * .93), .06, 1.34);
      const ew = 52 + p.brow * 2 + p.anger * -5;
      const eh = 16 * open;
      const irisX = cx + gaze.x * 4.8;
      const irisY = cy + gaze.y * 3.2;

      eyeShape(cx, cy, ew + 8, eh + 5, C.black);
      eyeShape(cx, cy, ew, eh, open < .11 ? C.black : C.white);

      if (open >= .11) {
        ellipse(irisX, irisY, 8.4, 8.8 * clamp(open, .35, 1.1), C.green1);
        ellipse(irisX + side*.5, irisY + .6, 4.1, 4.7 * clamp(open, .35, 1.0), C.black);
        rect(irisX - 3 + side, irisY - 5, 2, 2, C.green2);
        rect(irisX + 2 + side, irisY - 2, 2, 1, C.white);
        dither(cx - 21, cy + 5, 42, 8, C.cyan1, 3, .34, t);
      }

      if (open < .35) {
        line(cx - ew/2 + 4, cy, cx + ew/2 - 4, cy + (p.smile > .4 ? 2 : 0), 3, C.black);
      }

      rect(cx - ew/2 - 1, cy - eh - 4, 7, 2, C.black);
      rect(cx + ew/2 - 8, cy + eh + 1, 8, 2, C.black);
    }

    function drawNose(p){
      path(C.black, [
        ['M',180,124],['C',176,140,171,149,164,155],['L',181,158],['L',192,151],['C',185,143,184,134,180,124]
      ]);
      path(C.white, [
        ['M',181,127],['C',178,140,174,148,169,153],['L',180,154],['L',187,149],['C',184,142,184,135,181,127]
      ]);
      rect(161,158,10,3,C.black);
      rect(187,157,10,3,C.black);
      dither(188,133,23,28,C.cyan0,3,.32,11);
    }

    function drawMouth(p, t){
      const cx = 180;
      const y = 177;
      const smile = p.smile;
      const open = p.open;
      const w = 29 + Math.abs(smile) * 13 + open * 13;
      const h = 4 + open * 24;
      const corner = -smile * 7 + Math.max(0, -smile) * 9;

      if (open > .18) {
        path(C.black, [
          ['M',cx-w/2,y + corner*.18],
          ['Q',cx,y-8-smile*2,cx+w/2,y + corner*.18],
          ['Q',cx+w*.36,y+h,cx,y+h+3+Math.max(0,smile)*2],
          ['Q',cx-w*.36,y+h,cx-w/2,y + corner*.18]
        ]);
        if (open > .38) {
          path(C.white, [
            ['M',cx-w*.30,y-1],['Q',cx,y+3,cx+w*.31,y-1],['L',cx+w*.23,y+5],['Q',cx,y+7,cx-w*.25,y+5]
          ]);
        } else {
          line(cx-w*.32,y,cx+w*.28,y+1,2,C.white);
        }
        if (smile < -.2) line(cx-w*.38,y+2,cx+w*.38,y+2,2,C.magenta);
        else rect(cx - 10, y + h - 2, 20, 3, C.magenta);
      } else {
        const leftY = y + Math.max(0, -smile) * 7 - Math.max(0, smile) * 4;
        const midY = y + Math.max(0, -smile) * 2 + Math.max(0, smile) * 4;
        const rightY = y + Math.max(0, -smile) * 7 - Math.max(0, smile) * 4;
        ctx.strokeStyle = C.black;
        ctx.lineWidth = p.anger > .35 ? 4 : 3;
        ctx.beginPath();
        ctx.moveTo(cx-w/2, leftY);
        ctx.quadraticCurveTo(cx, midY, cx+w/2, rightY);
        ctx.stroke();
        if (p.anger > .4) line(cx-w/2+4,leftY+3,cx+w/2-3,rightY+3,1,C.red);
      }

      dither(cx - 28, y + 8, 56, 14, C.black, 3, .18, t * 2);
      rect(cx - 25, y - 10, 9, 3, C.cyan4);
      rect(cx + 15, y - 8, 10, 3, C.cyan1);
    }

    function drawEffects(p, t){
      if (p.blush > .05) {
        ctx.globalAlpha = p.blush * .58;
        dither(127,148,31,24,C.magenta,4,.42,t * 10);
        dither(205,146,31,24,C.magenta,4,.42,t * 10 + 22);
        ctx.globalAlpha = 1;
      }
      if (p.tear > .05) {
        const a = p.tear * (.65 + .35*Math.sin(t*.009));
        ctx.globalAlpha = a;
        rect(138,126,3,7,C.white);
        rect(139,133,4,8,C.cyan4);
        rect(140,142,3,5,C.green2);
        rect(142,149,2,2,C.white);
        ctx.globalAlpha = 1;
      }
      if (p.accent > .25) {
        ctx.globalAlpha = p.accent * .36;
        line(247,88,259,153,2,C.red);
        line(107,93,96,160,1,C.magenta);
        dither(215,66,43,97,C.red,5,.26,t);
        ctx.globalAlpha = 1;
      }
    }

    function drawEntity(now){
      const t = now * .001;
      const p = current;
      const floatX = Math.sin(t * .42) * 2.4 + Math.sin(t*.17) * 1.1;
      const floatY = Math.sin(t * .58) * 3.0 + Math.cos(t*.23) * 1.4;
      const breath = 1 + Math.sin(t * 1.08) * .006;
      const stillness = target.name === 'surprised' ? .38 : 1;
      const tilt = p.tilt + Math.sin(t*.33) * .012 * stillness;

      ctx.save();
      ctx.translate(W/2 + floatX, H/2 + floatY);
      ctx.rotate(tilt);
      ctx.scale(breath, 1 + (breath-1)*.35);
      ctx.translate(-W/2, -H/2);

      drawHairBack(t);
      drawShouldersAndNeck(p, t);
      drawFaceBase(p, t);
      drawHairFront(p, t);
      drawBrows(p);
      drawEye(146, 107, -1, p, t);
      drawEye(207, 107, 1, p, t);
      drawNose(p);
      drawMouth(p, t);
      drawEffects(p, t);

      // Deliberate pixel clusters and hard black contour breaks.
      rect(116,116,3,22,C.black);
      rect(242,118,3,17,C.black);
      rect(136,61,9,3,C.black);
      rect(217,64,12,3,C.black);
      rect(151,196,37,3,C.black);
      dither(119,43,130,166,C.black,7,.10, t*4);

      ctx.restore();
    }

    function applyGlitch(now){
      if (now > glitchUntil) return;
      const intensity = clamp((glitchUntil - now) / 200, .15, 1);
      const src = ctx.getImageData(0,0,W,H);
      for (let i=0; i<8; i++) {
        const y = Math.floor(hash(now*.01 + i*20) * H);
        const h = 1 + Math.floor(hash(now*.03 + i*8) * 7);
        const shift = Math.floor((hash(now*.02 + i*99) - .5) * 18 * intensity);
        ctx.putImageData(src, shift, 0, 0, y, W, h);
      }
      ctx.globalAlpha = .45 * intensity;
      rect(73 + hash(now)*200, 73 + hash(now*.2)*92, 43, 2, C.green1);
      rect(82 + hash(now*.4)*190, 100 + hash(now*.6)*72, 28, 1, C.magenta);
      ctx.globalAlpha = 1;
    }

    function draw(now){
      updateAutonomy(now);
      drawBackground(now);
      drawEntity(now);
      applyGlitch(now);
      if (!STATIC_PREVIEW) requestAnimationFrame(draw);
    }

    // Start with a slow blink instead of a static first frame.
    blinkUntil = performance.now() + 120;
    if (STATIC_PREVIEW) draw(performance.now() + 1600);
    else requestAnimationFrame(draw);
  })();
  </script>
</body>
