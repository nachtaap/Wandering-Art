<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cyber Oracle — Autonomous Entity</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #030208;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Share Tech Mono", monospace;
}

#stage {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 45%, rgba(28, 14, 55, 0.85), rgba(3, 2, 8, 1) 68%),
    linear-gradient(180deg, #05030c, #020106);
}

canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

#bg { z-index: 1; }
#oracle { z-index: 2; }

#stage::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 4;
  pointer-events: none;
  background:
    radial-gradient(ellipse 55% 62% at 50% 48%, transparent 38%, rgba(3,2,8,0.36) 76%, rgba(2,1,5,0.96) 100%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 4px);
  mix-blend-mode: screen;
  opacity: 0.42;
}

#sigil {
  position: absolute;
  z-index: 3;
  left: 50%;
  bottom: 5.5vh;
  transform: translateX(-50%);
  color: rgba(185, 170, 255, 0.32);
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 0.42em;
  text-transform: uppercase;
  user-select: none;
  pointer-events: none;
  text-shadow: 0 0 18px rgba(120, 90, 255, 0.45);
}

@media (max-width: 640px) {
  #sigil { bottom: 4vh; letter-spacing: 0.28em; }
}
</style>
</head>
<body>
<div id="stage">
  <canvas id="bg"></canvas>
  <canvas id="oracle"></canvas>
  <div id="sigil">CYBER ORACLE</div>
</div>

<script>
/*
  Cyber Oracle — Autonomous Entity
  Clean-break art edition:
  - no user input
  - self-evolving internal states
  - dream phases
  - micro-expression drift
  - glyph field / synthetic aura
*/

const bg = document.getElementById("bg");
const face = document.getElementById("oracle");
const b = bg.getContext("2d");
const c = face.getContext("2d");

const CHARS = " .'`^,:;i!lI?+_-~][}{)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@";
const RUNE = "∴∵⌁⌬⌖⌗⌑⌘⟁◇◆◈◌◍◎◉◦✶✧✦✹✺✷";

let W = 0, H = 0, DPR = 1, S = 0;
let glyphs = [];
let stars = [];
let motes = [];
let last = performance.now();

const Oracle = {
  age: 0,
  dreamAge: 0,
  dreamLength: 34,
  nextDream: 34,
  mode: 0,

  calm: 0.62,
  focus: 0.48,
  tension: 0.22,
  wonder: 0.65,
  instability: 0.12,
  presence: 0.7,

  blink: 1,
  blinkAt: 2.4,
  blinkPhase: -1,

  gazeX: 0,
  gazeY: 0,
  mouth: 0,
  smile: 0.04,
  brow: 0,
  tilt: 0,

  rupture: 0,
  pulse: 0
};

function clamp(v, a, z) { return v < a ? a : v > z ? z : v; }
function lerp(a, b, t) { return a + (b - a) * t; }
function smoothstep(a, b, x) {
  const t = clamp((x - a) / (b - a), 0, 1);
  return t * t * (3 - 2 * t);
}
function n1(x) {
  return Math.sin(x) * 0.52 + Math.sin(x * 2.113 + 1.7) * 0.29 + Math.sin(x * 4.917 + 4.1) * 0.14;
}
function pick(arr) { return arr[(Math.random() * arr.length) | 0]; }

function resize() {
  DPR = Math.min(devicePixelRatio || 1, 2);
  W = innerWidth;
  H = innerHeight;
  S = Math.min(W, H);

  for (const canvas of [bg, face]) {
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
  }

  b.setTransform(DPR, 0, 0, DPR, 0, 0);
  c.setTransform(DPR, 0, 0, DPR, 0, 0);

  seedWorld();
}

function seedWorld() {
  glyphs = [];
  stars = [];
  motes = [];

  const glyphCount = Math.round(clamp((W * H) / 7500, 70, 190));
  for (let i = 0; i < glyphCount; i++) {
    const near = Math.random() < 0.68;
    glyphs.push({
      x: near ? 0.5 + (Math.random() - 0.5) * 0.72 : Math.random(),
      y: near ? 0.48 + (Math.random() - 0.5) * 0.74 : Math.random(),
      ch: Math.random() < 0.22 ? pick(RUNE) : pick(CHARS),
      a: 0.05 + Math.random() * 0.26,
      s: 0.25 + Math.random() * 1.7,
      p: Math.random() * 100,
      drift: (Math.random() - 0.5) * 0.006
    });
  }

  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: 0.25 + Math.random() * 1.2,
      a: 0.04 + Math.random() * 0.5,
      s: 0.2 + Math.random() * 1.5,
      p: Math.random() * 100
    });
  }
}

function evolve(dt) {
  Oracle.age += dt;
  Oracle.dreamAge += dt;

  if (Oracle.dreamAge > Oracle.nextDream) {
    Oracle.dreamAge = 0;
    Oracle.mode = (Oracle.mode + 1 + ((Math.random() * 3) | 0)) % 5;
    Oracle.nextDream = 22 + Math.random() * 58;
    Oracle.rupture = 1;
  }

  const t = Oracle.age;
  const dream = Oracle.mode;

  const calmTarget = 0.54 + 0.22 * n1(t * 0.055 + dream * 11);
  const tensionTarget = 0.30 + 0.28 * n1(t * 0.073 + dream * 17);
  const wonderTarget = 0.62 + 0.32 * n1(t * 0.041 + dream * 23);
  const focusTarget = 0.46 + 0.32 * n1(t * 0.089 + dream * 7);
  const instabilityTarget = Math.abs(0.14 + 0.55 * n1(t * 0.033 + dream * 13));

  Oracle.calm = lerp(Oracle.calm, calmTarget, dt * 0.35);
  Oracle.tension = lerp(Oracle.tension, tensionTarget, dt * 0.28);
  Oracle.wonder = lerp(Oracle.wonder, wonderTarget, dt * 0.22);
  Oracle.focus = lerp(Oracle.focus, focusTarget, dt * 0.31);
  Oracle.instability = lerp(Oracle.instability, instabilityTarget, dt * 0.20);

  Oracle.pulse = Math.pow(Math.max(0, Math.sin(t * (0.45 + Oracle.instability * 0.7))), 6);
  Oracle.rupture = Math.max(0, Oracle.rupture - dt * 1.8);

  Oracle.gazeX = 0.026 * n1(t * 0.47 + dream * 5) + 0.018 * n1(t * 0.13);
  Oracle.gazeY = 0.018 * n1(t * 0.39 + 2);

  Oracle.smile = clamp((Oracle.calm - Oracle.tension) * 0.38 + 0.08 * n1(t * 0.21), -0.34, 0.36);
  Oracle.mouth = clamp((Oracle.instability - 0.36) * 0.62 + Oracle.pulse * 0.15, 0, 0.42);
  Oracle.brow = clamp((Oracle.wonder - Oracle.tension) * 0.55, -0.3, 0.55);
  Oracle.tilt = 0.035 * n1(t * 0.18);

  if (Oracle.blinkPhase < 0 && t > Oracle.blinkAt) {
    Oracle.blinkPhase = 0;
  }

  if (Oracle.blinkPhase >= 0) {
    Oracle.blinkPhase += dt / (0.12 + Oracle.tension * 0.08);
    const p = Oracle.blinkPhase;
    Oracle.blink = p < 0.5 ? lerp(1, 0.08, p * 2) : lerp(0.08, 1, (p - 0.5) * 2);
    if (p >= 1) {
      Oracle.blink = 1;
      Oracle.blinkPhase = -1;
      Oracle.blinkAt = t + 1.6 + Math.random() * 5.8 - Oracle.tension;
    }
  }

  if (Math.random() < 0.18 + Oracle.instability * 0.18) spawnMote();
}

function spawnMote() {
  if (motes.length > 120) motes.shift();
  const a = Math.random() * Math.PI * 2;
  const r = S * (0.18 + Math.random() * 0.38);
  motes.push({
    x: W / 2 + Math.cos(a) * r,
    y: H / 2 + Math.sin(a) * r,
    vx: -Math.cos(a) * (0.04 + Math.random() * 0.18),
    vy: -Math.sin(a) * (0.04 + Math.random() * 0.18) - 0.03,
    life: 0,
    max: 1.6 + Math.random() * 2.5,
    ch: Math.random() < 0.4 ? pick(RUNE) : pick(CHARS),
    hue: 205 + Math.random() * 95
  });
}

function drawBackground(t) {
  b.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H * 0.48;
  const pulse = 0.5 + 0.5 * Math.sin(t * 0.00042);

  let g = b.createRadialGradient(cx, cy, 0, cx, cy, S * 0.68);
  g.addColorStop(0, `rgba(31,19,65,${0.95 + Oracle.pulse * 0.04})`);
  g.addColorStop(0.48, "rgba(9,6,24,0.95)");
  g.addColorStop(1, "rgba(2,1,6,1)");
  b.fillStyle = g;
  b.fillRect(0, 0, W, H);

  b.globalCompositeOperation = "lighter";

  const warm = b.createRadialGradient(W * 0.37, H * 0.42, 0, W * 0.38, H * 0.46, S * 0.36);
  warm.addColorStop(0, `rgba(230,83,40,${0.10 + pulse * 0.07 + Oracle.rupture * 0.14})`);
  warm.addColorStop(1, "rgba(40,10,5,0)");
  b.fillStyle = warm;
  b.fillRect(0, 0, W, H);

  const cool = b.createRadialGradient(W * 0.62, H * 0.50, 0, W * 0.60, H * 0.50, S * 0.45);
  cool.addColorStop(0, `rgba(71,90,255,${0.10 + Oracle.wonder * 0.11})`);
  cool.addColorStop(1, "rgba(5,7,40,0)");
  b.fillStyle = cool;
  b.fillRect(0, 0, W, H);

  for (const s of stars) {
    const a = s.a * (0.25 + 0.75 * Math.sin(t * 0.001 * s.s + s.p));
    if (a <= 0) continue;
    b.fillStyle = `rgba(210,220,255,${a})`;
    b.fillRect(s.x * W, s.y * H, s.r, s.r);
  }

  b.font = `${Math.max(9, S / 74)}px "Share Tech Mono", monospace`;
  b.textAlign = "center";
  b.textBaseline = "middle";

  for (const gl of glyphs) {
    const x = (gl.x + Math.sin(t * 0.00009 * gl.s + gl.p) * gl.drift) * W;
    const y = (gl.y + Math.cos(t * 0.00007 * gl.s + gl.p) * gl.drift) * H;
    const tw = 0.45 + 0.55 * Math.sin(t * 0.001 * gl.s + gl.p);
    const a = gl.a * tw * (0.55 + Oracle.presence * 0.65);
    if (a < 0.025) continue;
    const hue = 230 + 55 * Math.sin(gl.p + Oracle.age * 0.08);
    b.fillStyle = `hsla(${hue}, 95%, 72%, ${a})`;
    b.fillText(gl.ch, x, y);
  }

  b.globalCompositeOperation = "source-over";
}

function drawOracle(t) {
  c.clearRect(0, 0, W, H);

  const cx = W / 2;
  const cy = H * 0.49;
  const scale = S / 760;
  const faceW = 255 * scale;
  const faceH = 335 * scale;
  const ruptureX = Oracle.rupture * Math.sin(t * 0.08) * 8 * scale;

  c.save();
  c.translate(cx + ruptureX, cy);
  c.rotate(Oracle.tilt);
  c.globalCompositeOperation = "lighter";

  // Aura
  const aura = c.createRadialGradient(0, -10 * scale, 0, 0, 0, faceH * 0.9);
  aura.addColorStop(0, `rgba(125,130,255,${0.20 + Oracle.wonder * 0.16})`);
  aura.addColorStop(0.42, `rgba(175,75,255,${0.09 + Oracle.pulse * 0.12})`);
  aura.addColorStop(1, "rgba(0,0,0,0)");
  c.fillStyle = aura;
  c.beginPath();
  c.ellipse(0, 0, faceW * 1.15, faceH * 1.0, 0, 0, Math.PI * 2);
  c.fill();

  // Hair / field silhouette
  c.fillStyle = `rgba(20,12,42,${0.88})`;
  c.beginPath();
  c.moveTo(-faceW * 0.55, -faceH * 0.36);
  c.bezierCurveTo(-faceW * 0.95, -faceH * 0.05, -faceW * 0.72, faceH * 0.65, -faceW * 0.32, faceH * 0.83);
  c.bezierCurveTo(-faceW * 0.12, faceH * 0.94, faceW * 0.12, faceH * 0.94, faceW * 0.32, faceH * 0.83);
  c.bezierCurveTo(faceW * 0.72, faceH * 0.65, faceW * 0.95, -faceH * 0.05, faceW * 0.55, -faceH * 0.36);
  c.bezierCurveTo(faceW * 0.33, -faceH * 0.63, -faceW * 0.33, -faceH * 0.63, -faceW * 0.55, -faceH * 0.36);
  c.fill();

  // Face
  const fg = c.createLinearGradient(-faceW * 0.5, -faceH * 0.5, faceW * 0.5, faceH * 0.7);
  fg.addColorStop(0, "rgba(255,170,115,0.28)");
  fg.addColorStop(0.42, "rgba(190,160,255,0.34)");
  fg.addColorStop(1, "rgba(85,180,255,0.18)");
  c.fillStyle = fg;
  c.beginPath();
  c.moveTo(0, -faceH * 0.52);
  c.bezierCurveTo(-faceW * 0.47, -faceH * 0.50, -faceW * 0.54, -faceH * 0.12, -faceW * 0.45, faceH * 0.18);
  c.bezierCurveTo(-faceW * 0.34, faceH * 0.58, -faceW * 0.11, faceH * 0.70, 0, faceH * 0.76);
  c.bezierCurveTo(faceW * 0.11, faceH * 0.70, faceW * 0.34, faceH * 0.58, faceW * 0.45, faceH * 0.18);
  c.bezierCurveTo(faceW * 0.54, -faceH * 0.12, faceW * 0.47, -faceH * 0.50, 0, -faceH * 0.52);
  c.fill();

  // Features
  const eyeY = -faceH * 0.10 + Oracle.gazeY * faceH;
  const eyeDX = faceW * 0.23;
  const eyeOpen = clamp(Oracle.blink * (0.72 + Oracle.focus * 0.45 - Oracle.tension * 0.12), 0.04, 1.35);

  drawEye(-eyeDX, eyeY, eyeOpen, scale, -1);
  drawEye( eyeDX, eyeY, eyeOpen, scale,  1);

  drawBrows(eyeY, eyeDX, scale);
  drawMouth(faceH, faceW, scale);
  drawGlyphMask(faceW, faceH, scale, t);

  c.restore();

  updateMotes();
}

function drawEye(x, y, open, scale, side) {
  c.save();
  c.translate(x, y);

  c.strokeStyle = `rgba(215,225,255,${0.25 + Oracle.focus * 0.42})`;
  c.lineWidth = 2 * scale;
  c.beginPath();
  c.ellipse(0, 0, 38 * scale, 13 * scale * open, 0, 0, Math.PI * 2);
  c.stroke();

  c.fillStyle = `rgba(45,235,255,${0.42 + Oracle.focus * 0.35})`;
  c.beginPath();
  c.arc(Oracle.gazeX * 800 * scale, 0, 8.5 * scale * open, 0, Math.PI * 2);
  c.fill();

  c.fillStyle = `rgba(255,255,255,${0.48 + Oracle.pulse * 0.35})`;
  c.beginPath();
  c.arc(Oracle.gazeX * 800 * scale - 2 * scale, -3 * scale, 2.4 * scale, 0, Math.PI * 2);
  c.fill();

  c.restore();
}

function drawBrows(eyeY, eyeDX, scale) {
  c.strokeStyle = `rgba(255,185,160,${0.20 + Oracle.tension * 0.45})`;
  c.lineWidth = 2 * scale;
  c.lineCap = "round";

  for (const side of [-1, 1]) {
    const x = side * eyeDX;
    const y = eyeY - (32 + Oracle.brow * 22) * scale;
    c.beginPath();
    c.moveTo(x - side * 42 * scale, y + side * Oracle.tension * 7 * scale);
    c.quadraticCurveTo(x, y - Oracle.brow * 16 * scale, x + side * 42 * scale, y - side * Oracle.tension * 7 * scale);
    c.stroke();
  }
}

function drawMouth(faceH, faceW, scale) {
  const y = faceH * 0.27;
  const width = faceW * (0.23 + Oracle.wonder * 0.05);
  const curve = Oracle.smile * 60 * scale;
  const open = Oracle.mouth * 42 * scale;

  c.strokeStyle = `rgba(255,185,205,${0.28 + Oracle.presence * 0.35})`;
  c.lineWidth = 2.1 * scale;
  c.lineCap = "round";

  c.beginPath();
  c.moveTo(-width, y);
  c.quadraticCurveTo(0, y + curve + open, width, y);
  c.stroke();

  if (Oracle.mouth > 0.05) {
    c.fillStyle = `rgba(10,5,18,${0.65 * Oracle.mouth})`;
    c.beginPath();
    c.ellipse(0, y + open * 0.75, width * 0.44, open, 0, 0, Math.PI * 2);
    c.fill();
  }
}

function drawGlyphMask(faceW, faceH, scale, t) {
  c.font = `${Math.max(9, 12 * scale)}px "Share Tech Mono", monospace`;
  c.textAlign = "center";
  c.textBaseline = "middle";

  const rows = 26;
  const cols = 20;
  for (let j = 0; j < rows; j++) {
    const yy = lerp(-faceH * 0.44, faceH * 0.68, j / (rows - 1));
    const width = faceW * (0.43 * Math.sin((j / rows) * Math.PI) + 0.08);
    for (let i = 0; i < cols; i++) {
      if (Math.random() > 0.032 + Oracle.instability * 0.022) continue;
      const xx = lerp(-width, width, i / (cols - 1));
      const a = 0.08 + Oracle.wonder * 0.12 + Oracle.pulse * 0.08;
      const hue = 205 + 80 * Math.sin(t * 0.0008 + i * 0.7 + j * 0.3);
      c.fillStyle = `hsla(${hue}, 95%, 75%, ${a})`;
      c.fillText(Math.random() < 0.4 ? pick(RUNE) : pick(CHARS), xx, yy);
    }
  }
}

function updateMotes() {
  c.save();
  c.globalCompositeOperation = "lighter";
  c.font = `${Math.max(9, S / 75)}px "Share Tech Mono", monospace`;
  c.textAlign = "center";
  c.textBaseline = "middle";

  for (let i = motes.length - 1; i >= 0; i--) {
    const m = motes[i];
    m.life += 0.016;
    m.x += m.vx * S;
    m.y += m.vy * S;
    const a = 1 - m.life / m.max;
    if (a <= 0) {
      motes.splice(i, 1);
      continue;
    }
    c.fillStyle = `hsla(${m.hue}, 95%, 75%, ${a * 0.32})`;
    c.fillText(m.ch, m.x, m.y);
  }

  c.restore();
}

function frame(now) {
  const dt = Math.min(0.04, (now - last) / 1000);
  last = now;

  evolve(dt);
  drawBackground(now);
  drawOracle(now);

  requestAnimationFrame(frame);
}

addEventListener("resize", resize, { passive: true });
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
