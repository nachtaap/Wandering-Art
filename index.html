<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wandering Art — ASCII Oracle</title>
  <style>
    :root{
      --bg:#02030a;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
    }

    body{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    canvas{
      display:block;
      width:100vw;
      height:100vh;
      background:
        radial-gradient(circle at 50% 40%, #0a0d18 0%, #050710 40%, #02030a 100%);
    }
  </style>
</head>
<body>
<canvas id="ascii"></canvas>

<script>
const canvas = document.getElementById("ascii");
const ctx = canvas.getContext("2d", { alpha: false });

const DPR = Math.min(window.devicePixelRatio || 1, 2);

const CFG = {
  bg: [2, 3, 10],
  left: [255, 78, 56],
  mid: [255, 72, 190],
  right: [72, 112, 255],

  // zachtere ramp, minder “tekst-soep”
  ramp: " .,:;~-+=i1tfLCG08@#",
  ambientRamp: ".:+|01",

  // rustiger updategedrag
  riseChance: 0.18,
  fallChance: 0.16,
  shimmerChance: 0.0008
};

let W = 0;
let H = 0;
let cols = 0;
let rows = 0;
let fontSize = 0;
let cellW = 0;
let cellH = 0;

let currentIdx;
let blinkNext = 4 + Math.random() * 5;
let blinkStart = -999;
const blinkDuration = 0.18;

function clamp(v, a = 0, b = 1){
  return v < a ? a : (v > b ? b : v);
}

function mix(a, b, t){
  return a + (b - a) * t;
}

function smoothstep(a, b, x){
  const t = clamp((x - a) / (b - a), 0, 1);
  return t * t * (3 - 2 * t);
}

function fract(x){
  return x - Math.floor(x);
}

function hash(x, y){
  return fract(Math.sin(x * 127.1 + y * 311.7) * 43758.5453123);
}

function noise(x, y){
  const xi = Math.floor(x);
  const yi = Math.floor(y);
  const xf = x - xi;
  const yf = y - yi;

  const u = xf * xf * (3 - 2 * xf);
  const v = yf * yf * (3 - 2 * yf);

  const n00 = hash(xi, yi);
  const n10 = hash(xi + 1, yi);
  const n01 = hash(xi, yi + 1);
  const n11 = hash(xi + 1, yi + 1);

  return mix(
    mix(n00, n10, u),
    mix(n01, n11, u),
    v
  );
}

function mixColor(a, b, t){
  return [
    mix(a[0], b[0], t),
    mix(a[1], b[1], t),
    mix(a[2], b[2], t)
  ];
}

function triColor(t){
  t = clamp(t, 0, 1);
  if (t < 0.5){
    return mixColor(CFG.left, CFG.mid, t / 0.5);
  }
  return mixColor(CFG.mid, CFG.right, (t - 0.5) / 0.5);
}

function ellipse(u, v, cx, cy, rx, ry){
  const dx = (u - cx) / rx;
  const dy = (v - cy) / ry;
  return Math.sqrt(dx * dx + dy * dy);
}

function ellipseFill(u, v, cx, cy, rx, ry, soft = 0.18){
  const d = ellipse(u, v, cx, cy, rx, ry);
  return 1 - smoothstep(1 - soft, 1, d);
}

function ellipseBand(u, v, cx, cy, rx, ry, inner = 0.90, outer = 1.02){
  const d = ellipse(u, v, cx, cy, rx, ry);
  return smoothstep(inner, 1.0, d) * (1 - smoothstep(1.0, outer, d));
}

function segmentGlow(px, py, ax, ay, bx, by, width){
  const abx = bx - ax;
  const aby = by - ay;
  const apx = px - ax;
  const apy = py - ay;
  const denom = abx * abx + aby * aby || 1e-6;
  const h = clamp((apx * abx + apy * aby) / denom, 0, 1);
  const dx = apx - abx * h;
  const dy = apy - aby * h;
  return Math.exp(-(dx * dx + dy * dy) / (width * width));
}

function getBlink(t){
  if (t > blinkNext){
    blinkStart = t;
    blinkNext = t + 6 + Math.random() * 7;
  }
  const p = (t - blinkStart) / blinkDuration;
  if (p < 0 || p > 1) return 0;
  return Math.sin(p * Math.PI);
}

function resize(){
  W = window.innerWidth;
  H = window.innerHeight;

  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  fontSize = W < 700 ? 7.2 : 10.5;
  cellH = fontSize * 1.08;

  ctx.font = `${fontSize}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace`;
  cellW = ctx.measureText("M").width;

  cols = Math.floor(W / cellW);
  rows = Math.floor(H / cellH);

  currentIdx = new Int16Array(cols * rows);
}

function sampleFace(u, v, t, blink){
  const breath = 0.985 + 0.015 * Math.sin(t * 1.1);

  // ===== Hoofd en haar =====
  const headShape = ellipseFill(u, v, 0.5, 0.47, 0.14, 0.21, 0.18);
  const headContour = ellipseBand(u, v, 0.5, 0.47, 0.14, 0.21, 0.88, 1.03);

  const hairShell = ellipseFill(u, v, 0.5, 0.49, 0.205, 0.34, 0.16);
  const hairContour = ellipseBand(u, v, 0.5, 0.49, 0.205, 0.34, 0.90, 1.02);

  let hair = Math.max(0, hairShell - headShape * 0.94);
  hair *= 0.86 + 0.16 * noise(u * 22 + 4.3, v * 16 - t * 0.18);

  // nek en schouders heel subtiel
  const neck = ellipseFill(u, v, 0.5, 0.80, 0.045, 0.07, 0.30) * 0.10;
  const shoulderL = ellipseFill(u, v, 0.44, 0.90, 0.09, 0.05, 0.35) * 0.035;
  const shoulderR = ellipseFill(u, v, 0.56, 0.90, 0.09, 0.05, 0.35) * 0.035;

  // ===== Gezichtsvlakken =====
  const forehead = ellipseFill(u, v, 0.5, 0.34, 0.08, 0.055, 0.22) * 0.05;
  const cheekL = ellipseFill(u, v, 0.435, 0.565, 0.05, 0.065, 0.26) * 0.05;
  const cheekR = ellipseFill(u, v, 0.565, 0.565, 0.05, 0.065, 0.26) * 0.05;
  const chin = ellipseFill(u, v, 0.5, 0.70, 0.04, 0.035, 0.28) * 0.045;

  // ===== Ogen =====
  const eyeY = 0.46;
  const eyeHeight = mix(0.011, 0.0018, blink);

  // droevigere, algemenere ooglijn
  const browL = segmentGlow(u, v, 0.372, 0.414, 0.452, 0.404, 0.0072) * 0.28;
  const browR = segmentGlow(u, v, 0.548, 0.404, 0.628, 0.414, 0.0072) * 0.28;

  const upperL = segmentGlow(u, v, 0.374, eyeY + 0.008, 0.446, eyeY - 0.003, 0.005);
  const upperR = segmentGlow(u, v, 0.554, eyeY - 0.003, 0.626, eyeY + 0.008, 0.005);

  const lowerL = segmentGlow(u, v, 0.382, eyeY + 0.015, 0.444, eyeY + 0.011, 0.0044);
  const lowerR = segmentGlow(u, v, 0.556, eyeY + 0.011, 0.618, eyeY + 0.015, 0.0044);

  const eyeWhiteL = ellipseFill(u, v, 0.41, eyeY, 0.026, eyeHeight, 0.28) * (1 - blink * 0.98);
  const eyeWhiteR = ellipseFill(u, v, 0.59, eyeY, 0.026, eyeHeight, 0.28) * (1 - blink * 0.98);

  const irisL = ellipseFill(u, v, 0.41, eyeY + 0.001, 0.009, 0.009, 0.36) * (1 - blink * 0.99);
  const irisR = ellipseFill(u, v, 0.59, eyeY + 0.001, 0.009, 0.009, 0.36) * (1 - blink * 0.99);

  const underEyeL = ellipseFill(u, v, 0.41, 0.490, 0.040, 0.018, 0.38) * 0.03;
  const underEyeR = ellipseFill(u, v, 0.59, 0.490, 0.040, 0.018, 0.38) * 0.03;

  // ===== Neus =====
  const noseBridge = segmentGlow(u, v, 0.5, 0.41, 0.5, 0.59, 0.0065) * 0.18;
  const noseShadowL = segmentGlow(u, v, 0.494, 0.52, 0.484, 0.60, 0.009) * 0.05;
  const noseShadowR = segmentGlow(u, v, 0.506, 0.52, 0.516, 0.60, 0.009) * 0.05;
  const noseTip = ellipseFill(u, v, 0.5, 0.602, 0.017, 0.012, 0.35) * 0.08;
  const nostrilL = ellipseFill(u, v, 0.486, 0.608, 0.0065, 0.0045, 0.36) * 0.06;
  const nostrilR = ellipseFill(u, v, 0.514, 0.608, 0.0065, 0.0045, 0.36) * 0.06;

  // ===== Mond =====
  const philtrum = segmentGlow(u, v, 0.5, 0.620, 0.5, 0.644, 0.0045) * 0.045;
  const upperLipL = segmentGlow(u, v, 0.458, 0.666, 0.500, 0.656, 0.0045) * 0.10;
  const upperLipR = segmentGlow(u, v, 0.500, 0.656, 0.542, 0.666, 0.0045) * 0.10;
  const lowerLip = segmentGlow(u, v, 0.470, 0.682, 0.530, 0.682, 0.0053) * 0.08;
  const mouthShadow = ellipseFill(u, v, 0.5, 0.676, 0.038, 0.014, 0.40) * 0.03;

  // ===== Kaak / contour =====
  const jawL = segmentGlow(u, v, 0.410, 0.57, 0.470, 0.725, 0.013) * 0.08;
  const jawR = segmentGlow(u, v, 0.590, 0.57, 0.530, 0.725, 0.013) * 0.08;

  // ===== Samenstellen =====
  // heel bewust: weinig binnenvulling, veel contour en features
  let density = 0;

  density += headContour * 0.22;
  density += hairContour * 0.16;
  density += hair * 0.14;

  density += forehead + cheekL + cheekR + chin;
  density += neck + shoulderL + shoulderR;

  density += browL + browR;
  density += (upperL + upperR) * 0.24;
  density += (lowerL + lowerR) * 0.12;
  density += (eyeWhiteL + eyeWhiteR) * 0.10;
  density += (irisL + irisR) * 0.20;
  density += underEyeL + underEyeR;

  density += noseBridge + noseShadowL + noseShadowR + noseTip + nostrilL + nostrilR;
  density += philtrum + upperLipL + upperLipR + lowerLip + mouthShadow;
  density += jawL + jawR;

  // beetje zachte kern, maar niet teveel
  density += headShape * 0.018;

  // subtiele textuur
  density += (noise(u * 38 + 2.1, v * 41 + 9.4) - 0.5) * 0.014;
  density *= breath;
  density = clamp(density, 0, 1);

  let color = triColor(u);

  const eyeBoost = irisL + irisR + eyeWhiteL + eyeWhiteR;
  if (eyeBoost > 0.05){
    color = mixColor(color, [190, 180, 255], 0.24);
  }

  if (hair > headShape){
    color = mixColor(color, [34, 28, 74], 0.18);
  }

  const bright = clamp(0.14 + density * 1.55 + eyeBoost * 0.16, 0, 1.28);
  color = [
    clamp(color[0] * bright, 0, 255),
    clamp(color[1] * bright, 0, 255),
    clamp(color[2] * bright, 0, 255)
  ];

  return { density, color };
}

function render(ts){
  const t = ts * 0.001;
  const blink = getBlink(t);

  ctx.fillStyle = `rgb(${CFG.bg[0]}, ${CFG.bg[1]}, ${CFG.bg[2]})`;
  ctx.fillRect(0, 0, W, H);

  ctx.font = `${fontSize}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace`;
  ctx.textBaseline = "top";
  ctx.textAlign = "left";

  for (let r = 0; r < rows; r++){
    const y = r * cellH;

    for (let c = 0; c < cols; c++){
      const x = c * cellW;
      const u = (c + 0.5) / cols;
      const v = (r + 0.5) / rows;
      const id = r * cols + c;

      const s = sampleFace(u, v, t, blink);
      let density = s.density;
      let color = s.color;
      let ambient = 0;

      // minder achtergrondruis
      if (density < 0.016){
        const a = noise(u * 60 + 30.1, v * 60 - t * 0.04);
        if (a > 0.994){
          ambient = (a - 0.994) * 7;
          density = Math.max(density, ambient * 0.03);
          color = mixColor(triColor(u), [110, 90, 170], 0.32);
        }
      }

      const target = Math.floor(clamp(density, 0, 1) * (CFG.ramp.length - 1));
      let cur = currentIdx[id];

      if (cur < target){
        if (Math.random() < CFG.riseChance) cur += 1;
        if (target - cur > 5) cur += 1;
      } else if (cur > target){
        if (Math.random() < CFG.fallChance) cur -= 1;
        if (cur - target > 5) cur -= 1;
      }

      if (density > 0.04 && Math.random() < CFG.shimmerChance){
        cur += Math.random() < 0.5 ? -1 : 1;
      }

      cur = Math.max(0, Math.min(CFG.ramp.length - 1, cur));
      currentIdx[id] = cur;

      if (density > 0.012){
        const ch = CFG.ramp[cur];
        const alpha = clamp(0.08 + density * 1.6, 0, 1);
        ctx.fillStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha})`;
        ctx.fillText(ch, x, y);
      } else if (ambient > 0.01){
        const idx = Math.floor(noise(u * 80, v * 80 + t * 0.03) * CFG.ambientRamp.length) % CFG.ambientRamp.length;
        const ch = CFG.ambientRamp[idx];
        const alpha = clamp(ambient * 0.18, 0.025, 0.08);
        ctx.fillStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha})`;
        ctx.fillText(ch, x, y);
      }
    }
  }

  // scanlines
  ctx.fillStyle = "rgba(0,0,0,0.10)";
  for (let y = 0; y < H; y += 4){
    ctx.fillRect(0, y, W, 1);
  }

  // zachte centrale gloed
  const glow = ctx.createRadialGradient(
    W * 0.5, H * 0.46, 10,
    W * 0.5, H * 0.5, Math.max(W, H) * 0.38
  );
  glow.addColorStop(0, "rgba(255,90,220,0.035)");
  glow.addColorStop(0.45, "rgba(90,100,255,0.020)");
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // vignette
  const vignette = ctx.createRadialGradient(
    W * 0.5, H * 0.5, Math.min(W, H) * 0.15,
    W * 0.5, H * 0.5, Math.max(W, H) * 0.72
  );
  vignette.addColorStop(0, "rgba(0,0,0,0)");
  vignette.addColorStop(1, "rgba(0,0,0,0.40)");
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(render);
}

window.addEventListener("resize", resize);

// debug: frame dump
window.exportAsciiFrame = function(){
  const out = [];
  for (let r = 0; r < rows; r++){
    let line = "";
    for (let c = 0; c < cols; c++){
      line += CFG.ramp[currentIdx[r * cols + c]] || " ";
    }
    out.push(line);
  }
  return out.join("\n");
};

resize();
requestAnimationFrame(render);
</script>
</body>
</html>
