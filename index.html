      ctx.globalAlpha=1;
      ctx.restore();
    }

    function drawShouldersAndNeck(now = performance.now()){
      const wp = WardrobeBrain.current || { base:C.cyan2, shade:C.cyan0, accent:C.green1, line:C.cyan4, outfit:'ethereal-oracle' };
      const t = now * .001;

      // ETHEREAL ORACLE — adult, feminine, space-oracle paper couture.
      // Het bestaande hoofd/gezicht wordt NIET overschreven. Deze laag tekent:
      // 1) een paper/halo frame achter het hoofd, zodat de digitale kop in dezelfde wereld zit;
      // 2) een vloeiend, vrouwelijk paper-cutout lichaam met verborgen/rituele scharnieren.
      const rm = REDUCED ? .22 : 1;
      const bob       = Math.sin(t * 1.02) * .90 * rm;
      const sway      = Math.sin(t * .42) * .018 * rm;
      const breath    = Math.sin(t * 1.20) * .85 * rm;
      const walk      = Math.sin(t * .76) * .13 * rm;
      const oracleDip = Math.sin(t * .31 + 1.1) * .07 * rm;

      const ink        = '#02040a';
      const edge       = C.black;
      const voidBlue   = '#050814';
      const deepTeal   = mixHex('#071a26', wp.shade || C.cyan0, .24);
      const teal       = mixHex('#0a3141', wp.base || C.cyan2, .18);
      const tealLit    = mixHex(teal, C.cyan4, .25);
      const nightViolet= mixHex('#190f2a', C.magenta, .14);
      const violetLit  = mixHex(nightViolet, C.magenta, .22);
      // Shared skin palette: same warm parchment/peach family as the face.
      // Body stays matte/paper; face becomes the living version of this tone.
      const vellum     = '#c9a976';
      const vellumLite = '#f0d3a1';
      const vellumDark = '#8a6541';
      const skinPaper  = '#d9aa78';
      const skinShade  = '#a76d4e';
      const skinGlow   = '#ffd2a0';
      const gold       = '#d5a64d';
      const goldHi     = '#fff0b8';
      const goldLo     = '#57370a';
      const roseGold   = mixHex('#c87592', gold, .30);
      const pearl      = mixHex(vellumLite, C.white, .30);
      const starBlue   = mixHex(C.cyan4, '#7b62ff', .30);
      const stitch     = mixHex(C.cyan4, C.white, .42);
      const shadow     = 'rgba(0,0,10,.72)';

      function drawCommands(commands){
        ctx.beginPath();
        for(const c of commands){
          if(c[0] === 'M') ctx.moveTo(c[1], c[2]);
          if(c[0] === 'L') ctx.lineTo(c[1], c[2]);
          if(c[0] === 'Q') ctx.quadraticCurveTo(c[1], c[2], c[3], c[4]);
          if(c[0] === 'C') ctx.bezierCurveTo(c[1], c[2], c[3], c[4], c[5], c[6]);
        }
        ctx.closePath();
      }

      function strokeCommands(commands, color, width=1, alpha=.35, dash=false){
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        if(dash) ctx.setLineDash([3,5]);
        ctx.beginPath();
        for(const c of commands){
          if(c[0] === 'M') ctx.moveTo(c[1], c[2]);
          if(c[0] === 'L') ctx.lineTo(c[1], c[2]);
          if(c[0] === 'Q') ctx.quadraticCurveTo(c[1], c[2], c[3], c[4]);
          if(c[0] === 'C') ctx.bezierCurveTo(c[1], c[2], c[3], c[4], c[5], c[6]);
        }
        ctx.stroke();
        if(dash) ctx.setLineDash([]);
        ctx.restore();
      }

      function bounds(commands){
        let minX=9999, minY=9999, maxX=-9999, maxY=-9999;
        for(const c of commands){
          for(let i=1;i<c.length;i+=2){
            const x=c[i], y=c[i+1];
            if(typeof x === 'number' && typeof y === 'number'){
              minX=Math.min(minX,x); minY=Math.min(minY,y);
              maxX=Math.max(maxX,x); maxY=Math.max(maxY,y);
            }
          }
        }
        return { x:minX, y:minY, w:Math.max(1,maxX-minX), h:Math.max(1,maxY-minY) };
      }

      function paperFibers(commands, key, color=stitch, amount=9, alpha=.13){
        const b = bounds(commands);
        ctx.save();
        drawCommands(commands);
        ctx.clip();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        for(let i=0;i<amount;i++){
          const hx = b.x + 4 + hash(key + i*19.37) * Math.max(1, b.w-8);
          const hy = b.y + 4 + hash(key + i*31.11) * Math.max(1, b.h-8);
          const len = 4 + hash(key + i*7.71) * 13;
          const dy = (hash(key + i*.41) - .5) * 4;
          ctx.beginPath();
          ctx.moveTo(hx, hy);
          ctx.lineTo(hx + len, hy + dy);
          ctx.stroke();
        }
        ctx.restore();
      }

      function paper(commands, fill, key=1, opts={}){
        const lineCol = opts.line || edge;
        const lw = opts.lw == null ? 2 : opts.lw;
        const alpha = opts.alpha == null ? 1 : opts.alpha;
        const hi = opts.hi || mixHex(fill, C.white, .10);
        const b = bounds(commands);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(opts.shadowX == null ? 2 : opts.shadowX, opts.shadowY == null ? 3 : opts.shadowY);
        drawCommands(commands);
        ctx.fillStyle = shadow;
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = alpha;
        drawCommands(commands);
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.restore();

        if(hi){
          const g = ctx.createLinearGradient(b.x, b.y, b.x+b.w, b.y+b.h);
          g.addColorStop(0, hi);
          g.addColorStop(.45, 'rgba(255,255,255,0)');
          g.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.save();
          ctx.globalAlpha = opts.hiAlpha == null ? .20 : opts.hiAlpha;
          drawCommands(commands);
          ctx.fillStyle = g;
          ctx.fill();
          ctx.restore();
        }

        paperFibers(commands, key, opts.fiber || stitch, opts.fibers == null ? 8 : opts.fibers, opts.fiberAlpha == null ? .12 : opts.fiberAlpha);

        ctx.save();
        ctx.globalAlpha = opts.strokeAlpha == null ? .86 : opts.strokeAlpha;
        ctx.strokeStyle = lineCol;
        ctx.lineWidth = lw;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        drawCommands(commands);
        ctx.stroke();
        ctx.restore();

        if(opts.stitch !== false){
          strokeCommands(commands, opts.stitchColor || stitch, 1, opts.stitchAlpha == null ? .20 : opts.stitchAlpha, true);
        }
      }

      function star(cx,cy,r,color=gold,alpha=.75){
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.beginPath();
        for(let i=0;i<10;i++){
          const a = -Math.PI/2 + i*Math.PI/5;
          const rr = i%2 ? r*.38 : r;
          const x = cx + Math.cos(a)*rr;
          const y = cy + Math.sin(a)*rr;
          if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function crescent(cx,cy,r,cutColor,alpha=.85){
        ctx.save();
        ctx.globalAlpha = alpha;
        ellipse(cx,cy,r,r,gold);
        ctx.globalAlpha = alpha;
        ellipse(cx+r*.42,cy-r*.08,r*.84,r*.84,cutColor);
        ctx.restore();
      }

      // Couture-hardware: een rivet die twee papierlagen vastzet en oogt als sieraad.
      // kind: 'orbital' (grote schouder-broches, armillairring + gem),
      //       'rivet'  (ellebogen/knieën/keel/borst, fastener-slot),
      //       'fine'   (polsen/enkels/heupen).
      function joint(x,y,r=6,alpha=1,kind='rivet'){
        ctx.save();
        // celestiale halo, subtiel
        ctx.globalAlpha = .15 * alpha; ellipse(x,y,r+8,r+8,C.cyan4);
        ctx.globalAlpha = .13 * alpha; ellipse(x+1,y+1,r+5,r+5,C.magenta);

        // washer / achterplaat: bewijst dat de rivet door twee papierlagen pint
        ctx.globalAlpha = .50 * alpha; ellipse(x+2,y+3,r+5,r+4,edge);       // contactschaduw plaat
        ctx.globalAlpha = alpha;       ellipse(x,y,r+4,r+3.4,goldLo);       // donkere gouden rand
        ctx.globalAlpha = .9 * alpha;  ellipse(x,y,r+2.5,r+2.1,mixHex(gold,edge,.42)); // verzonken ring

        // armillairring voor de grote orbitale pivots
        if(kind === 'orbital'){
          ctx.globalAlpha = .8 * alpha; ctx.strokeStyle = goldHi; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.ellipse(x,y,r+6,r*.5+2,-0.5,0,Math.PI*2); ctx.stroke();
          ctx.beginPath(); ctx.ellipse(x,y,r*.5+2,r+6,-0.5,0,Math.PI*2); ctx.stroke();
        }

        // de pin-kop (gouden dome)
        ctx.globalAlpha = alpha;       ellipse(x,y,r,r,gold);
        ctx.globalAlpha = .5 * alpha;  ellipse(x,y,r*.6,r*.6,mixHex(gold,goldLo,.5)); // verzonken midden
        // fastener-slot, zodat het hardware leest i.p.v. parel
        ctx.globalAlpha = .55 * alpha; ctx.strokeStyle = goldLo; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x-r*.42,y); ctx.lineTo(x+r*.42,y); ctx.stroke();
        // speculaire highlight
        ctx.globalAlpha = .9 * alpha;  ellipse(x-r*.34,y-r*.42,Math.max(1,r*.3),Math.max(1,r*.22),goldHi);

        // celestiale gem voor orbitale broches
        if(kind === 'orbital'){
          ctx.globalAlpha = .8 * alpha; ellipse(x,y,r*.3,r*.3,starBlue);
          ctx.globalAlpha = .9 * alpha; ellipse(x-r*.1,y-r*.12,Math.max(1,r*.12),Math.max(1,r*.12),C.white);
        }
        ctx.restore();
      }

      function localPaper(commands, fill, key, opts={}){
        paper(commands, fill, key, opts);
      }

      function segment(a,b,w1,w2,fill,key,opts={}){
        const dx=b.x-a.x, dy=b.y-a.y;
        const len=Math.max(1,Math.hypot(dx,dy));
        const ang=Math.atan2(dy,dx);
        ctx.save();
        ctx.translate(a.x,a.y);
        ctx.rotate(ang);
        const cmds=[
          ['M',0,-w1*.56],
          ['C',len*.18,-w1*.72,len*.76,-w2*.62,len,-w2*.44],
          ['Q',len+7,0,len,w2*.46],
          ['C',len*.74,w2*.64,len*.18,w1*.72,0,w1*.56],
          ['Q',-7,0,0,-w1*.56]
        ];
        localPaper(cmds, fill, key, opts);
        ctx.restore();
      }

      function hand(x,y,side=1,rot=0){
        ctx.save();
        ctx.translate(x,y);
        ctx.scale(side,1);
        ctx.rotate(rot);

        // Eén gesculpteerde papier-cutout: palm + vingers als één elegante vorm.
        const handShape=[
          ['M',-7,-13],
          ['C',-11,-4,-10,8,-6,18],     // buitenrand (pink) omlaag
          ['C',-3,25,3,25,7,18],        // afgeronde vingertop-boog
          ['C',10,12,11,4,11,-1],       // binnenrand omhoog
          ['C',15,-2,15,-9,10,-11],     // duim-welving
          ['C',4,-13,-1,-14,-7,-13]     // terug naar pols
        ];
        paper(handShape, skinPaper, 200+x+y, {fibers:5, stitch:false, lw:2, hi:pearl, hiAlpha:.18, strokeAlpha:.84});

        // Ingesneden vingergroeven: donkere insnijdingen die binnen het papier blijven.
        ctx.save();
        drawCommands(handShape); ctx.clip();
        ctx.lineCap='round';
        ctx.strokeStyle=skinShade;
        ctx.globalAlpha=.55; ctx.lineWidth=1.4;
        const grooves=[[-3.5,3,-4.5,18],[-0.3,4,-0.3,20],[3,3,4,18]];
        for(const g of grooves){ ctx.beginPath(); ctx.moveTo(g[0],g[1]); ctx.lineTo(g[2],g[3]); ctx.stroke(); }
        // duim-vouw
        ctx.globalAlpha=.5; ctx.beginPath(); ctx.moveTo(8,-6); ctx.lineTo(3,3); ctx.stroke();
        // knokkel-schaduw
        ctx.globalAlpha=.28; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(-6,2); ctx.quadraticCurveTo(2,5,10,1); ctx.stroke();
        ctx.restore();

        // Zachte highlights die op de toppen het licht vangen.
        ctx.globalAlpha=.3; line(-5,-9,-2,-12,1,skinGlow);
        ctx.globalAlpha=.22;
        const tips=[[-4,16],[-0.3,18],[3.5,16]];
        for(const t of tips) ellipse(t[0],t[1],1.2,2,skinGlow);
        ctx.globalAlpha=1;
        ctx.restore();
      }

      function foot(x,y,side=1,rot=0){
        ctx.save();
        ctx.translate(x,y);
        ctx.scale(side,1);
        ctx.rotate(rot);
        // Langwerpige, compacte voet — smaller en duidelijker silhouet dan een ronde bol.
        const sole=[
          ['M',-8,-3],['C',-6,-7,4,-8,12,-5],['C',16,-3,17,1,15,5],
          ['C',10,9,-6,9,-12,6],['C',-15,3,-12,-1,-8,-3]
        ];
        paper(sole, mixHex(skinPaper,vellumDark,.08), 260+x+y, {fibers:3, stitch:false, lw:1.5, hi:skinGlow, hiAlpha:.10});
        // Ingesneden teen-groeven: geclipped zodat ze de voet niet verlaten (zelfde techniek als vingers).
        ctx.save();
        drawCommands(sole); ctx.clip();
        ctx.strokeStyle=skinShade; ctx.lineWidth=1.1; ctx.lineCap='round'; ctx.globalAlpha=.48;
        const toes=[[3,-7,2,1],[6,-7,6,2],[9,-6,9,2],[12,-5,12,1]]; // 4 lijntjes tussen de 5 tenen
        for(const t of toes){ ctx.beginPath(); ctx.moveTo(t[0],t[1]); ctx.lineTo(t[2],t[3]); ctx.stroke(); }
        ctx.globalAlpha=1; ctx.lineCap='butt';
        ctx.restore();
        // Leer-zool: dunne donkere rand onder de voet.
        ctx.strokeStyle=mixHex(voidBlue,C.black,.3); ctx.lineWidth=2; ctx.globalAlpha=.8;
        ctx.beginPath(); ctx.moveTo(-13,7); ctx.quadraticCurveTo(2,12,16,6); ctx.stroke();
        ctx.globalAlpha=1;
        // Gouden sandaalriempjes: breed genoeg om te lezen op kleine schaal.
        ctx.strokeStyle=gold; ctx.lineCap='round';
        ctx.lineWidth=2.2; ctx.globalAlpha=.88;
        ctx.beginPath(); ctx.moveTo(-4,-6); ctx.lineTo(6,5); ctx.stroke();  // diagonaal riem 1
        ctx.beginPath(); ctx.moveTo(4,-6); ctx.lineTo(13,3); ctx.stroke();  // diagonaal riem 2
        ctx.lineWidth=1.8; ctx.globalAlpha=.7;
        ctx.beginPath(); ctx.moveTo(-11,0); ctx.quadraticCurveTo(-3,-8,6,-5); ctx.stroke(); // wreef-boog
        ctx.globalAlpha=1; ctx.lineCap='butt';
        ctx.restore();
      }

      // 1) Paper/digital bridge behind the existing head: halo, hood edge, and floating veil.
      // Dit frame maakt het hoofd onderdeel van dezelfde paper-couture zonder ogen/mond te veranderen.
      ctx.save();
      ctx.globalAlpha = .18;
      ellipse(180,132,110,122,starBlue);
      ctx.globalAlpha = .12;
      ellipse(180,132,92,104,C.magenta);
      ctx.globalAlpha = 1;

      const halo=[
        ['M',84,223],['C',65,166,78,82,120,38],['C',150,7,214,7,244,38],
        ['C',286,82,295,166,276,223],['C',250,204,222,193,180,194],
        ['C',138,193,110,204,84,223]
      ];
      if (RICH_PALETTE) paper(halo, mixHex(vellum,'#182638',.28), 501, {fibers:16, fiber:mixHex(stitch,gold,.30), fiberAlpha:.10, stitchAlpha:.16, hi:mixHex(pearl,C.cyan4,.08), hiAlpha:.18, lw:2});

      const innerHalo=[
        ['M',103,214],['C',91,165,100,94,132,56],['C',156,28,206,28,229,56],
        ['C',260,94,269,165,257,214],['C',237,199,214,189,180,190],
        ['C',146,189,123,199,103,214]
      ];
      if (RICH_PALETTE) strokeCommands(innerHalo, gold, 1, .36, true);
      strokeCommands([['M',92,222],['C',119,232,148,237,180,237],['C',212,237,241,232,268,222]], C.cyan4, 1, .16, true);

      // Soft side veils: verbinden hoofd-silhouet met mantel en halen de toy-look weg.
      const veilL=[['M',105,195],['C',82,259,91,355,118,452],['C',132,393,139,308,137,226],['C',126,211,116,201,105,195]];
      const veilR=[['M',255,195],['C',278,259,269,355,242,452],['C',228,393,221,308,223,226],['C',234,211,244,201,255,195]];
      if (RICH_PALETTE) {
      paper(veilL, mixHex(vellumLite,teal,.32), 511, {alpha:.80, fibers:9, fiberAlpha:.08, stitchAlpha:.10, hi:mixHex(C.cyan4,C.white,.15), hiAlpha:.10, lw:1.5});
      paper(veilR, mixHex(vellumLite,nightViolet,.28), 512, {alpha:.80, fibers:9, fiberAlpha:.08, stitchAlpha:.10, hi:mixHex(C.magenta,C.white,.15), hiAlpha:.10, lw:1.5});
      }

      // small celestial ornaments around the head frame
      if (RICH_PALETTE) star(112,76,6,gold,.52);
      star(247,89,5,C.cyan4,.38); star(264,178,4,C.magenta,.40);
      crescent(180,48,8,mixHex(C.white,C.cyan4,.45),.5);
      ctx.globalAlpha=.20;
      line(180,56,180,205,1,gold);
      ctx.globalAlpha=1;
      ctx.restore();

      // 2) Volwassen vrouwelijke body rig: flowing paper layers, hourglass silhouette, jewelry-like joints.
      ctx.save();
      ctx.translate(180, 332 + bob);
      ctx.rotate(sway);
      ctx.translate(-180, -332);

      // shared glow / shadow
      ctx.globalAlpha=.22; ellipse(180,604,70,10,C.cyan4);
      ctx.globalAlpha=.09; ellipse(180,392,118,230,starBlue);
      ctx.globalAlpha=.08; ellipse(180,285,82,72,C.magenta);
      ctx.globalAlpha=1;

      const shoulderL={x:125,y:246 + breath*.22};
      const shoulderR={x:235,y:246 + breath*.22};
      // Armen via forward-kinematics vanuit de schouder-broches (de pivot-scharnieren).
      // Rusthoeken reproduceren exact de oude stand; gebaren + idle zijn deltas erbovenop.
      const P = PoseBrain.cur;
      const idleS = Math.sin(t*.76)*.018*rm;        // vervangt 'walk'
      const idleE = Math.sin(t*.31+1.1)*.026*rm;    // vervangt 'oracleDip'
      const aL1 = ARM.L1 + P.ls + idleS;
      const aL2 = ARM.L2 + P.ls + P.le + idleE;
      const aR1 = ARM.R1 + P.rs - idleS;
      const aR2 = ARM.R2 + P.rs + P.re - idleE;
      const elbowL={x:shoulderL.x + Math.cos(aL1)*ARM.Lupper, y:shoulderL.y + Math.sin(aL1)*ARM.Lupper};
      const elbowR={x:shoulderR.x + Math.cos(aR1)*ARM.Rupper, y:shoulderR.y + Math.sin(aR1)*ARM.Rupper};
      const wristL={x:clamp(elbowL.x + Math.cos(aL2)*ARM.Lfore, 40, 320), y:clamp(elbowL.y + Math.sin(aL2)*ARM.Lfore, 300, 470)};
      const wristR={x:clamp(elbowR.x + Math.cos(aR2)*ARM.Rfore, 40, 320), y:clamp(elbowR.y + Math.sin(aR2)*ARM.Rfore, 300, 470)};
      // Trage gewichtsverplaatsing (contrapposto) — onafhankelijk van de gedeelde sway, geeft de benen leven.
      const wshift = Math.sin(t * .42 + .6) * rm;
      const hipL={x:151 + wshift*1.8, y:405};
      const hipR={x:209 + wshift*1.8, y:405};
      const kneeL={x:143 + walk*8 + wshift*3.2, y:492};
      const kneeR={x:217 - walk*8 + wshift*3.2, y:492};
      const ankleL={x:135 + walk*7 + wshift*3.8, y:566};
      const ankleR={x:225 - walk*7 + wshift*3.8, y:566};

      // Back cape: a long, ethereal paper silhouette rather than a wooden puppet body.
      const cape=[
        ['M',111,238],['C',134,214,163,207,180,214],['C',197,207,226,214,249,238],
        ['C',274,315,263,471,236,589],['C',216,602,195,590,180,565],
        ['C',165,590,144,602,124,589],['C',97,471,86,315,111,238]
      ];
      if (RICH_PALETTE) {
      paper(cape, mixHex(deepTeal,nightViolet,.16), 601, {alpha:.72, fibers:18, fiberAlpha:.075, stitchAlpha:.10, hi:mixHex(tealLit,C.white,.05), hiAlpha:.10, lw:2});
      }

      // Mysterieuze mantel: translucent diep-indigo, valt achter het lichaam maar vóór het ruimte-verkeer,
      // zodat de schepen er spookachtig doorheen schemeren. Lichte deining in de zoom.
      const mSway = Math.sin(t * .5) * 4 * rm;
      const mantle=[
        ['M',128,242],
        ['C',92,300,80,452,94 + mSway,604],
        ['C',132,612,160,610,180,604],
        ['C',200,610,228,612,266 - mSway,604],
        ['C',280,452,268,300,232,242],
        ['C',210,234,150,234,128,242]
      ];
      paper(mantle, mixHex(nightViolet, voidBlue, .42), 590, {alpha:.30, fibers:16, fiberAlpha:.04, stitchAlpha:.03, hi:mixHex(C.cyan4,C.white,.12), hiAlpha:.10, lw:1.5});

      // Samenhangende couture-stofkleur (inkt) + een iets diepere tint, voor mouwen, rok en bodice.
      const INK = mixHex(deepTeal, nightViolet, .5);
      const INKdeep = mixHex(INK, C.black, .16);

      // Legs: long and elegant, visible through high split paper panels.
      segment(hipL,kneeL,21,16,mixHex(skinPaper,vellumDark,.08),701,{fibers:6, stitchAlpha:.10, hi:mixHex(skinPaper,C.white,.10), lw:2});
      segment(kneeL,ankleL,16,11,mixHex(skinPaper,teal,.07),702,{fibers:5, stitchAlpha:.10, hi:mixHex(skinPaper,C.cyan4,.06), lw:2});
      segment(hipR,kneeR,21,16,mixHex(skinPaper,vellumDark,.08),703,{fibers:6, stitchAlpha:.10, hi:mixHex(skinPaper,C.white,.10), lw:2});
      segment(kneeR,ankleR,16,11,mixHex(skinPaper,teal,.07),704,{fibers:5, stitchAlpha:.10, hi:mixHex(skinPaper,C.cyan4,.06), lw:2});
      foot(ankleL.x-6,ankleL.y+18,-1, .14 + walk*.08 + wshift*.05);
      foot(ankleR.x+6,ankleR.y+18, 1,-.14 - walk*.08 + wshift*.05);
      // gouden enkelbanden
      ctx.lineWidth=2; ctx.strokeStyle=gold; ctx.globalAlpha=.7;
      ctx.beginPath(); ctx.ellipse(ankleL.x,ankleL.y+6,5,3,0,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(ankleR.x,ankleR.y+6,5,3,0,0,Math.PI*2); ctx.stroke();

    function drawEye(cx,cy,side,p){
      const lidVal  = side < 0 ? EyeBrain.leftLid  : EyeBrain.rightLid;
      const combined = Math.min(1, Math.max(blink.strength, lidVal));
      let eyeP = p.eye;
      if (EyeBrain.state === 'wideOpen') eyeP = Math.min(1.38, eyeP * 1.28);
      if (EyeBrain.state === 'fourthWall') eyeP = 1.04;
      const open = clamp(eyeP * (1 - combined * .93), .06, 1.38);
      const ew  = 52 + p.brow*2 + p.anger*-5;
      const eh  = 16*open;
      const irisX = cx + gaze.x*4.8, irisY = cy + gaze.y*3.2;
      // Fourth-wall: blik dwingen naar camera-centrum
      const dIrisX = EyeBrain.state === 'fourthWall' ? cx      : irisX;
      const dIrisY = EyeBrain.state === 'fourthWall' ? cy-.5   : irisY;
      eyeShape(cx,cy,ew+8,eh+5,C.black);
      eyeShape(cx,cy,ew,eh,open<.11?C.black:C.white);
      if(open>=.11){
        // Dynamische pupil: PupilBrain bepaalt de grootte
        const pm = side < 0 ? PupilBrain.left : PupilBrain.right;
        const ir = clamp(pm*.92,.55,1.22);
        const pr = clamp(pm,.38,1.62);
        ellipse(dIrisX,dIrisY,8.4*ir,8.8*clamp(open,.35,1.1)*ir,C.green1);
        ellipse(dIrisX+side*.5,dIrisY+.6,4.1*pr,4.7*clamp(open,.35,1)*pr,C.black);

    function roundedBubble(x,y,w,h,r,tailX,tailY,side='bottom',tailBaseX){
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      if(side==='top'){
        const bx=clamp(tailBaseX!==undefined?tailBaseX:tailX,x+r+8,x+w-r-8);
        ctx.lineTo(bx-8,y); ctx.lineTo(tailX,tailY); ctx.lineTo(bx+8,y);
      }
      ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      if(side==='right'){
        const ty=clamp(tailY,y+r+6,y+h-r-6);
        ctx.lineTo(x+w,ty-7); ctx.lineTo(tailX,tailY); ctx.lineTo(x+w,ty+7);
      }
      ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      if(side==='bottom'){
        const tx=clamp(tailX,x+r+8,x+w-r-8);
        ctx.lineTo(tx+8,y+h); ctx.lineTo(tailX,tailY); ctx.lineTo(tx-8,y+h);
      }
      ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
      ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
    }

    function splitBubbleLines(text, maxPx, font){
      // Gebruik ctx.measureText voor exacte breedte — nooit meer overflow.
      ctx.font = font;
      const words = text.split(' ');
      const lines = []; let line = '';
      for(const w of words){
        const test = line ? line+' '+w : w;
        if(ctx.measureText(test).width > maxPx && line){
          lines.push(line); line = w;
        } else { line = test; }
      }
      if(line) lines.push(line);
      return lines;
    }

    function visibleCanvasRect(){
      // Bij fullscreen-cover is het canvas breder dan het scherm op smalle iPhones.
      // Deze functie vertaalt de zichtbare viewport terug naar canvas-coördinaten,
      // zodat UI-elementen zoals tekstballonnen nooit in de weggecropte randen vallen.
      const r = canvas.getBoundingClientRect();
      const sx = r.width / W;
      const sy = r.height / H;
      const vw = window.innerWidth || document.documentElement.clientWidth || r.width;
      const vh = window.innerHeight || document.documentElement.clientHeight || r.height;
      return {
        left:   clamp((0  - r.left) / sx, 0, W),
        right:  clamp((vw - r.left) / sx, 0, W),
        top:    clamp((0  - r.top)  / sy, 0, H),
        bottom: clamp((vh - r.top)  / sy, 0, H)
      };
    }

    function drawSpeechBubble(now){
      const a=speechAlpha(now); if(a<=.001) return;
      const vis=visibleCanvasRect();
      const fontSize=15, padX=14, padY=11, lineH=19;
      const font=fontSize+'px monospace';

      // Ballon breed onder het gezicht; mag het lichaam overlappen.
      const x       = vis.left  + 8;
      const bubbleW = vis.right - vis.left - 16;
      const chinY   = H * .415;   // net onder de kin / halorand

      // Tekst wrappen op werkelijke pixelbreedte.
      const lines = splitBubbleLines(speech.text, bubbleW - padX*2, font);
      const bubbleH = padY*2 + lines.length*lineH;
      const y = chinY + 6;   // ballon begint direct onder het gezicht

      // Staartbasis centraal op ballon; punt leunt naar links richting haar mond.
      const tailBaseX = x + bubbleW * .50;
      const tailX     = x + bubbleW * .50;
      const tailY     = y - 16;

      const wobX=Math.sin(now*.0013+speech.phase)*.6;
      const wobY=Math.sin(now*.002 +speech.phase)*.6;

      ctx.save(); ctx.globalAlpha=a*.94;
      roundedBubble(x+wobX,y+wobY,bubbleW,bubbleH,9,tailX,tailY,'top',tailBaseX);
      ctx.fillStyle=C.bubbleFill; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle=C.bubble; ctx.stroke();
      ctx.fillStyle=C.bubble; ctx.font=font; ctx.textBaseline='top';
      for(let i=0;i<lines.length;i++) ctx.fillText(lines[i],x+wobX+padX,y+wobY+padY+i*lineH);
      ctx.restore();
    }

    function drawNature(now){
      SceneBrain.tick();
      const light = WorldBrain.time.light;
      const t     = now * .001;
      const isDay = light > .45;
      const gnd   = H * .80;
      const sc    = SceneBrain;

      // Kleuren: dag/nacht × biome.
      const treeD  = isDay ? '#0e2814' : '#040a06';
      const treeM  = isDay ? '#1a3c1e' : '#080f09';
      const treeH  = isDay ? sc.pal.treeHi : '#101a12';
      const rockD  = isDay ? '#2a3830' : '#111a16';
      const rockM  = isDay ? '#3a5048' : '#1a2820';
      const rockHi = isDay ? '#80a898' : '#283830';
      const hillF  = isDay ? mixHex('#1a4a28','#2a6040',light*.6) : '#06110a';
      const hillM  = isDay ? mixHex('#14381e','#1e5030',light*.5) : '#080f0b';
      const waterS = isDay ? mixHex('#3a8ab8','#80c8f0',light*.7) : '#0a1828';
      const waterD = isDay ? '#1a5080' : '#04090f';
      const mistC  = sc.pal.mistTint || 'rgba(200,230,210,';

      // Hulp: y-positie op een heuvelkam interpoleren (genormaliseerde punten → pixels).
      const hillY=(pts,xFrac)=>{
        const xAbs=xFrac*W;
        for(let i=0;i<pts.length-1;i++){
          const ax=pts[i].xf*W, bx=pts[i+1].xf*W;
          if(xAbs>=ax&&xAbs<=bx){
            const f=(xAbs-ax)/(bx-ax);
            return gnd + (pts[i].yf+(pts[i+1].yf-pts[i].yf)*f)*H;
          }
        }
        return gnd + pts[pts.length-1].yf*H;
      };

      // ── Verre bergkam ───────────────────────────────────────────────────────
      const drawHill=(pts,col,a)=>{
        ctx.globalAlpha=a; ctx.fillStyle=col;
        ctx.beginPath(); ctx.moveTo(0,H);
        for(const p of pts) ctx.lineTo(p.xf*W, gnd+p.yf*H);
        ctx.lineTo(W,H); ctx.closePath(); ctx.fill(); ctx.globalAlpha=1;
      };
      drawHill(sc.hillA, hillF, .9);
      drawHill(sc.hillB, hillM, .95);

      // ── Kleine bomen op de bergflanken ────────────────────────────────────
      const tinyTree=(x,y,h,phase)=>{
        const sway=Math.sin(t*.55+phase)*.5;
        ctx.globalAlpha=.85; ctx.fillStyle=treeD; ctx.fillRect(x-1,y,2,h*.28);
        ellipse(x+sway,     y-h*.08, h*.38, h*.30, treeM);
        ellipse(x+sway*.7,  y-h*.28, h*.26, h*.22, treeH);
        ctx.globalAlpha=1;
      };
      const baseH = H * .026;
      for(const tr of sc.trees){
        const pts = tr.layer==='A' ? sc.hillA : sc.hillB;
        const y   = hillY(pts, tr.xf);
        const h   = baseH * tr.hMul;
        tinyTree(tr.xf*W, y-h*.35, h, tr.phase);
      }

      // ── Rotsen ─────────────────────────────────────────────────────────────
      for(const rk of sc.rocks){
        const col = rk.dark ? rockD : rockM;
        const x=rk.xf*W, y=gnd+rk.yOff*H, w=rk.wf*W, h=rk.hf*H;
        ctx.fillStyle=col;
        ctx.beginPath();
        ctx.moveTo(x,y+h);
        ctx.quadraticCurveTo(x+w*.08,y+h*.2,x+w*.26,y);
        ctx.quadraticCurveTo(x+w*.50,y-h*.20,x+w*.70,y+h*.10);
        ctx.quadraticCurveTo(x+w*.90,y+h*.36,x+w,y+h);
        ctx.closePath(); ctx.fill();
        ctx.globalAlpha=.26; ctx.fillStyle=rockHi;
        ctx.beginPath();
        ctx.moveTo(x+w*.22,y+h*.18); ctx.quadraticCurveTo(x+w*.40,y-h*.07,x+w*.62,y+h*.20);
        ctx.lineTo(x+w*.26,y+h*.28); ctx.closePath(); ctx.fill();
        ctx.globalAlpha=1;
      }

      // ── Grondvlak ──────────────────────────────────────────────────────────
      // Fullscreen-versie: geen harde zwarte onderbalk. De voorgrond blijft donker,
      // maar behoudt kleur tot aan de home-indicator/safe-area.
      const gg=ctx.createLinearGradient(0,gnd,0,H+80);
      gg.addColorStop(0,isDay?'#1c4a2b':'#08160e');
      gg.addColorStop(.58,isDay?'#0e3328':'#061019');
      gg.addColorStop(1,isDay?'#0a3c56':'#092238');
      ctx.fillStyle=gg; ctx.fillRect(0,gnd,W,H+80-gnd);
      ctx.globalAlpha = isDay ? .10 : .06;
      ellipse(W*.50, H+18, W*.62, 58, isDay ? '#57b6c8' : C.cyan4);
      ctx.globalAlpha = 1;

      // ── Kronkelend stroompje (alleen als SceneBrain er één genereerde) ─────
      if(sc.stream){
        const s=sc.stream;
        const sy=gnd+H*.04;
        const wobble=Math.sin(t*.28)*3;
        const sx=s.startX*W, ex=s.endX*W;
        const c1x=s.cp1x*W, c1y=sy+s.cp1y*H;
        const c2x=s.cp2x*W, c2y=sy+s.cp2y*H;
        const endY=sy+s.cp2y*H+H*.04;

        // Waterlichaam
        const wg=ctx.createLinearGradient(0,sy,0,H);
        wg.addColorStop(0,waterS); wg.addColorStop(1,waterD);
        ctx.fillStyle=wg; ctx.globalAlpha=.80;
        ctx.beginPath();
        ctx.moveTo(sx+wobble, sy);
        ctx.bezierCurveTo(c1x,c1y, c2x,c2y, ex-wobble,endY);
        ctx.lineTo(ex,H); ctx.lineTo(sx+W*.1,H); ctx.closePath(); ctx.fill();
        ctx.globalAlpha=1;

        // Stroomrand — ademt licht
        ctx.lineWidth=1.4;
        ctx.strokeStyle=isDay?'rgba(180,230,255,.55)':'rgba(20,60,110,.45)';
        ctx.beginPath();
        ctx.moveTo(sx+wobble,sy);
        ctx.bezierCurveTo(c1x,c1y-3, c2x,c2y-3, ex-wobble,endY-3);
        ctx.stroke();

        // Stromende rimpels: offset driftet downstream (hoog→laag = rechts→links).
        // Elke rimpel heeft een eigen fase zodat ze niet synchroon lopen.
        ctx.lineWidth=.9; ctx.lineCap='round';
        const rippleN = 7;
        const streamLen = Math.hypot(ex-sx, endY-sy); // px lengte van de stroomrichting
        for(let i=0;i<rippleN;i++){
          // Stroomfase: elke rimpel op een eigen positie langs het stroompje.
          const flow = ((t * .38 + i / rippleN) % 1); // 0→1 = bovenstrooms→benedenstrooms
          // Interpoleer positie op de bezier (lineaire benadering via t).
          const bx = sx + (ex-sx)*flow + wobble*(1-flow);
          const by = sy + (endY-sy)*flow;
          // Breedte van de rimpel schaalt met positie (breder benedenstrooms).
          const rw = W * (.04 + flow * .06);
          const alpha = (.22 - flow * .06) * (isDay ? 1.2 : .8);
          ctx.strokeStyle = isDay
            ? `rgba(220,245,255,${alpha.toFixed(2)})`
            : `rgba(40,90,150,${alpha.toFixed(2)})`;
          ctx.globalAlpha = 1;
          ctx.beginPath();
          ctx.moveTo(bx - rw*.5, by);
          ctx.quadraticCurveTo(bx, by + 1.5, bx + rw*.5, by);
          ctx.stroke();
        }
        ctx.lineCap='butt';

        // Glinstering: kleine flikkerlichties op het oppervlak.
        const sparkN = 5;
        for(let i=0;i<sparkN;i++){
          const sf = ((t * .22 + i * .37 + hash(sc.dayId * .001 + i)) % 1);
          const sx2 = sx + (ex-sx)*sf + wobble*.5;
          const sy2 = sy + (endY-sy)*sf;
          const sparkA = Math.sin(t * 2.1 + i * 1.7) * .5 + .5;
          ctx.globalAlpha = sparkA * (isDay ? .55 : .28);
          ellipse(sx2, sy2, 1.4, .8,
            isDay ? mixHex(waterS,'#ffffff',.7) : mixHex(waterS,'#aaddff',.4));
        }
        ctx.globalAlpha=1;
      }

      // ── Grondmist ──────────────────────────────────────────────────────────
      const mg=ctx.createLinearGradient(0,gnd-H*.08,0,gnd+H*.05);
      mg.addColorStop(0,'rgba(0,0,0,0)');
      mg.addColorStop(.55,mistC+(isDay?.12:'.10)'));
      mg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=mg; ctx.fillRect(0,gnd-H*.08,W,H*.13);
    }

    function drawEntity(now){
      const entityAlpha = WardrobeBrain.opacity == null ? 1 : WardrobeBrain.opacity;
      if (entityAlpha <= .01) return;
      const t=now*.001, p=expr;
      const FRAME_SCALE=.92, FIGURE_DROP=16;   // iets kleiner + lager: ruimte boven het hoofd, marge onder
      const breath=1+Math.sin(t*1.12)*.003;
      const driftX=motion.x+Math.sin(t*.37)*1.1+Math.sin(t*.19+1.2)*.7;
      const driftY=motion.y+Math.sin(t*.43+.8)*.8 + (WardrobeBrain.offsetY || 0) + FIGURE_DROP;
      const tilt=motion.tilt+Math.sin(t*.31)*.009 + Math.sin(t*.12+.5)*.005;
      ctx.save();
      ctx.globalAlpha *= entityAlpha;
      ctx.translate(W/2+driftX,H/2+driftY);
      ctx.rotate(tilt);
      ctx.scale(breath*FRAME_SCALE,(1+(breath-1)*.25)*FRAME_SCALE);
      ctx.translate(-W/2,-H/2);
      drawHairBack(); drawShouldersAndNeck(now); drawFaceBase(); drawHairFront(); drawBrows(p);
      drawEye(146,107,-1,p); drawEye(207,107,1,p); drawNose(); drawMouth(p,now); drawEffects(p,now);
      rect(242,118,3,17,C.black);
      // Gouden hangende oorbellen (ná gezicht/haar zodat ze vóór alles vallen).
      (() => {
        const gold='#d5a64d', goldLo='#57370a', gem=mixHex(C.cyan4,'#7b62ff',.30);
        for (const ex of [122, 244]) {
          ctx.strokeStyle=gold; ctx.lineWidth=1.2; ctx.globalAlpha=.8;
          ctx.beginPath(); ctx.moveTo(ex,178); ctx.lineTo(ex,193); ctx.stroke();
          ctx.globalAlpha=.92; ellipse(ex,198,2.7,3.3,goldLo); ellipse(ex,197,1.8,2.2,gold); ellipse(ex-0.5,196,.8,.8,gem);
        }
        ctx.globalAlpha=1;
      })();
      ctx.restore();
    }

    function applyGlitch(now){
      if(REDUCED || now>glitchUntil) return;
      const intensity=clamp((glitchUntil-now)/200,.15,1);
      const src=ctx.getImageData(0,0,W,H);
      for(let i=0;i<6;i++){
        const y=Math.floor(hash(now*.01+i*20)*H);
        const h=1+Math.floor(hash(now*.03+i*8)*5);
        const shift=Math.floor((hash(now*.02+i*99)-.5)*14*intensity);
        ctx.putImageData(src,shift,0,0,y,W,h);
      }
      ctx.globalAlpha=.35*intensity;
      rect(73+hash(now)*200,73+hash(now*.2)*92,30,2,C.green1);
      rect(82+hash(now*.4)*190,100+hash(now*.6)*72,18,1,C.magenta);
      ctx.globalAlpha=1;
    }

    function drawDebug(now){
      if (!DEBUG || !dbgEl) return;
      const w = WorldBrain.weather.visual;
      dbgEl.textContent = [
        'Wandering Art v13 ethereal oracle',
        'mood ' + dominantMood() + '  val ' + emotion.valence.toFixed(2) + '  cur ' + emotion.curiosity.toFixed(2),
        'weather ' + WorldBrain.weather.status + ' / ' + (WorldBrain.weather.mood || 'clear') + '  t ' + Math.round(WorldBrain.weather.temperature) + 'c',
        'eye ' + EyeBrain.state + '  pupL ' + PupilBrain.left.toFixed(2) + '  pupR ' + PupilBrain.right.toFixed(2),
        'ships ' + ShipBrain.ships.length + ' cosmic ' + CosmicBrain.events.length + ' news ' + NewsBrain.keywords.length,
        'audio ' + (AudioBrain.enabled ? (AudioBrain.started ? ('on root ' + AudioBrain.root.toFixed(1) + 'Hz') : 'wacht op gesture') : 'uit'),
        'music ' + (MusicBrain.initialized ? (MusicBrain.scale + ' ' + (MU_CHORDS[MusicBrain.chord]?.n||'—') + ' ' + MusicBrain.bpm + 'bpm ' + MusicBrain.bpb + '/4 pat:' + MusicBrain.pattern) : 'init...'),
        'visitor ' + VisitorBrain.phase + ' ' + VisitorBrain.archetype,
      ].join('\n');
    }

    function update(now){
      const dt=Math.min(.05,(now-lastNow)/1000 || .016);
      lastNow=now;
      SceneBrain.tick();
      updateTimeBrain(now);

      // Begroetings-hook: triggered door de "begroeten"-knop.
      window._greet = () => {
        const now = performance.now();
        GreetBrain.active = true;
        GreetBrain.start  = now;
        // Begroeting via de echte speech API
        speech.active   = true;
        speech.start    = now + 300;
        speech.duration = 5000;
        speech.text     = 'hallo ... welkom';
        speech.meaningful = true;
        speech.phase    = Math.random() * 999;
        speech.mood     = 'happy';
      };
      updateWeatherBrain(now,dt);
      updateEmotion(now,dt);
      updateMemory(dt);
      updateWardrobe(now,dt);
      updateBlink(now);
      updatePupils(now, dt);
      updateEyeBrain(now);
      updateRarity(now, dt);
      updateVisitor(now, dt);
      updateGaze(now,dt);
      updateMotion(now,dt);
      updatePose(now,dt);
      updateSpeech(now);
      updateShips(now,dt);
      updateDriftGlyphs(now,dt);
      updateBackgroundEvents(now);
      updateCosmic(now);
      maybeGlitch(now);
      AudioBrain.tick(now);
      if (MusicBrain.initialized) mu_syncToMood();
      saveMemory(now);
    }

    function render(now){
      update(now);
      drawBackground(now);
      drawNature(now);
      drawCosmic(now);
      drawMoodAura(now);
      drawVisitor(now);
      drawEntity(now);
      drawWeatherFront(now);
      applyGlitch(now);
      // Tier-7 paletteFlash: subtiele difference-blend over het hele canvas
      if (RarityBrain.paletteFlash){
        const pf = RarityBrain.paletteFlash;
        const pt = (now - pf.start) / pf.dur;
        if (pt < 1){
          const intensity = Math.sin(pt * Math.PI) * .12;
          ctx.globalCompositeOperation='difference';
          ctx.fillStyle='#ffffff'; ctx.globalAlpha=intensity;
          ctx.fillRect(0,0,W,H);
          ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
        } else { RarityBrain.paletteFlash=null; }
      }
      drawSpeechBubble(now);
      drawDebug(now);
    }

    let rafId = null;
    function frame(now){ render(now); rafId = requestAnimationFrame(frame); }
    function startLoop(){ if (rafId == null) { lastNow = performance.now(); rafId = requestAnimationFrame(frame); } }
    function stopLoop(){ if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; } }
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopLoop(); AudioBrain.suspend();
        if (MusicBrain.initialized){ clearInterval(MusicBrain.handle); MusicBrain.handle=null; }
      } else {
        startLoop(); AudioBrain.resume();
        if (MusicBrain.initialized && !MusicBrain.handle){
          MusicBrain.nextBeat = AudioBrain.ctx.currentTime + .3;
          MusicBrain.handle = setInterval(mu_tick, MusicBrain.TICK);
        }
      }
    });

    loadMemory();
    initWardrobe();
    fetchNewsKeywords(true);
    setInterval(() => fetchNewsKeywords(false), 1000 * 60 * 5);

    // Eenmalige drempel: één gesture ontgrendelt audio, daarna nooit meer UI.
    (() => {
      const veil = document.getElementById('enter');
      if (!AudioBrain.enabled) { if (veil) veil.remove(); return; }
      let unlocked = false;
      const showAt = setTimeout(() => { if (!unlocked && veil) veil.classList.add('show'); }, 1500);
      function unlock() {
        if (unlocked) return; unlocked = true; clearTimeout(showAt);
        AudioBrain.start(); AudioBrain.resume();
        if (veil) { veil.classList.remove('show'); veil.classList.add('gone'); setTimeout(() => veil.remove(), 1600); }
        // Zwaai en zeg hallo
        if (window._greet) window._greet();
        window.removeEventListener('pointerdown', unlock);
        window.removeEventListener('keydown', unlock);
        window.removeEventListener('touchstart', unlock);
      }
      // Alleen de knop zelf triggert unlock (niet heel scherm)
      if (veil) veil.addEventListener('pointerdown', e => { e.stopPropagation(); unlock(); });
      window.addEventListener('keydown', unlock, { once:true });
    })();

    if (STATIC_PREVIEW) render(performance.now() + 1600);
    else startLoop();

        {id:'r_cascade',      l:'Cascade',          c:'orakel', r:3, s:'⟳'},
        {id:'r_rareTear',     l:'Zeldzame traan',   c:'orakel', r:4, s:'◬'},
        {id:'r_paletteFlash', l:'Paletflits',       c:'orakel', r:4, s:'◍'},
        {id:'r_notices',      l:'Zij ziet je',      c:'orakel', r:5, s:'◉'},
        {id:'r_worldShift',   l:'Wereldverschuiving',c:'orakel',r:5, s:'⟡'},
        {id:'r_visitor',      l:'Bezoeker verschijnt',c:'orakel',r:5,s:'⟢'},
      ];
      const STARS = ['','★','★★','★★★','★★★★','★★★★★'];
      const SEEN_KEY  = 'wa_seen_v1';
      const SEEDS_KEY = 'wa_seeds_v1';
      let seen={}, seeds=[];
      const load=()=>{
        try{ seen =JSON.parse(safeStorage.get(SEEN_KEY) ||'{}'); }catch(e){ seen={}; }
        try{ seeds=JSON.parse(safeStorage.get(SEEDS_KEY)||'[]'); }catch(e){ seeds=[]; }
      };
      load();
      window.UIBrain={ mark(id){ if(seen[id])return; seen[id]=Date.now(); safeStorage.set(SEEN_KEY,JSON.stringify(seen)); } };

      // ── Grimoire renderen ────────────────────────────────────────────────
      const renderLog=()=>{
        const body=document.getElementById('wa-log-body');
        const found=CATALOG.filter(e=>seen[e.id]).length;
        const curId=SceneBrain.dayId;
        const savedHTML=seeds.length
          ? `<div class="seed-grid">${seeds.map((s,i)=>`
              <div class="seed-pill${s.dayId===SceneBrain.dayId?' active':''}" data-i="${i}">
                ${s.label}<br><span class="sd">${s.dayId}</span>
              </div>`).join('')}</div>`
          : `<div style="font-size:12px;color:rgba(105,255,243,.35);margin-top:6px;letter-spacing:.10em;">geen opgeslagen seeds</div>`;

        body.innerHTML=`
          <div style="font-size:13px;letter-spacing:.14em;color:rgba(105,255,243,.5);margin-bottom:16px;">
            ${found} / ${CATALOG.length} ontdekt</div>

          <div class="wa-sec">· dagelijkse scène ·</div>
          <div style="font-size:13px;color:rgba(105,255,243,.5);margin-bottom:10px;">
            vandaag · <span style="color:#d5a64d;">${curId}</span>
            &nbsp;·&nbsp; <span style="color:rgba(105,255,243,.7);">${SceneBrain.biome}</span>
          </div>
          <button class="wa-btn gold" id="lg-save-seed">✦ bewaar deze seed</button>
          ${savedHTML}

          ${['kosmisch','vloot','bezoekers','orakel'].map(cat=>{
            const items=CATALOG.filter(e=>e.c===cat);
            return `<div class="wa-sec">· ${cat} ·</div>
            <div class="ev-grid">${items.map(e=>{
              const sv=seen[e.id];
              const d=sv?new Date(sv).toLocaleDateString('nl',{day:'numeric',month:'short'}):'';
              return `<div class="ev-card${sv?' seen':''}">
                <div class="ev-sym">${e.s}</div>
                <div class="ev-name">${e.l}</div>
                <div class="ev-stars">${STARS[e.r]}</div>
                <div class="ev-badge">${sv?'gezien · '+d:'nog niet gezien'}</div>
              </div>`;
            }).join('')}</div>`;
          }).join('')}`;

        // Seed-handlers
        document.getElementById('lg-save-seed').addEventListener('click',()=>{
          if(!seeds.find(s=>s.dayId===curId)){
            seeds.push({label:SceneBrain.biome, dayId:curId});
            safeStorage.set(SEEDS_KEY,JSON.stringify(seeds));
            renderLog();
          }
        });
        document.querySelectorAll('.seed-pill').forEach(el=>{
          el.addEventListener('click',()=>{
            const s=seeds[Number(el.dataset.i)];
            SceneBrain._override=true;
            SceneBrain._gen(s.dayId);
            renderLog();
          });
        });
      };

      // ── Open/sluit ──────────────────────────────────────────────────────
      const logEl=document.getElementById('wa-log');
      const openLog=()=>{ if(logEl.classList.contains('open'))return; renderLog(); logEl.classList.add('open'); };
      const closeLog=()=>logEl.classList.remove('open');
      const toggleLog=()=>logEl.classList.contains('open') ? closeLog() : openLog();

      // ── Enkele tap als toggle ────────────────────────────────────────────
      // Eerste tap opent het grimoire, de volgende tap sluit het weer. Geen aparte sluitknop.
      let tapTimer=null, uiActive=false;
      const waitU=setInterval(()=>{ if(!document.getElementById('enter')){ uiActive=true; clearInterval(waitU); }},300);
      window.addEventListener('pointerup',()=>{
        if(!uiActive)return;
        clearTimeout(tapTimer);
        tapTimer=setTimeout(toggleLog,120);
      });

      // ── Event-tracking hooks ────────────────────────────────────────────
      let _ks=new Set(), _kc=new Set();
      setInterval(()=>{
        (ShipBrain.ships||[]).forEach(s=>{ if(!_ks.has(s.id)){_ks.add(s.id);UIBrain.mark('ship_'+(s.archetype||'drone'));} });
        (CosmicBrain.events||[]).forEach(e=>{ const k=e.id||e.type; if(!_kc.has(k)){_kc.add(k);UIBrain.mark(e.type);} });
        if(VisitorBrain.phase==='visible'&&VisitorBrain.alpha>.5) UIBrain.mark('vis_'+(VisitorBrain.archetype||'cloaked'));
      },800);
      const _rLast={};
      RarityBrain.tiers.forEach(t=>{_rLast[t.name]=t.lastAt;});
      setInterval(()=>{ RarityBrain.tiers.forEach(t=>{ if(t.lastAt>(_rLast[t.name]||0)){_rLast[t.name]=t.lastAt;UIBrain.mark('r_'+t.name);} }); },500);
    })();

  })();
  </script>
</body>
</html>
