  function clamp(v, a = 0, b = 1) {

      mix(a[1], b[1], t),
      mix(a[2], b[2], t)

        const dx = cand.x - prev.x;
        const dy = cand.y - prev.y;
        if (dx * dx + dy * dy < minDist * minDist) {
          ok = false;
          break;
        }
      }

      if (!ok) continue;

      const scale = 1.55 + cand.score * 1.65 + hash1(cand.seed * 1000) * 0.55;
      chosen.push({
        ...cand,
        scale,
        glyph: chooseGlyph(cand.density, cand.edge, cand.seed, true),
        phase: hash1(cand.seed * 2000) * Math.PI * 2,
        jitter: (hash1(cand.seed * 3000) - 0.5) * 1.8
      });
    }

    state.accents = chosen;
    state.needsRebuild = false;
  }

  function rgba(color, a) {
    return `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${a})`;
  }

  function drawBackground(t) {
    ctx.fillStyle = `rgb(${CFG.bg[0]},${CFG.bg[1]},${CFG.bg[2]})`;
    ctx.fillRect(0, 0, state.w, state.h);

    const g = ctx.createRadialGradient(
      state.w * 0.50, state.h * 0.45, 0,
      state.w * 0.50, state.h * 0.48, Math.max(state.w, state.h) * 0.62
    );
    g.addColorStop(0, "rgba(45, 18, 68, 0.23)");
    g.addColorStop(0.45, "rgba(8, 8, 28, 0.16)");
    g.addColorStop(1, "rgba(0, 0, 0, 0)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, state.w, state.h);

    // Minimale ambient glyphs; bronbeeld is de compositie.
    ctx.font = `${state.fontSize * 0.82}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace`;
    const n = state.w < 700 ? 28 : 70;
    for (let i = 0; i < n; i++) {
      const seed = i * 17.313;
      const x = hash1(seed) * state.w;
      const y = (hash1(seed + 9.1) * state.h + t * (4 + hash1(seed + 3) * 8)) % state.h;
      const side = x / state.w;
      const color = colorBiasByX(side);
      const ch = CFG.ambientGlyphs[Math.floor(hash1(seed + 5.7) * CFG.ambientGlyphs.length)];
      const a = 0.015 + hash1(seed + 8.3) * 0.04;
      ctx.fillStyle = rgba(color, a);
      ctx.fillText(ch, x, y);
    }
  }

  function drawBase(t) {
    const breath = 0.92 + 0.08 * Math.sin(t * 0.9);
    const drift = Math.sin(t * 0.43) * 0.32;

    ctx.textBaseline = "top";
    ctx.textAlign = "left";
    ctx.font = `${state.fontSize}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace`;

    for (const cell of state.cells) {
      if (cell.density < 0.025) continue;

      // Langzame glyphvariatie; géén nerveus random geflikker.
      const shimmer = Math.sin(t * (0.45 + cell.seed * 0.42) + cell.seed * 9.0);
      let ch = cell.glyph;

      if (cell.density > 0.12 && shimmer > 0.985) {
        const alt = CFG.ramp;
        const idx = Math.floor(clamp(Math.pow(cell.density, 0.56) + cell.edge * 0.2 + cell.seed * 0.12, 0, 0.999) * alt.length);
        ch = alt[idx];
      }

      const alpha = clamp((cell.density * 0.88 + cell.edge * 0.10) * breath, 0, 0.92);

      // Kleine verticale “code rain” beweging in haar/lichte zones.
      const y = cell.y + drift * (cell.seed - 0.5) * (cell.density > 0.08 ? 1 : 0.3);

      ctx.fillStyle = rgba(cell.color, alpha);
      ctx.fillText(ch, cell.x, y);
    }
  }

  function drawMacro(t) {
    ctx.textBaseline = "top";
    ctx.textAlign = "center";

    for (const a of state.accents) {
      const pulse = 0.78 + 0.22 * Math.sin(t * 0.8 + a.phase);
      const font = state.fontSize * a.scale;
      const x = a.x + state.cellW * 0.5 + Math.sin(t * 0.32 + a.phase) * a.jitter;
      const y = a.y - font * 0.18 + Math.cos(t * 0.27 + a.phase) * a.jitter;

      // Glow onder de glyph.
      ctx.font = `${font}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace`;
      ctx.shadowColor = rgba(a.color, 0.85);
      ctx.shadowBlur = 10 + a.scale * 4;
      ctx.fillStyle = rgba(a.color, clamp(0.18 + a.density * 0.45 + a.edge * 0.20, 0.12, 0.75) * pulse);
      ctx.fillText(a.glyph, x, y);

      ctx.shadowBlur = 0;
    }
  }

  function drawPost(t) {
    ctx.shadowBlur = 0;

    // Zwarte scanlines, maar niet genoeg om gezicht te doden.
    ctx.fillStyle = "rgba(0,0,0,0.115)";
    for (let y = 0; y < state.h; y += 4) {
      ctx.fillRect(0, y, state.w, 1);
    }

    // Zeldzame horizontale storing.
    const glitch = Math.sin(t * 0.53) > 0.992;
    if (glitch) {
      const y = Math.floor(hash1(Math.floor(t * 5)) * state.h);
      const h = 1 + Math.floor(hash1(Math.floor(t * 7) + 11) * 4);
      ctx.fillStyle = "rgba(255,80,210,0.07)";
      ctx.fillRect(0, y, state.w, h);
    }

    // Vignette.
    const v = ctx.createRadialGradient(
      state.w * 0.5, state.h * 0.48, Math.min(state.w, state.h) * 0.14,
      state.w * 0.5, state.h * 0.5, Math.max(state.w, state.h) * 0.72
    );
    v.addColorStop(0, "rgba(0,0,0,0)");
    v.addColorStop(0.62, "rgba(0,0,0,0.08)");
    v.addColorStop(1, "rgba(0,0,0,0.72)");
    ctx.fillStyle = v;
    ctx.fillRect(0, 0, state.w, state.h);
  }

  function frame(now) {
    if (state.needsRebuild) rebuild();

    const interval = 1000 / CFG.targetFps;
    if (now - state.lastFrame < interval) {
      requestAnimationFrame(frame);
      return;
    }
    state.lastFrame = now;

    const t = now * 0.001;

    drawBackground(t);
    drawBase(t);
    drawMacro(t);
    drawPost(t);

    requestAnimationFrame(frame);
  }

  function onResize() {
    state.needsRebuild = true;
  }

  window.addEventListener("resize", onResize, { passive: true });
  window.addEventListener("orientationchange", () => {
    setTimeout(onResize, 250);
  }, { passive: true });

  // Debug: echte ASCII-data uit het huidige raster.
  window.exportAsciiFrame = function() {
    const out = [];
    let i = 0;
    for (let r = 0; r < state.rows; r++) {
      let line = "";
      for (let c = 0; c < state.cols; c++) {
        const cell = state.cells[i++];
        line += cell && cell.density > 0.025 ? cell.glyph : " ";
      }
      out.push(line);
    }
    return out.join("\n");
  };

  source.onload = () => {
    state.needsRebuild = true;
    requestAnimationFrame(frame);
  };
})();
</script>
</body>
</html>
