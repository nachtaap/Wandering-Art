<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wandering Art — ASCII Oracle</title>
  <style>
    :root{
      --bg:#02030a;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
    }

    body{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    canvas{
      display:block;
      width:100vw;
      height:100vh;
      background: radial-gradient(circle at center, #070912 0%, #03040a 55%, #010208 100%);
    }
  </style>
</head>
<body>
  <canvas id="ascii"></canvas>

  <script>
    const canvas = document.getElementById("ascii");
    const ctx = canvas.getContext("2d", { alpha: false });

    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    const CONFIG = {
      fontSize: 14,
      lineHeight: 1.08,
      faceCenterX: 0.5,
      faceCenterY: 0.49,

      // Kleuren: links warm rood/oranje, midden magenta, rechts blauw
      leftColor:  [255, 96, 64],
      midColor:   [255, 78, 190],
      rightColor: [72, 108, 255],

      backgroundColor: [2, 3, 10],

      // Een vrij bruikbare ramp voor “dense” ASCII shading
      ramp: " .,:;'`^\"~_-+=|/\\\\(){}[]1itfrxczvunomwqpdbkhao*#MW&8%B@$",

      // Floating losse tekens in de achtergrond
      ambientChars: "01[]{}()/\\\\|+-.:;",

      eyeSadness: 0.72,
      ambientDensity: 0.0027,
      glitchEveryMin: 4.0,
      glitchEveryMax: 9.0
    };

    let width = 0;
    let height = 0;
    let cols = 0;
    let rows = 0;
    let cellW = 0;
    let cellH = 0;
    let grid = [];

    let glitch = {
      active: false,
      row: 0,
      height: 2,
      shift: 0,
      end: 0,
      next: 0
    };

    let blink = {
      start: -999,
      next: 5 + Math.random() * 7,
      duration: 0.22
    };

    function clamp(v, a = 0, b = 1){
      return v < a ? a : v > b ? b : v;
    }

    function mix(a, b, t){
      return a + (b - a) * t;
    }

    function mixColor(c1, c2, t){
      return [
        mix(c1[0], c2[0], t),
        mix(c1[1], c2[1], t),
        mix(c1[2], c2[2], t)
      ];
    }

    function triColor(t){
      t = clamp(t, 0, 1);
      if (t < 0.5){
        return mixColor(CONFIG.leftColor, CONFIG.midColor, t / 0.5);
      }
      return mixColor(CONFIG.midColor, CONFIG.rightColor, (t - 0.5) / 0.5);
    }

    function smoothstep(a, b, x){
      const t = clamp((x - a) / (b - a), 0, 1);
      return t * t * (3 - 2 * t);
    }

    function fract(x){
      return x - Math.floor(x);
    }

    function hash(x, y){
      return fract(Math.sin(x * 127.1 + y * 311.7) * 43758.5453123);
    }

    function noise(x, y){
      const xi = Math.floor(x);
      const yi = Math.floor(y);
      const xf = x - xi;
      const yf = y - yi;

      const u = xf * xf * (3 - 2 * xf);
      const v = yf * yf * (3 - 2 * yf);

      const n00 = hash(xi, yi);
      const n10 = hash(xi + 1, yi);
      const n01 = hash(xi, yi + 1);
      const n11 = hash(xi + 1, yi + 1);

      return mix(
        mix(n00, n10, u),
        mix(n01, n11, u),
        v
      );
    }

    function softEllipse(u, v, cx, cy, rx, ry, edge0 = 0.78, edge1 = 1.0){
      const dx = (u - cx) / rx;
      const dy = (v - cy) / ry;
      const d = Math.sqrt(dx * dx + dy * dy);
      return 1 - smoothstep(edge0, edge1, d);
    }

    function segGlow(px, py, ax, ay, bx, by, width){
      const abx = bx - ax;
      const aby = by - ay;
      const apx = px - ax;
      const apy = py - ay;
      const denom = abx * abx + aby * aby || 1e-6;
      const h = clamp((apx * abx + apy * aby) / denom, 0, 1);
      const dx = apx - abx * h;
      const dy = apy - aby * h;
      return Math.exp(-(dx * dx + dy * dy) / (width * width));
    }

    function getBlinkAmount(t){
      if (t > blink.next){
        blink.start = t;
        blink.next = t + 7 + Math.random() * 12;
      }
      const p = (t - blink.start) / blink.duration;
      if (p < 0 || p > 1) return 0;
      return Math.sin(p * Math.PI);
    }

    function scheduleGlitch(t){
      glitch.next = t + CONFIG.glitchEveryMin + Math.random() * (CONFIG.glitchEveryMax - CONFIG.glitchEveryMin);
    }

    function updateGlitch(t){
      if (!glitch.next) scheduleGlitch(t);

      if (!glitch.active && t > glitch.next){
        glitch.active = true;
        glitch.row = Math.floor(Math.random() * rows);
        glitch.height = 1 + Math.floor(Math.random() * 3);
        glitch.shift = (Math.random() * 2 - 1) * cellW * (2 + Math.random() * 4);
        glitch.end = t + 0.04 + Math.random() * 0.08;
      }

      if (glitch.active && t > glitch.end){
        glitch.active = false;
        scheduleGlitch(t);
      }
    }

    function resize(){
      width = window.innerWidth;
      height = window.innerHeight;

      canvas.width = Math.floor(width * DPR);
      canvas.height = Math.floor(height * DPR);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";

      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

      ctx.font = `${CONFIG.fontSize}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace`;
      ctx.textBaseline = "top";
      ctx.textAlign = "left";

      cellW = ctx.measureText("M").width;
      cellH = CONFIG.fontSize * CONFIG.lineHeight;

      cols = Math.floor(width / cellW);
      rows = Math.floor(height / cellH);

      grid = new Array(rows);
      for (let r = 0; r < rows; r++){
        grid[r] = new Array(cols);
        for (let c = 0; c < cols; c++){
          grid[r][c] = {
            ch: " ",
            color: [0,0,0],
            alpha: 0
          };
        }
      }
    }

    function getCellData(c, r, t){
      const u = (c + 0.5) / cols;
      const v = (r + 0.5) / rows;

      const breath = 0.93 + 0.07 * Math.sin(t * 1.2);
      const blinkAmt = getBlinkAmount(t);

      // ---------- Basis face volumes ----------
      const faceMask = softEllipse(u, v, 0.5, 0.49, 0.145, 0.255, 0.80, 1.0);

      // Grotere schaal voor haarmassa
      let hairShell = softEllipse(u, v, 0.5, 0.505, 0.23, 0.395, 0.82, 1.0);

      // Haar tot hals: begrens onderkant subtiel, niet te lang
      const neckCut = 1 - smoothstep(0.84, 0.96, v);
      hairShell *= (0.72 + 0.28 * neckCut);

      const hairNoise = noise(c * 0.11, r * 0.08 - t * 0.18);
      let hairMask = Math.max(0, hairShell - faceMask * 0.92);
      hairMask *= 0.84 + 0.30 * hairNoise;

      // Schouders / nek heel subtiel
      const neck = softEllipse(u, v, 0.5, 0.79, 0.06, 0.08, 0.55, 1.0) * 0.25;
      const shoulderL = softEllipse(u, v, 0.42, 0.89, 0.10, 0.07, 0.5, 1.0) * 0.12;
      const shoulderR = softEllipse(u, v, 0.58, 0.89, 0.10, 0.07, 0.5, 1.0) * 0.12;

      // ---------- Gezichtsshading ----------
      const faceCore   = softEllipse(u, v, 0.5, 0.51, 0.11, 0.18, 0.0, 1.0) * 0.44;
      const forehead   = softEllipse(u, v, 0.5, 0.33, 0.10, 0.08, 0.0, 1.0) * 0.20;
      const cheeks     = (
        softEllipse(u, v, 0.43, 0.57, 0.055, 0.07, 0.0, 1.0) +
        softEllipse(u, v, 0.57, 0.57, 0.055, 0.07, 0.0, 1.0)
      ) * 0.18;
      const chin       = softEllipse(u, v, 0.5, 0.72, 0.05, 0.05, 0.0, 1.0) * 0.16;
      const jawShadow  = softEllipse(u, v, 0.5, 0.67, 0.13, 0.10, 0.0, 1.0) * 0.08;

      // ---------- Ogen ----------
      const eyeHeight = mix(0.009, 0.0018, blinkAmt);
      const eyeY = 0.455;

      // Sadness: buitenste hoeken iets lager / zwaarder
      const leftUpperLid  = segGlow(u, v, 0.372, eyeY + 0.006 + CONFIG.eyeSadness * 0.004, 0.446, eyeY - 0.002, 0.0048);
      const rightUpperLid = segGlow(u, v, 0.554, eyeY - 0.002, 0.628, eyeY + 0.006 + CONFIG.eyeSadness * 0.004, 0.0048);

      const leftLowerLid  = segGlow(u, v, 0.380, 0.472, 0.444, 0.468, 0.004);
      const rightLowerLid = segGlow(u, v, 0.556, 0.468, 0.620, 0.472, 0.004);

      const leftEyeWhite  = softEllipse(u, v, 0.41, eyeY, 0.030, eyeHeight, 0.6, 1.0) * (1 - blinkAmt * 0.92);
      const rightEyeWhite = softEllipse(u, v, 0.59, eyeY, 0.030, eyeHeight, 0.6, 1.0) * (1 - blinkAmt * 0.92);

      const leftIris  = softEllipse(u, v, 0.41, eyeY + 0.001, 0.011, 0.011, 0.0, 1.0) * (1 - blinkAmt * 0.95);
      const rightIris = softEllipse(u, v, 0.59, eyeY + 0.001, 0.011, 0.011, 0.0, 1.0) * (1 - blinkAmt * 0.95);

      const eyeShadow = (
        softEllipse(u, v, 0.41, 0.448, 0.055, 0.030, 0.0, 1.0) +
        softEllipse(u, v, 0.59, 0.448, 0.055, 0.030, 0.0, 1.0)
      ) * 0.18;

      // ---------- Wenkbrauwen ----------
      const leftBrow  = segGlow(u, v, 0.365, 0.415, 0.452, 0.402, 0.0065);
      const rightBrow = segGlow(u, v, 0.548, 0.402, 0.635, 0.415, 0.0065);

      // ---------- Neus ----------
      const noseBridge = segGlow(u, v, 0.5, 0.42, 0.5, 0.59, 0.006) * 0.42;
      const noseTip = softEllipse(u, v, 0.5, 0.60, 0.020, 0.016, 0.0, 1.0) * 0.20;
      const nostrilL = softEllipse(u, v, 0.486, 0.605, 0.008, 0.005, 0.0, 1.0) * 0.17;
      const nostrilR = softEllipse(u, v, 0.514, 0.605, 0.008, 0.005, 0.0, 1.0) * 0.17;

      // ---------- Mond ----------
      const mouthUpperL = segGlow(u, v, 0.456, 0.664, 0.500, 0.654, 0.0045);
      const mouthUpperR = segGlow(u, v, 0.500, 0.654, 0.544, 0.664, 0.0045);
      const mouthLower  = segGlow(u, v, 0.470, 0.680, 0.530, 0.680, 0.0048) * 0.72;
      const philtrum    = segGlow(u, v, 0.5, 0.620, 0.5, 0.645, 0.004) * 0.10;

      // ---------- Dichtheid opbouwen ----------
      let density = 0;

      density += faceMask * 0.10;
      density += faceCore;
      density += forehead;
      density += cheeks;
      density += chin;
      density += jawShadow;

      density += hairMask * 0.33;
      density += neck;
      density += shoulderL + shoulderR;

      density += eyeShadow;
      density += (leftUpperLid + rightUpperLid) * 0.44;
      density += (leftLowerLid + rightLowerLid) * 0.22;
      density += (leftBrow + rightBrow) * 0.42;

      density += (leftEyeWhite + rightEyeWhite) * 0.24;
      density += (leftIris + rightIris) * 0.46;

      density += noseBridge + noseTip + nostrilL + nostrilR;
      density += (mouthUpperL + mouthUpperR) * 0.25;
      density += mouthLower * 0.18;
      density += philtrum;

      // subtiele levende variatie
      density *= breath;
      density *= 0.94 + 0.06 * Math.sin(r * 0.62 + t * 18);

      const grain = noise(c * 0.19 + t * 0.30, r * 0.17 - t * 0.08) - 0.5;
      density += grain * 0.06;

      density = clamp(density, 0, 1);

      // ---------- Achtergrond ambient ----------
      let ambient = 0;
      if (density < 0.05){
        const n = noise(c * 0.18 + 70.1, r * 0.21 + 31.7 + t * 0.08);
        if (n > 1 - CONFIG.ambientDensity * 10){
          ambient = (n - (1 - CONFIG.ambientDensity * 10)) * 12;
          ambient = clamp(ambient * 0.45, 0, 0.18);
        }
      }

      const finalDensity = Math.max(density, ambient);

      // ---------- Kleur ----------
      let color = triColor(u);

      // ietsepietsje helderder in gezicht en ogen
      const glowBoost = clamp(
        finalDensity * 0.95 +
        (leftIris + rightIris) * 0.65 +
        (leftEyeWhite + rightEyeWhite) * 0.18,
        0, 1.6
      );

      // Eyes net iets kouder/lichter
      if ((leftIris + rightIris) > 0.04){
        color = mixColor(color, [180, 170, 255], 0.28);
      }

      // Haar iets donkerder / zachter
      if (hairMask > faceMask){
        color = mixColor(color, [38, 36, 72], 0.18);
      }

      const brightness = clamp(0.10 + glowBoost, 0, 1.35);
      color = [
        clamp(color[0] * brightness, 0, 255),
        clamp(color[1] * brightness, 0, 255),
        clamp(color[2] * brightness, 0, 255)
      ];

      // ---------- ASCII teken kiezen ----------
      let ch = " ";
      let alpha = 0;

      if (finalDensity > 0.02){
        const ramp = CONFIG.ramp;
        let idx = Math.floor(finalDensity * (ramp.length - 1));

        // kleine tekenjitter
        idx += Math.floor((noise(c * 0.41 + 17.3, r * 0.39 + t * 0.55) - 0.5) * 2);

        idx = Math.max(0, Math.min(ramp.length - 1, idx));
        ch = ramp[idx];
        alpha = clamp(0.20 + finalDensity * 1.10, 0, 1);
      }

      // ambient losse tekens in de background
      if (density < 0.02 && ambient > 0.01){
        const chars = CONFIG.ambientChars;
        const idx = Math.floor(noise(c * 0.72, r * 0.49 + t * 0.4) * chars.length) % chars.length;
        ch = chars[idx];
        alpha = clamp(ambient * 1.5, 0.05, 0.22);
      }

      return { ch, color, alpha };
    }

    function buildFrame(t){
      updateGlitch(t);

      for (let r = 0; r < rows; r++){
        for (let c = 0; c < cols; c++){
          grid[r][c] = getCellData(c, r, t);
        }
      }
    }

    function renderFrame(t){
      ctx.fillStyle = `rgb(${CONFIG.backgroundColor[0]}, ${CONFIG.backgroundColor[1]}, ${CONFIG.backgroundColor[2]})`;
      ctx.fillRect(0, 0, width, height);

      ctx.font = `${CONFIG.fontSize}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace`;
      ctx.textBaseline = "top";
      ctx.textAlign = "left";

      for (let r = 0; r < rows; r++){
        const y = r * cellH;

        let rowShift = 0;
        if (glitch.active && r >= glitch.row && r < glitch.row + glitch.height){
          rowShift = glitch.shift;
        }

        for (let c = 0; c < cols; c++){
          const cell = grid[r][c];
          if (cell.ch === " " || cell.alpha <= 0) continue;

          const x = c * cellW + rowShift;

          ctx.fillStyle = `rgba(${cell.color[0]}, ${cell.color[1]}, ${cell.color[2]}, ${cell.alpha})`;
          ctx.fillText(cell.ch, x, y);
        }
      }

      // scanlines
      ctx.fillStyle = "rgba(0, 0, 0, 0.13)";
      for (let y = 0; y < height; y += 4){
        ctx.fillRect(0, y, width, 1);
      }

      // heel subtiele vignette
      const grad = ctx.createRadialGradient(
        width * 0.5, height * 0.48, Math.min(width, height) * 0.12,
        width * 0.5, height * 0.5, Math.max(width, height) * 0.58
      );
      grad.addColorStop(0, "rgba(0,0,0,0)");
      grad.addColorStop(1, "rgba(0,0,0,0.42)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);
    }

    function animate(now){
      const t = now * 0.001;
      buildFrame(t);
      renderFrame(t);
      requestAnimationFrame(animate);
    }

    // Handig voor debug / “echte data” export
    window.exportAsciiFrame = function(){
      return grid.map(row => row.map(cell => cell.ch).join("")).join("\n");
    };

    window.exportAsciiData = function(){
      return grid;
    };

    window.addEventListener("resize", resize);

    resize();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
