<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Wandering Art — Pixel Entity</title>
  <style>
    :root{
      --bg:#020207;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
    body{
      display:grid;
      place-items:center;
      color:white;
      -webkit-font-smoothing:none;
      font-smooth:never;
      touch-action:none;
      cursor:none;
    }
    #stage{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 48%, rgba(11,255,212,.05), transparent 34%),
        radial-gradient(circle at 48% 50%, rgba(14,80,100,.10), transparent 48%),
        #020207;
    }
    canvas{
      display:block;
      width:min(100vw, calc(100vh * 1.384615));
      height:min(100vh, calc(100vw / 1.384615));
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter:
        contrast(1.08)
        saturate(1.12)
        drop-shadow(0 0 22px rgba(0,255,214,.16))
        drop-shadow(0 0 56px rgba(35,255,87,.08));
    }
    #stage::before{
      content:"";
      position:absolute;
      inset:-20%;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.020) 50%, rgba(0,0,0,.035) 50%),
        radial-gradient(circle at 50% 45%, transparent 0 42%, rgba(0,0,0,.42) 79%);
      background-size:100% 4px, 100% 100%;
      mix-blend-mode:screen;
      opacity:.62;
    }
    #stage::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(255,0,170,.028), transparent 18%, transparent 82%, rgba(0,255,180,.035)),
        radial-gradient(circle at center, transparent 0 62%, rgba(0,0,0,.72) 100%);
    }
    @media (prefers-reduced-motion: reduce){
      canvas{filter:contrast(1.06) saturate(1.08) drop-shadow(0 0 18px rgba(0,255,214,.12));}
    }
  </style>
</head>
<body>
  <main id="stage" aria-label="Wandering Art — autonomous pixel entity">
    <canvas id="entity" width="360" height="260"></canvas>
  </main>

  <script>
  (() => {
    'use strict';

    const STATIC_PREVIEW = new URLSearchParams(location.search).has('static');
    const canvas = document.getElementById('entity');
    const ctx = canvas.getContext('2d', { alpha: false });
    const W = canvas.width;
    const H = canvas.height;
    ctx.imageSmoothingEnabled = false;

    const C = {
      bg: '#020207',
      black: '#000006',
      ink: '#01020a',
      cyan0: '#063941',
      cyan1: '#087f89',
      cyan2: '#0bb8bd',
      cyan3: '#13e1df',
      cyan4: '#69fff3',
      hair0: '#57dccd',
      hair1: '#a8fff2',
      white: '#f7fff8',
      green0: '#0a5f24',
      green1: '#22e64f',
      green2: '#a2ff75',
      magenta: '#ff2bd6',
      red: '#ff3159',
      amber: '#ffd35d'
    };

    const moods = [
      { name:'neutral',     dwell:[5200, 9200], eye:0.84, smile:0.05, open:0.04, brow:0.05, anger:0.00, sad:0.00, blush:0.00, tear:0.00, gazeX:0.00, gazeY:0.00, tilt:0.00, accent:0.00 },
      { name:'interested',  dwell:[4200, 7600], eye:0.92, smile:0.12, open:0.06, brow:0.32, anger:0.00, sad:0.00, blush:0.05, tear:0.00, gazeX:0.55, gazeY:-0.15, tilt:-0.045, accent:0.05 },
      { name:'surprised',   dwell:[2100, 3900], eye:1.24, smile:0.00, open:0.73, brow:0.68, anger:0.00, sad:0.02, blush:0.00, tear:0.00, gazeX:0.00, gazeY:-0.10, tilt:0.018, accent:0.20 },
      { name:'happy',       dwell:[3600, 7000], eye:0.76, smile:0.67, open:0.14, brow:0.12, anger:0.00, sad:0.00, blush:0.28, tear:0.00, gazeX:-0.12, gazeY:0.00, tilt:0.030, accent:0.14 },
      { name:'laugh',       dwell:[2400, 4900], eye:0.56, smile:0.94, open:0.86, brow:0.18, anger:0.00, sad:0.00, blush:0.44, tear:0.00, gazeX:0.08, gazeY:-0.10, tilt:0.045, accent:0.18 },
      { name:'cry',         dwell:[3000, 6200], eye:0.64, smile:-0.56, open:0.27, brow:0.20, anger:0.00, sad:0.82, blush:0.18, tear:1.00, gazeX:-0.30, gazeY:0.44, tilt:-0.025, accent:0.00 },
      { name:'angry',       dwell:[2400, 5200], eye:0.62, smile:-0.22, open:0.05, brow:-0.08, anger:0.98, sad:0.00, blush:0.00, tear:0.00, gazeX:0.00, gazeY:-0.18, tilt:0.015, accent:0.78 },
      { name:'shy',         dwell:[3500, 7200], eye:0.59, smile:0.20, open:0.05, brow:0.14, anger:0.00, sad:0.15, blush:0.92, tear:0.00, gazeX:-0.78, gazeY:0.62, tilt:-0.060, accent:0.08 }
    ];

    let current = moods[0];
    let previous = moods[0];
    let target = moods[1];
    let transitionStart = performance.now();
    let transitionMs = 1700;
    let nextMoodAt = performance.now() + 5200;

    let blinkAt = performance.now() + rnd(1200, 4200);
    let blinkUntil = 0;
    let blinkStrength = 0;

    let gaze = {x:0, y:0, tx:0, ty:0};
    let nextGazeAt = performance.now() + 1200;

    let glitchUntil = 0;
    let glitchAt = performance.now() + rnd(3600, 11000);

    const dust = Array.from({ length: 132 }, (_, i) => ({
      x: Math.floor(hash(i * 18.31) * W),
      y: Math.floor(hash(i * 91.72) * H),
      a: .18 + hash(i * 5.27) * .62,
      s: hash(i * 12.13) > .84 ? 2 : 1,
      c: hash(i * 33.41) > .72 ? C.green1 : C.cyan4
    }));

    function rnd(min, max){ return min + Math.random() * (max - min); }
    function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
    function lerp(a, b, t){ return a + (b - a) * t; }
    function ease(t){ return t*t*(3-2*t); }
    function hash(n){ return (Math.sin(n * 127.1 + 311.7) * 43758.5453) % 1 < 0 ? ((Math.sin(n * 127.1 + 311.7) * 43758.5453) % 1) + 1 : (Math.sin(n * 127.1 + 311.7) * 43758.5453) % 1; }

    function mixMood(a, b, k){
      const o = { name: b.name };
      for (const key of ['eye','smile','open','brow','anger','sad','blush','tear','gazeX','gazeY','tilt','accent']) {
        o[key] = lerp(a[key], b[key], k);
      }
      return o;
    }

    function chooseMood(now){
      previous = current;
      let options = moods.filter(m => m.name !== current.name);
      if (current.name === 'surprised') options = options.filter(m => m.name !== 'surprised');
      target = options[Math.floor(Math.random() * options.length)];
      transitionStart = now;
      transitionMs = rnd(1050, 2200);
      const dwell = target.dwell;
      nextMoodAt = now + transitionMs + rnd(dwell[0], dwell[1]);
    }

    function updateAutonomy(now){
      if (now > nextMoodAt) chooseMood(now);
      const k = ease(clamp((now - transitionStart) / transitionMs, 0, 1));
      current = mixMood(previous, target, k);

      if (now > blinkAt) {
        blinkUntil = now + rnd(95, 170);
        blinkAt = now + rnd(1600, 5400);
        if (Math.random() > .84) blinkAt += 180;
      }
      const b = clamp(1 - Math.abs(now - (blinkUntil - 80)) / 82, 0, 1);
      blinkStrength = Math.max(blinkStrength * .68, b);

      if (now > nextGazeAt) {
        gaze.tx = clamp(current.gazeX + rnd(-.45, .45), -1.3, 1.3);
        gaze.ty = clamp(current.gazeY + rnd(-.30, .30), -.75, .95);
        nextGazeAt = now + rnd(900, 2800);
      }
      gaze.x = lerp(gaze.x, gaze.tx, .022);
      gaze.y = lerp(gaze.y, gaze.ty, .022);

      if (now > glitchAt) {
        glitchUntil = now + rnd(75, 210);
        glitchAt = now + rnd(4200, 14500);
      }
    }

    function rect(x,y,w,h,color){
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
    }

    function poly(points, color){
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(Math.round(points[0][0]), Math.round(points[0][1]));
      for (let i=1;i<points.length;i++) ctx.lineTo(Math.round(points[i][0]), Math.round(points[i][1]));
      ctx.closePath();
      ctx.fill();
    }

    function path(color, commands){
      ctx.fillStyle = color;
      ctx.beginPath();
      for (const c of commands) {
        if (c[0] === 'M') ctx.moveTo(c[1], c[2]);
        if (c[0] === 'L') ctx.lineTo(c[1], c[2]);
        if (c[0] === 'Q') ctx.quadraticCurveTo(c[1], c[2], c[3], c[4]);
        if (c[0] === 'C') ctx.bezierCurveTo(c[1], c[2], c[3], c[4], c[5], c[6]);
      }
      ctx.closePath();
      ctx.fill();
    }

    function ellipse(x,y,rx,ry,color){
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(Math.round(x), Math.round(y), rx, ry, 0, 0, Math.PI*2);
      ctx.fill();
    }

    function line(x1,y1,x2,y2,width,color){
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'butt';
      ctx.lineJoin = 'miter';
      ctx.beginPath();
      ctx.moveTo(Math.round(x1),Math.round(y1));
      ctx.lineTo(Math.round(x2),Math.round(y2));
      ctx.stroke();
    }

    function dither(x,y,w,h,color,step=4,density=.48,phase=0){
      ctx.fillStyle = color;
      for (let yy=Math.round(y); yy<y+h; yy+=step) {
        for (let xx=Math.round(x); xx<x+w; xx+=step) {
          const n = hash(xx * 2.77 + yy * 8.13 + phase);
          if (((xx+yy)/step | 0) % 2 === 0 && n < density) ctx.fillRect(xx, yy, Math.max(1, step-2), Math.max(1, step-2));
        }
      }
    }

    function drawBackground(now){
      ctx.fillStyle = C.bg;
      ctx.fillRect(0,0,W,H);

      const t = now * .001;
      for (let i=0;i<dust.length;i++) {
        const p = dust[i];
        if (p.x > 98 && p.x < 262 && p.y > 34 && p.y < 228) continue;
        const flicker = .45 + .55 * Math.sin(t * (1.1 + i * .002) + i * 4.1);
        if (flicker * p.a < .32) continue;
        ctx.globalAlpha = clamp(flicker * p.a, .08, .82);
        rect(p.x, p.y, p.s, p.s, p.c);
      }
      ctx.globalAlpha = 1;

      for (let y=0;y<H;y+=7) {
        if (hash(y + Math.floor(t * 2)) > .86) {
          ctx.globalAlpha = .035;
          rect(0, y, W, 1, C.cyan4);
          ctx.globalAlpha = 1;
        }
      }
    }

      path(C.black, [
        ['M',79,235],['C',75,182,82,123,96,78],['C',110,31,143,15,184,17],
        ['C',244,20,282,63,286,132],['C',290,184,268,222,248,250],
        ['L',78,250]
      ]);
      path(C.hair0, [
        ['M',86,238],['
