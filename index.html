<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Wandering Art — Living Pixel World v13 — Ethereal Oracle</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/Wandering-Art/manifest.json" />

  <!-- Theme & status bar -->
  <meta name="theme-color" content="#020207" />

  <!-- iOS PWA (Add to Home Screen) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wandering Art" />
  <link rel="apple-touch-icon" href="/Wandering-Art/icon-192.png" />

  <!-- Android / Chrome -->
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/png" sizes="192x192" href="/Wandering-Art/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/Wandering-Art/icon-512.png" />

  <!-- Prevent sharing UI & search engines from indexing -->
  <meta name="robots" content="noindex" />

  <!-- Service Worker registratie -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/Wandering-Art/sw.js', { scope: '/Wandering-Art/' }).then(r => r.update()).catch(() => {});
      });
    }
    // Screen Wake Lock: scherm blijft aan terwijl de entiteit leeft
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          window._wakeLock = await navigator.wakeLock.request('screen');
          document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible' && !window._wakeLock) {
              try { window._wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
            }
          });
        } catch(e) {}
      }
    }
    requestWakeLock();
  </script>

  <style>
    :root{ --bg:#020207; --wa-full-w:100vw; --wa-full-h:100vh; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{
      width:100%; height:100%; min-height:var(--wa-full-h); overflow:hidden; background:#061018;
      /* Mobiel: voorkom tekst-selectie en tap-highlight */
      -webkit-user-select:none; user-select:none;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none;
    }
    body{
      display:grid;
      place-items:center;
      color:white;
      -webkit-font-smoothing:none;
      font-smooth:never;
      touch-action:none;
      cursor:none;
      /* Full-bleed canvas: safe-area wordt alleen toegepast op overlays/knoppen. */
      min-height:var(--wa-full-h);
      padding:0;
    }
    #stage{
      position:fixed;
      left:0; top:0;
      width:var(--wa-full-w);
      height:var(--wa-full-h);
      min-width:100vw;
      min-height:100vh;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 48%, rgba(11,255,212,.05), transparent 34%),
        radial-gradient(ellipse at 50% 110%, rgba(30,90,60,.80) 0%, rgba(10,40,55,.60) 40%, transparent 70%),
        radial-gradient(ellipse at 30% 105%, rgba(213,166,77,.18) 0%, transparent 50%),
        #061018;
    }
    canvas{
      display:block;
      /* Fullscreen cover: vul het scherm. Op smalle/tall phones croppen we liever links/rechts
         dan dat er zwarte balken boven en onder ontstaan. */
      width:max(var(--wa-full-w), calc(var(--wa-full-h) * 0.5625));
      height:max(var(--wa-full-h), calc(var(--wa-full-w) / 0.5625));
      min-width:var(--wa-full-w);
      min-height:var(--wa-full-h);
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      filter:
        contrast(1.08)
        saturate(1.12)
        drop-shadow(0 0 22px rgba(0,255,214,.16))
        drop-shadow(0 0 56px rgba(35,255,87,.08));
    }
    @supports (height: 100dvh){
      :root{ --wa-full-h:100dvh; --wa-full-w:100dvw; }
    }
    @supports (-webkit-touch-callout: none){
      html,body,#stage{ min-height:-webkit-fill-available; }
    }
    #stage::before{
      content:"";
      position:absolute;
      inset:-12%;
      pointer-events:none;
      background:radial-gradient(circle at 50% 45%, transparent 0 60%, rgba(0,0,0,.10) 92%);
      opacity:.35;
    }
    #stage::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(255,0,170,.028), transparent 18%, transparent 82%, rgba(0,255,180,.035)),
        radial-gradient(circle at center, transparent 0 82%, rgba(0,0,0,.14) 100%);
    }
    #dbg{
      position:fixed; left:8px; top:8px; z-index:5;
      display:none; white-space:pre; pointer-events:none;
      font:10px/1.35 monospace; color:#69fff3; opacity:.72;
      text-shadow:0 0 4px #000;
    }
    #enter{
      position:fixed; inset:0; z-index:8;
      display:flex; align-items:flex-end; justify-content:center;
      padding-bottom:max(12px, env(safe-area-inset-bottom));
      pointer-events:none; opacity:0;
      transition:opacity 1.2s ease;
    }
    #enter .ring{
      display:flex; align-items:center; justify-content:center;
      width:172px; height:52px; border-radius:26px;
      border:none;
      background:linear-gradient(135deg,#c8922a 0%,#f0c050 45%,#d4a030 100%);
      box-shadow:0 4px 22px rgba(213,166,77,.55), 0 1px 0 rgba(255,240,160,.5) inset;
      color:#1a0e00; font:17px/1.4 monospace; letter-spacing:.14em; text-transform:lowercase;
      text-align:center; text-shadow:0 1px 0 rgba(255,240,160,.4);
      animation:enterPulse 2.6s ease-in-out infinite;
      cursor:pointer; pointer-events:auto;
    }
    @keyframes enterPulse{
      0%,100%{ transform:scale(1); box-shadow:0 0 22px rgba(0,255,214,.18), inset 0 0 20px rgba(0,255,214,.09); }
      50%{ transform:scale(1.05); box-shadow:0 0 36px rgba(0,255,214,.32), inset 0 0 26px rgba(0,255,214,.15); }
    }
    #enter.show{ opacity:.94; }
    #enter.gone{ opacity:0; transition:opacity 1.2s ease; }

    /* ── Overlay basis ────────────────────────────────────────────── */
    .wa-overlay{
      position:fixed; inset:0; z-index:20;
      display:flex; flex-direction:column;
      background:rgba(1,2,9,.92);
      backdrop-filter:blur(8px);
      opacity:0; pointer-events:none;
      transition:opacity .35s ease;
      font-family:monospace;
      color:#9bfff5;
      overflow:hidden;
    }
    .wa-overlay.open{ opacity:1; pointer-events:auto; }

    /* header */
    .wa-head{
      flex:0 0 auto; padding:18px 20px 10px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid rgba(105,255,243,.14);
    }
    .wa-head h2{ margin:0; font-size:14px; letter-spacing:.24em;
      text-transform:lowercase; color:#69fff3; }
    .wa-close{
      background:none; border:1px solid rgba(105,255,243,.3);
      color:#69fff3; font:13px monospace; letter-spacing:.10em;
      padding:5px 10px; border-radius:20px; cursor:pointer;
    }
    .wa-close:active{ background:rgba(105,255,243,.1); }

    /* scrollable body */
    .wa-body{ flex:1 1 auto; overflow-y:auto; padding:14px 16px 30px; }

    /* sectie-label */
    .wa-sec{
      font-size:11px; letter-spacing:.28em; text-transform:lowercase;
      color:rgba(105,255,243,.45); margin:18px 0 8px;
    }

    /* event-grid */
    .ev-grid{
      display:grid; grid-template-columns:1fr 1fr;
      gap:6px; margin-bottom:4px;
    }
    .ev-card{
      border:1px solid rgba(105,255,243,.10);
      border-radius:6px; padding:8px 10px;
      display:flex; flex-direction:column; gap:3px;
      background:rgba(6,20,26,.55);
      transition:border-color .2s;
    }
    .ev-card.seen{ border-color:rgba(105,255,243,.28); }
    .ev-card .ev-sym{ font-size:20px; opacity:.7; }
    .ev-card .ev-name{ font-size:13px; letter-spacing:.06em; color:#c8fff9; }
    .ev-card .ev-stars{ font-size:12px; color:#d5a64d; letter-spacing:.04em; }
    .ev-card .ev-badge{
      font-size:11px; letter-spacing:.08em;
      color:rgba(105,255,243,.38); margin-top:1px;
    }
    .ev-card.seen .ev-badge{ color:#69fff3; }


    .wa-btn{
      display:block; width:100%; margin-top:10px;
      background:rgba(6,20,26,.8); border:1px solid rgba(105,255,243,.30);
      color:#69fff3; font:13px/1 monospace; letter-spacing:.14em;
      padding:10px; border-radius:6px; cursor:pointer; text-align:center;
    }
    .wa-btn:active{ background:rgba(105,255,243,.12); }
    .wa-btn.gold{ border-color:rgba(213,166,77,.45); color:#d5a64d; }
    .wa-btn.danger{ border-color:rgba(255,49,89,.30); color:#ff3159; }

    /* seed-kaartjes */
    .seed-grid{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
    .seed-pill{
      border:1px solid rgba(213,166,77,.35); border-radius:20px;
      padding:6px 13px; font-size:12px; letter-spacing:.10em; color:#d5a64d;
      cursor:pointer; background:rgba(6,20,26,.6);
    }
    .seed-pill.active{ background:rgba(213,166,77,.15); }
    .seed-pill .sd{ font-size:11px; opacity:.55; }


    /* ── Grimoire: leesbare perkament-sheet + notch-safe ruimte ───────────── */
    #wa-log.wa-overlay{
      /* De donkere overlay blijft full-screen, maar het paneel begint lager.
         Zo blijft 'sluiten' vrij van Dynamic Island / notch / statusbar. */
      padding:
        calc(env(safe-area-inset-top, 0px) + 22px)
        12px
        calc(env(safe-area-inset-bottom, 0px) + 14px);
      background:rgba(1,2,9,.68);
      backdrop-filter:blur(9px);
      color:#211b12;
    }
    #wa-log .wa-head,
    #wa-log .wa-body{
      width:min(100%, 680px);
      margin-inline:auto;
      border-left:1px solid rgba(98,74,42,.20);
      border-right:1px solid rgba(98,74,42,.20);
      box-shadow:0 14px 44px rgba(0,0,0,.34);
    }
    #wa-log .wa-head{
      justify-content:center;
      padding:14px 16px 10px;
      border-radius:18px 18px 0 0;
      border-top:1px solid rgba(255,255,255,.58);
      border-bottom:1px solid rgba(98,74,42,.22);
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.72), transparent 40%),
        linear-gradient(135deg, #fff8e8 0%, #efe2c3 100%);
    }
    #wa-log .wa-head h2{
      color:#3e5d5a;
      text-shadow:none;
    }
    #wa-log .wa-close{
      min-height:34px;
      background:#fffaf0;
      border-color:rgba(82,60,31,.32);
      color:#4a371a;
      box-shadow:0 1px 0 rgba(255,255,255,.7) inset;
    }
    #wa-log .wa-close:active{ background:#eadfcb; }
    #wa-log .wa-body{
      min-height:0;
      border-radius:0 0 18px 18px;
      border-bottom:1px solid rgba(98,74,42,.24);
      background:
        radial-gradient(circle at 8% 0%, rgba(255,255,255,.58), transparent 32%),
        linear-gradient(180deg, #fbf2dc 0%, #ead9b7 100%);
      color:#211b12;
      -webkit-overflow-scrolling:touch;
    }

    /* Inline grimoire-kleuren worden hier op licht papier leesbaar gemaakt. */
    #wa-log [style*="105,255,243"]{ color:rgba(54,72,69,.72) !important; }
    #wa-log [style*="#d5a64d"]{ color:#8a5e12 !important; }

    #wa-log .wa-sec{
      color:rgba(85,60,28,.60);
      text-shadow:0 1px 0 rgba(255,255,255,.45);
    }
    #wa-log .ev-card{
      border-color:rgba(98,74,42,.18);
      background:rgba(255,250,238,.76);
      box-shadow:0 1px 0 rgba(255,255,255,.64) inset;
    }
    #wa-log .ev-card.seen{ border-color:rgba(166,116,24,.55); }
    #wa-log .ev-card .ev-sym{ color:#5f543f; opacity:.82; }
    #wa-log .ev-card .ev-name{ color:#211b12; }
    #wa-log .ev-card .ev-stars{ color:#9a6b12; }
    #wa-log .ev-card .ev-badge{ color:rgba(54,72,69,.62); }
    #wa-log .ev-card.seen .ev-badge{ color:#176b65; }
    #wa-log .wa-btn{
      background:#fff7e7;
      border-color:rgba(51,93,88,.34);
      color:#275d58;
      box-shadow:0 1px 0 rgba(255,255,255,.64) inset;
    }
    #wa-log .wa-btn:active{ background:#eadfcb; }
    #wa-log .wa-btn.gold{
      border-color:rgba(150,104,20,.42);
      color:#8a5e12;
    }
    #wa-log .wa-btn.danger{
      border-color:rgba(160,45,58,.34);
      color:#9a2332;
    }
    #wa-log .seed-pill{
      background:#fff7e7;
      border-color:rgba(150,104,20,.34);
      color:#8a5e12;
    }
    #wa-log .seed-pill.active{
      background:rgba(213,166,77,.22);
      border-color:rgba(150,104,20,.58);
    }
    #wa-log .seed-pill .sd{ color:rgba(74,55,26,.62); opacity:1; }

    @media (max-width: 420px){
      #wa-log.wa-overlay{
        padding-top:calc(env(safe-area-inset-top, 0px) + 18px);
        padding-inline:10px;
      }
      #wa-log .wa-head{ padding:12px 12px 9px; }
      #wa-log .wa-body{ padding:12px 12px 24px; }
      #wa-log .wa-head h2{ font-size:13px; letter-spacing:.20em; }
      #wa-log .wa-close{ padding:6px 11px; }
    }


    @media (prefers-reduced-motion: reduce){
      canvas{ filter:contrast(1.06) saturate(1.08) drop-shadow(0 0 18px rgba(0,255,214,.12)); }
    }
  </style>
</head>
<body>
  <main id="stage" aria-label="Wandering Art — autonomous pixel entity">
    <canvas id="entity" width="360" height="640"></canvas>
  </main>
  <div id="enter" aria-hidden="true"><span class="ring">begroeten</span></div>

  <!-- Publiek: event-grimoire (enkele tap) -->
  <div id="wa-log" class="wa-overlay" role="dialog" aria-label="Grimoire">
    <div class="wa-head">
      <h2>· grimoire ·</h2>
    </div>
    <div class="wa-body" id="wa-log-body"></div>
  </div>

  <pre id="dbg"></pre>

  <script>
  (() => {
    'use strict';

    const PARAMS = new URLSearchParams(location.search);
    const STATIC_PREVIEW = PARAMS.has('static');
    const DEBUG = PARAMS.has('debug');
    const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    // Body-rig gebaren: standaard aan. ?rig=still zet ze uit (armen in rustpose) — directe A/B & rollback.
    const RIG_MOTION = PARAMS.get('rig') !== 'still';
    // Zichtbare scharnieren: 'full' = alles, 'min' = alleen kostuum-orbs (schouders/keel/borst),
    // 'off' = geen joints (puur vloeiend papier). Beweging is in alle standen identiek.
    // Zichtbare scharnieren staan standaard uit (nooit getoond). ?joints=full of =min is enkel een dev-optie.
    const RIG_JOINTS = ((v) => (v === 'full' || v === 'min') ? v : 'off')(PARAMS.get('joints'));
    // Palet: standaard strak/gestript (vlakke donkere achtergrond, geen extra cape/veil-panelen,
    // beperkt kostuum-palet). ?palette=rich herstelt de oude rijke versie met alle lagen.
    const RICH_PALETTE = PARAMS.get('palette') === 'rich';
    // Audio standaard aan (na de drempel-gesture). ?audio=off of ?mute = pure stille versie.
    // Bij reduced-motion standaard uit, tenzij ?audio=on.
    const AUDIO_OFF = PARAMS.get('audio') === 'off' || PARAMS.has('mute') || (REDUCED && PARAMS.get('audio') !== 'on');

    const CONFIG = {
      locationDelayMs: 12000,
      shipDensity: 0.85,
      ambientGlyphs: true,
      ambientGlyphChance: 0.0035,
      // Outfit blijft stabiel. Alleen bij een zeldzame vertrek/terugkomst-scène wisselt ze kleding.
      outfitChangeEnabled: true,
      outfitFirstDepartureMinMs: 210000,
      outfitFirstDepartureMaxMs: 390000,
      outfitDepartureMinMs: 300000,
      outfitDepartureMaxMs: 720000,
      outfitLeaveMs: 2400,
      outfitAwayMs: 3600,
      outfitReturnMs: 3000,
      speechFrequency: 0.82,
      newsMoodInfluence: 0.28,
      weatherIntensity: 0.86,
      speechAboveGlitch: true,
      attentionToEvents: true,
      iconicShips: true,
      freightTraffic: true,
      hugeShipMinMs: 240000,
      hugeShipMaxMs: 520000
    };

    const canvas = document.getElementById('entity');
    const ctx = canvas.getContext('2d', { alpha:false });
    const dbgEl = document.getElementById('dbg');
    if (DEBUG && dbgEl) dbgEl.style.display = 'block';
    const W = canvas.width;
    const H = canvas.height;
    ctx.imageSmoothingEnabled = false;

    function updateFullBleedViewport(){
      // iOS PWA/Safari kan innerHeight kleiner rapporteren dan het echte scherm
      // waardoor onderin een zwarte safe-area/rand zichtbaar blijft. We kiezen bewust
      // de grootste betrouwbare hoogte en schalen de 9:16-canvas daarop als cover.
      const vv = window.visualViewport;
      const sw = (screen && Math.min(screen.width || 0, screen.height || 0)) || 0;
      const sh = (screen && Math.max(screen.width || 0, screen.height || 0)) || 0;
      const fullW = Math.ceil(Math.max(window.innerWidth || 0, document.documentElement.clientWidth || 0, vv ? vv.width : 0, sw));
      const fullH = Math.ceil(Math.max(window.innerHeight || 0, document.documentElement.clientHeight || 0, vv ? vv.height : 0, sh));
      document.documentElement.style.setProperty('--wa-full-w', fullW + 'px');
      document.documentElement.style.setProperty('--wa-full-h', (fullH + 8) + 'px');
    }
    updateFullBleedViewport();
    window.addEventListener('resize', updateFullBleedViewport, { passive:true });
    window.addEventListener('orientationchange', () => setTimeout(updateFullBleedViewport, 250), { passive:true });
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', updateFullBleedViewport, { passive:true });
    }

    const C = {
      bg:'#020207', black:'#000006', ink:'#01020a',
      cyan0:'#063941', cyan1:'#087f89', cyan2:'#0bb8bd', cyan3:'#13e1df', cyan4:'#69fff3',
      hair0:'#57dccd', hair1:'#a8fff2', white:'#f7fff8',
      green0:'#0a5f24', green1:'#22e64f', green2:'#a2ff75',
      magenta:'#ff2bd6', magentaSoft:'#ff7bea', red:'#ff3159', amber:'#ffd35d',
      bubble:'#d9fff9', bubbleFill:'#06161a', fog:'#b8fff8', storm:'#8a9cff'
    };

    const safeStorage = (() => {
      let memory = {};
      let ok = false;
      try {
        const k = '__wa_probe__';
        localStorage.setItem(k, '1');
        localStorage.removeItem(k);
        ok = true;
      } catch (e) {}
      return {
        get(key){ try { return ok ? localStorage.getItem(key) : (memory[key] || null); } catch(e){ return memory[key] || null; } },
        set(key, value){ try { if (ok) localStorage.setItem(key, value); else memory[key] = value; } catch(e){ memory[key] = value; } }
      };
    })();

    const PROTO = {
      neutral:    { eye:.84, smile:.05, open:.04, brow:.05, anger:0,    sad:0,    blush:0,    tear:0,    gazeX:0,     gazeY:0,     accent:0 },
      interested: { eye:.92, smile:.12, open:.06, brow:.32, anger:0,    sad:0,    blush:.04,  tear:0,    gazeX:.45,   gazeY:-.10,  accent:.05 },
      surprised:  { eye:1.24, smile:0,   open:.73, brow:.68, anger:0,    sad:.02,  blush:0,    tear:0,    gazeX:0,     gazeY:-.10,  accent:.16 },
      happy:      { eye:.76, smile:.67, open:.14, brow:.12, anger:0,    sad:0,    blush:.22,  tear:0,    gazeX:-.12,  gazeY:0,     accent:.08 },
      laugh:      { eye:.54, smile:.96, open:.88, brow:.18, anger:0,    sad:0,    blush:.36,  tear:0,    gazeX:.08,   gazeY:-.10,  accent:.12 },
      cry:        { eye:.62, smile:-.58,open:.25, brow:.18, anger:0,    sad:.88,  blush:.10,  tear:1,    gazeX:-.28,  gazeY:.42,   accent:0 },
      angry:      { eye:.62, smile:-.22,open:.06, brow:-.08,anger:1,    sad:0,    blush:0,    tear:0,    gazeX:0,     gazeY:-.12,  accent:.30 },
      shy:        { eye:.60, smile:.20, open:.05, brow:.14, anger:0,    sad:.14,  blush:.88,  tear:0,    gazeX:-.76,  gazeY:.58,   accent:.04 }
    };

    const FEATURE_KEYS = ['eye','smile','open','brow','anger','sad','blush','tear','gazeX','gazeY','accent'];
    const expr = {...PROTO.neutral};
    const weights = { neutral:1, interested:0, surprised:0, happy:0, laugh:0, cry:0, angry:0, shy:0 };

    const WorldBrain = {
      status:'booting',
      location:{ allowed:false, attempted:false, lat:null, lon:null, rounded:null },
      time:{ hour:12, dayPhase:.5, light:.7, isNight:false, phaseName:'day' },
      weather:{
        status:'simulated', temperature:18, weatherCode:0, windSpeed:4, precipitation:0, cloudCover:25, isDay:true,
        visual:{ rain:0, snow:0, fog:0, wind:.12, storm:0, cloud:.2, clarity:.75, heat:0, cold:0 },
        nextFetchAt:0
      },
      words:['wereld','ruimte','licht','signaal']
    };

    const WeatherBrain = {
      requestStarted:false,
      lastWeatherAt:0,
      fallbackSeed:rnd(1,9999),
      locationDelayAt:performance.now() + CONFIG.locationDelayMs
    };

    const NewsBrain = {
      enabled:true, loading:false, lastFetch:0, nextFetchAt:0, failures:0,
      keywords:['voetbal','hittegolf','aardbeving','signaal','ruimte','wereld','licht','verandering','klimaat','stroom'],
      topics:[], tone:0
    };

    const MemoryBrain = {
      trace:{ neutral:1, interested:0, surprised:0, happy:0, laugh:0, cry:0, angry:0, shy:0 },
      bias:{ valence:0, curiosity:0 },
      lastDominant:'neutral', lastSpeechAt:0, pressure:0, silence:1, recentWeather:'clear', recentOutfit:'cloak',

    const AudioBrain = {
      ctx:null, master:null, reverb:null, revSend:null,

      noiseGain:null, noiseBP:null,
      started:false, enabled:!AUDIO_OFF, root:55, lastTick:0,

      makeIR(sec, decay){
        const ctx=this.ctx, rate=ctx.sampleRate, len=Math.floor(rate*sec);
        const buf=ctx.createBuffer(2,len,rate);
        for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
          for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); }
        return buf;
      },
      makeNoise(sec){
        const ctx=this.ctx, rate=ctx.sampleRate, len=Math.floor(rate*sec);
        const buf=ctx.createBuffer(1,len,rate), d=buf.getChannelData(0);
        for(let i=0;i<len;i++) d[i]=Math.random()*2-1; return buf;

      start(){
        if(this.started || !this.enabled) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        if(!AC){ this.enabled=false; return; }
        this.started=true;
        const ctx=this.ctx=new AC();
        const master=this.master=ctx.createGain(); master.gain.value=0.0001;
        const comp=ctx.createDynamicsCompressor();
        comp.threshold.value=-16; comp.ratio.value=6; comp.attack.value=.01; comp.release.value=.3;
        master.connect(comp).connect(ctx.destination);

        const reverb=this.reverb=ctx.createConvolver(); reverb.buffer=this.makeIR(4.5,3.2);
        const revSend=this.revSend=ctx.createGain(); revSend.gain.value=.8;
        const revReturn=ctx.createGain(); revReturn.gain.value=.7;
        revSend.connect(reverb).connect(revReturn).connect(master);

        const droneLP=this.droneLP=ctx.createBiquadFilter(); droneLP.type='lowpass'; droneLP.frequency.value=360; droneLP.Q.value=.6;
        const droneGain=this.droneGain=ctx.createGain(); droneGain.gain.value=0;
        droneLP.connect(droneGain); droneGain.connect(master); droneGain.connect(revSend);
        const dmuls=[1,1.004,0.5];
        this.drone=[['sine',0],['triangle',1],['sine',2]].map((spec,i)=>{
          const o=ctx.createOscillator(); o.type=spec[0]; o.frequency.value=this.root*dmuls[i]; o.connect(droneLP); o.start(); return o;
        });

        const padLP=ctx.createBiquadFilter(); padLP.type='lowpass'; padLP.frequency.value=900;
        const padGain=this.padGain=ctx.createGain(); padGain.gain.value=0;
        padLP.connect(padGain); padGain.connect(revSend); padGain.connect(master);
        this.pad=[1.5,2.0,3.0].map((mul,i)=>{ const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=this.root*mul; const g=ctx.createGain(); g.gain.value=i?.3:.6; o.connect(g).connect(padLP); o.start(); return o; });

        if(this.pad){ this.pad[0].frequency.setTargetAtTime(this.root*(em.sadness>.4?1.2:1.5), t, 4); }
        this.padGain.gain.setTargetAtTime(clamp(.025+em.curiosity*.025,.01,.07), t, 3);
        this.noiseGain.gain.setTargetAtTime(clamp(w.wind*.09+w.rain*.15+w.storm*.20+w.fog*.03,0,.35), t, .8);
        this.noiseBP.frequency.setTargetAtTime(clamp(300+w.wind*900+w.rain*1300,150,3000), t, 1);
        this.noiseBP.Q.setTargetAtTime(w.storm>.3?.4:.9, t, 1);
        this.revSend.gain.setTargetAtTime(clamp(.6+em.shyness*.4+w.fog*.4,.4,1.6), t, 2);

      voice(freq, dur, type, o={}){

        const ctx=this.ctx, t=ctx.currentTime, gain=o.gain==null?.12:o.gain, send=o.send==null?.6:o.send, attack=o.attack==null?.02:o.attack;

    function rnd(min,max){ return min + Math.random() * (max - min); }

      ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(Math.round(points[0][0]),Math.round(points[0][1]));
      for(let i=1;i<points.length;i++) ctx.lineTo(Math.round(points[i][0]),Math.round(points[i][1]));
      ctx.closePath(); ctx.fill();
    }
    function path(color, commands){
      ctx.fillStyle=color; ctx.beginPath();
      for(const c of commands){
        if(c[0]==='M') ctx.moveTo(c[1],c[2]);
        if(c[0]==='L') ctx.lineTo(c[1],c[2]);
        if(c[0]==='Q') ctx.quadraticCurveTo(c[1],c[2],c[3],c[4]);
        if(c[0]==='C') ctx.bezierCurveTo(c[1],c[2],c[3],c[4],c[5],c[6]);

    function updateTimeBrain(now){
      const d = new Date();
      const hour = d.getHours() + d.getMinutes() / 60 + d.getSeconds() / 3600;
      WorldBrain.time.hour = (WorldBrain.time._forceHour != null) ? WorldBrain.time._forceHour : hour;

      const dawn = 6.2, day = 10.0, dusk = 18.2, night = 22.0;
      let light;
      if (hour < dawn) light = .08;
      else if (hour < day) light = lerp(.08, .86, ease((hour - dawn) / (day - dawn)));
      else if (hour < dusk) light = .86;
      else if (hour < night) light = lerp(.86, .10, ease((hour - dusk) / (night - dusk)));
      else light = .08;

      WorldBrain.time.light = damp(WorldBrain.time.light, light, .45, Math.min(.05, (now-lastNow)/1000 || .016));
      WorldBrain.time.isNight = WorldBrain.time.light < .22;

      let phaseName = 'day';
      if (hour < 5 || hour >= 23) phaseName = 'deep-night';
      else if (hour < 8) phaseName = 'dawn';
      else if (hour < 17) phaseName = 'day';
      else if (hour < 21) phaseName = 'dusk';
      else phaseName = 'night';
      WorldBrain.time.phaseName = phaseName;
      WorldBrain.time.dayPhase = hour / 24;

    function startLocationWeather(){
      if (WeatherBrain.requestStarted) return;

          const lat = pos.coords.latitude;

          WorldBrain.location.allowed = true;
          WorldBrain.location.lat = lat;
          WorldBrain.location.lon = lon;
          WorldBrain.location.rounded = `${lat.toFixed(2)},${lon.toFixed(2)}`;

    async function fetchWeather(lat, lon, force=false){
      const now = performance.now();
      if (!force && now < WorldBrain.weather.nextFetchAt) return;
      WorldBrain.weather.nextFetchAt = now + 1000 * 60 * 20;

      const url = 'https://api.open-meteo.com/v1/forecast'
        + `?latitude=${encodeURIComponent(lat.toFixed(4))}`
        + `&longitude=${encodeURIComponent(lon.toFixed(4))}`
        + '&current=temperature_2m,is_day,precipitation,rain,showers,snowfall,weather_code,cloud_cover,wind_speed_10m'
        + '&timezone=auto';

      try {
        const res = await fetch(url, { cache:'no-store' });
        if (!res.ok) throw new Error('weather status ' + res.status);
        const data = await res.json();
        const cur = data.current || {};
        WorldBrain.weather.status = 'live';
        WorldBrain.weather.temperature = Number(cur.temperature_2m ?? 18);
        WorldBrain.weather.weatherCode = Number(cur.weather_code ?? 0);
        WorldBrain.weather.windSpeed = Number(cur.wind_speed_10m ?? 0);
        WorldBrain.weather.precipitation = Number((cur.precipitation ?? 0) + (cur.rain ?? 0) + (cur.showers ?? 0) + (cur.snowfall ?? 0));
        WorldBrain.weather.cloudCover = Number(cur.cloud_cover ?? 0);
        WorldBrain.weather.isDay = Number(cur.is_day ?? 1) === 1;
        WeatherBrain.lastWeatherAt = now;
      } catch (err) {
        WorldBrain.weather.status = 'simulated';
        WorldBrain.weather.nextFetchAt = now + 1000 * 60 * 8;
      }

    function classifyWeather(code){
      if ([45,48].includes(code)) return 'fog';
      if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return 'rain';
      if (code >= 71 && code <= 77) return 'snow';
      if (code >= 95) return 'storm';
      if (code >= 1 && code <= 3) return 'cloud';
      return 'clear';
    }

    function updateWeatherBrain(now, dt){
      if (!WeatherBrain.requestStarted && now > WeatherBrain.locationDelayAt) startLocationWeather();
      if (WorldBrain.location.allowed) fetchWeather(WorldBrain.location.lat, WorldBrain.location.lon, false);

      if (WorldBrain.weather.status === 'simulated') {
        const t = now * .001;
        const simCloud = clamp(.38 + slowNoise(t,.20,.035,.10,.011,WeatherBrain.fallbackSeed), 0, 1);
        WorldBrain.weather.cloudCover = Math.round(simCloud * 100);
        WorldBrain.weather.windSpeed = clamp(5 + slowNoise(t,3,.03,2,.013,2), 0, 22);
        WorldBrain.weather.temperature = 18 + slowNoise(t,4,.018,2,.007,3);

      const mood = classifyWeather(WorldBrain.weather.weatherCode);
      const v = WorldBrain.weather.visual;
      const temp = WorldBrain.weather.temperature;
      const cloud = clamp(WorldBrain.weather.cloudCover / 100, 0, 1);
      const precip = clamp(WorldBrain.weather.precipitation / 2, 0, 1);
      const wind = clamp(WorldBrain.weather.windSpeed / 34, 0, 1);

      const target = {
        rain: mood === 'rain' ? Math.max(.35, precip) : 0,
        snow: mood === 'snow' ? Math.max(.35, precip) : 0,
        fog: mood === 'fog' ? .78 : cloud > .72 ? .24 : 0,

        storm: mood === 'storm' ? .85 : 0,

        cold: clamp((6 - temp) / 12, 0, 1)

      for (const k in target) v[k] = damp(v[k], target[k], .65, dt);
      WorldBrain.weather.mood = mood;
      WorldBrain.words = [mood, String(Math.round(temp)) + 'c', WorldBrain.time.phaseName];
    }

    async function fetchNewsKeywords(force=false){

        NewsBrain.keywords = keywords.slice(0, 32);

        NewsBrain.failures = 0;

        NewsBrain.keywords = [...FALLBACK_KEYWORDS].sort(()=>Math.random()-.5).slice(0, 20);

    function extractNewsKeywords(titles){
      const counts = new Map();
      for (const title of titles) {
        const clean = title
          .toLowerCase()
          .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
          .replace(/https?:\/\/\S+/g,' ')
          .replace(/[^a-z0-9\u00c0-\u024f]+/gi,' ');
        const words = clean.split(/\s+/).map(w=>w.trim()).filter(w =>
          w.length >= 5 && w.length <= 18 && !STOPWORDS.has(w) && !/^\d+$/.test(w)
        );
        for (const w of words) counts.set(w, (counts.get(w) || 0) + 1);
      }
      return [...counts.entries()].sort((a,b)=>b[1]-a[1]).map(([word])=>word);
    }

    function estimateNewsTone(words){
      const heavy = ['conflict','war','attack','crisis','flood','death','killed','storm','climate','trump','russia','israel','gaza','iran','china','economy','inflation'];
      const curious = ['science','space','energy','robot','technology','quantum','ai','nasa','research'];
      let tone = 0;
      for (const w of words) {
        if (heavy.some(h => w.includes(h))) tone -= .12;
        if (curious.some(h => w.includes(h))) tone += .08;
      }
      return clamp(tone, -.7, .45);
    }

    function glyphCluster(len){
      const chars = ['.',':',';','/','\\','|','~','*','+','^','<','>','=','░','▒','°','·','#'];

      const count = mood === 'interested' ? rndInt(2,4) : mood === 'angry' || mood === 'cry' ? rndInt(1,2) : rndInt(1,3);
      const parts = [];
      for (let i=0;i<count;i++) parts.push(Math.random() < .32 ? weatherWord() : newsWord());
      return parts.join(' / ');
