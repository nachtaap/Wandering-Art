      if (Math.random() < .18) fragments.push(WorldBrain.time.phaseName || 'nacht');

      const middle = fragments.join(joiner);
      if (meaningful) {
        return {
          text: `${left} ${pick(phrases[mood] || phrases.neutral)} ${middle} ${right}`,
          meaningful: true
        };
      }
      return {
        text: `${left} ${middle} ${right}`,
        meaningful: false
      };
    }

    function dominantMood(){
      let best='neutral', score=-1;
      for (const k in weights) if (weights[k] > score) { score=weights[k]; best=k; }
      return best;
    }

    function spawnImpulse(now){
      const kinds = ['curious','joy','surprise','sadness','anger','shy'];
      let kind = pick(kinds);
      if (WorldBrain.weather.visual.rain > .35 && Math.random() > .45) kind = pick(['sadness','shy','curious']);
      if (WorldBrain.weather.visual.storm > .25 && Math.random() > .35) kind = pick(['anger','surprise']);
      if (WorldBrain.time.isNight && Math.random() > .55) kind = pick(['curious','shy','surprise']);
      if (emotion.valence > .28 && Math.random() > .45) kind = pick(['joy','curious','shy']);
      emotion.impulseKind = kind;
      emotion.impulseStrength = rnd(.36, .90);
      emotion.impulseDecay = rnd(.982, .991);
      emotion.nextImpulseAt = now + rnd(12000, 26000);
    }

    const emotion = {
      valence:.06, arousal:.36, tension:.14, curiosity:.52, sadness:.08, shyness:.10,
      impulseKind:'neutral', impulseStrength:0, impulseDecay:.985, nextImpulseAt:performance.now() + rnd(8000,16000)
    };

    function updateEmotion(now, dt){
      const t = now * .001;
      const wv = WorldBrain.weather.visual;
      const night = WorldBrain.time.isNight ? 1 : 0;
      const newsTone = NewsBrain.tone;
      const memoryPressure = MemoryBrain.pressure;

      let targetValence   = clamp(slowNoise(t,.18,.13,.12,.043,.8) + newsTone*.10 - wv.rain*.16 - wv.storm*.20 + (1-night)*.06, -.55, .62);
      let targetArousal   = clamp(.34 + slowNoise(t,.10,.09,.08,.027,1.6) + wv.wind*.20 + wv.storm*.28 + wv.heat*.08, .14, .95);
      let targetTension   = clamp(.14 + slowNoise(t,.10,.11,.05,.031,2.1) + wv.storm*.45 + wv.wind*.12 - wv.fog*.03 - newsTone*.16, .03, .92);
      let targetCuriosity = clamp(.48 + slowNoise(t,.12,.07,.09,.019,4.2) + night*.20 + (NewsBrain.keywords.length ? .06 : 0), .08, 1);
      let targetSadness   = clamp(.08 + slowNoise(t,.08,.05,.07,.021,3.3) + wv.rain*.22 + wv.fog*.12 - targetValence*.10, 0, .82);
      let targetShyness   = clamp(.10 + slowNoise(t,.06,.06,.05,.018,5.1) + night*.08 + wv.fog*.10, 0, .74);

      emotion.valence   = damp(emotion.valence,   targetValence,   .36, dt);
      emotion.arousal   = damp(emotion.arousal,   targetArousal,   .40, dt);
      emotion.tension   = damp(emotion.tension,   targetTension,   .32, dt);
      emotion.curiosity = damp(emotion.curiosity, targetCuriosity, .35, dt);
      emotion.sadness   = damp(emotion.sadness,   targetSadness,   .28, dt);
      emotion.shyness   = damp(emotion.shyness,   targetShyness,   .25, dt);

      if (now > emotion.nextImpulseAt) spawnImpulse(now);

      if (emotion.impulseStrength > .001) {
        const s = emotion.impulseStrength;
        if (emotion.impulseKind === 'curious') { emotion.curiosity=clamp(emotion.curiosity+.20*s,0,1); emotion.arousal=clamp(emotion.arousal+.06*s,0,1); }
        if (emotion.impulseKind === 'joy') { emotion.valence=clamp(emotion.valence+.26*s,-1,1); emotion.arousal=clamp(emotion.arousal+.10*s,0,1); }
        if (emotion.impulseKind === 'surprise') { emotion.arousal=clamp(emotion.arousal+.24*s,0,1); emotion.tension=clamp(emotion.tension+.09*s,0,1); }
        if (emotion.impulseKind === 'sadness') { emotion.sadness=clamp(emotion.sadness+.22*s,0,1); emotion.valence=clamp(emotion.valence-.18*s,-1,1); }
        if (emotion.impulseKind === 'anger') { emotion.tension=clamp(emotion.tension+.26*s,0,1); emotion.valence=clamp(emotion.valence-.20*s,-1,1); emotion.arousal=clamp(emotion.arousal+.10*s,0,1); }
        if (emotion.impulseKind === 'shy') { emotion.shyness=clamp(emotion.shyness+.26*s,0,1); emotion.valence=clamp(emotion.valence+.04*s,-1,1); }
        emotion.impulseStrength *= emotion.impulseDecay;
      }

      const positive = Math.max(0, emotion.valence);
      const negative = Math.max(0, -emotion.valence);
      const raw = {
        neutral:.24 + (1-emotion.arousal)*.32 + (1-emotion.tension)*.14,
        interested:.14 + emotion.curiosity*.96 + emotion.arousal*.10,
        surprised:.03 + emotion.arousal*.26 + (emotion.impulseKind==='surprise' ? .72*emotion.impulseStrength + .10 : 0),
        happy:.05 + positive*.95 + Math.max(0,.18-emotion.sadness)*.26,
        laugh:.02 + positive*emotion.arousal*.92 + (emotion.impulseKind==='joy' ? .42*emotion.impulseStrength + .08 : 0),
        cry:.02 + emotion.sadness*1.08 + negative*.38 + (emotion.impulseKind==='sadness' ? .44*emotion.impulseStrength + .08 : 0),
        angry:.015 + emotion.tension*.82 + negative*.42 + memoryPressure*.12 + (emotion.impulseKind==='anger' ? .54*emotion.impulseStrength + .10 : 0),
        shy:.05 + emotion.shyness*.92 + emotion.curiosity*.14 + (emotion.impulseKind==='shy' ? .38*emotion.impulseStrength + .08 : 0)
      };
      let sum=0;
      for (const k in raw){ raw[k]=Math.max(.001, Math.pow(raw[k], 1.45)); sum+=raw[k]; }
      for (const k in raw) weights[k] = damp(weights[k], raw[k]/sum, 1.25, dt);
      const sum2 = Object.values(weights).reduce((a,b)=>a+b,0) || 1;
      for (const k in weights) weights[k] /= sum2;
      for (const key of FEATURE_KEYS) {
        let v=0;
        for (const name in weights) v += PROTO[name][key] * weights[name];
        expr[key] = damp(expr[key], v, 1.85, dt);
      }
    }

    function updateMemory(dt){
      const mood = dominantMood();
      MemoryBrain.lastDominant = mood;
      for (const k in MemoryBrain.trace) MemoryBrain.trace[k] = damp(MemoryBrain.trace[k], k === mood ? 1 : 0, .045, dt);
      MemoryBrain.pressure = damp(MemoryBrain.pressure, weights.angry*.45 + WorldBrain.weather.visual.storm*.20 + Math.max(0, -NewsBrain.tone)*.12, .08, dt);
      MemoryBrain.silence = speech.active ? 0 : clamp(MemoryBrain.silence + dt * .05, 0, 1);
      MemoryBrain.recentWeather = WorldBrain.weather.mood || 'clear';
      MemoryBrain.visits = MemoryBrain.visits || 1;
      MemoryBrain.lastSave = MemoryBrain.lastSave || 0;
    }

    function computeMemoryBias(){
      let best = 'neutral';
      let bestScore = -1;
      for (const k in MemoryBrain.trace) {
        if (MemoryBrain.trace[k] > bestScore) { bestScore = MemoryBrain.trace[k]; best = k; }
      }
      MemoryBrain.bias = { valence:0, curiosity:0 };
      if (best === 'happy' || best === 'laugh') MemoryBrain.bias.valence = .10;
      else if (best === 'cry') MemoryBrain.bias.valence = -.05;
      else if (best === 'interested') MemoryBrain.bias.curiosity = .12;
      else if (best === 'shy') MemoryBrain.bias.curiosity = .04;
    }

    function loadMemory(){
      try {
        const raw = safeStorage.get('wandering_art_memory_v3');
        if (!raw) { computeMemoryBias(); return; }
        const data = JSON.parse(raw);
        if (data && data.trace) Object.assign(MemoryBrain.trace, data.trace);
        if (data && data.recentOutfit) MemoryBrain.recentOutfit = data.recentOutfit;
        if (data && data.recentWeather) MemoryBrain.recentWeather = data.recentWeather;
        MemoryBrain.visits = (data.visits || 0) + 1;
      } catch(e) {}
      computeMemoryBias();
    }

    function saveMemory(now){
      if (!MemoryBrain.lastSave) MemoryBrain.lastSave = 0;
      if (now - MemoryBrain.lastSave < 12000) return;
      MemoryBrain.lastSave = now;
      try {
        safeStorage.set('wandering_art_memory_v3', JSON.stringify({
          trace: MemoryBrain.trace,
          recentWeather: MemoryBrain.recentWeather,
          recentOutfit: MemoryBrain.recentOutfit,
          visits: MemoryBrain.visits || 1,
          savedAt: Date.now()
        }));
      } catch(e) {}
    }

    function chooseWardrobeTarget(){
      const mood = dominantMood();
      const weather = WorldBrain.weather.mood || 'clear';
      const phase = WorldBrain.time.phaseName;
      let outfit = 'cloak';
      if (weather === 'rain') outfit = 'raincoat';
      else if (weather === 'storm') outfit = 'storm-jacket';
      else if (phase === 'night' || phase === 'deep-night') outfit = 'nightdress';
      else if (mood === 'angry') outfit = 'armor';
      else if (mood === 'shy' || mood === 'cry') outfit = 'robe';
      else if (mood === 'happy' || mood === 'laugh') outfit = Math.random() > .55 ? 'ceremonial' : 'suit';
      else if (mood === 'interested') outfit = 'suit';

      const palettes = {
        cloak:{ base:'#0b3b44', shade:'#061b23', accent:'#22e64f', line:'#69fff3' },
        suit:{ base:'#0b6f7a', shade:'#063941', accent:'#a2ff75', line:'#f7fff8' },
        robe:{ base:'#102d3e', shade:'#06141d', accent:'#ff7bea', line:'#69fff3' },
        armor:{ base:'#14343f', shade:'#071016', accent:'#ff3159', line:'#f7fff8' },
        raincoat:{ base:'#09566c', shade:'#062331', accent:'#69fff3', line:'#a8fff2' },
        nightdress:{ base:'#081527', shade:'#03070f', accent:'#ff2bd6', line:'#69fff3' },
        'storm-jacket':{ base:'#17254d', shade:'#060916', accent:'#8a9cff', line:'#ffd35d' },
        ceremonial:{ base:'#11523c', shade:'#061b16', accent:'#ff2bd6', line:'#a2ff75' }
      };
      return { outfit, ...palettes[outfit] };
    }

    function initWardrobe(){
      let initial = chooseWardrobeTarget();
      if (MemoryBrain.recentOutfit) {
        const remembered = ['cloak','suit','robe','armor','raincoat','nightdress','storm-jacket','ceremonial'].includes(MemoryBrain.recentOutfit);
        if (remembered) {
          const palettes = {
            cloak:{ base:'#0b3b44', shade:'#061b23', accent:'#22e64f', line:'#69fff3' },
            suit:{ base:'#0b6f7a', shade:'#063941', accent:'#a2ff75', line:'#f7fff8' },
            robe:{ base:'#102d3e', shade:'#06141d', accent:'#ff7bea', line:'#69fff3' },
            armor:{ base:'#14343f', shade:'#071016', accent:'#ff3159', line:'#f7fff8' },
            raincoat:{ base:'#09566c', shade:'#062331', accent:'#69fff3', line:'#a8fff2' },
            nightdress:{ base:'#081527', shade:'#03070f', accent:'#ff2bd6', line:'#69fff3' },
            'storm-jacket':{ base:'#17254d', shade:'#060916', accent:'#8a9cff', line:'#ffd35d' },
            ceremonial:{ base:'#11523c', shade:'#061b16', accent:'#ff2bd6', line:'#a2ff75' }
          };
          initial = { outfit:MemoryBrain.recentOutfit, ...palettes[MemoryBrain.recentOutfit] };
        }
      }
      WardrobeBrain.current = initial;
      WardrobeBrain.target = {...initial};
      WardrobeBrain.pending = null;
      WardrobeBrain.phase = 'present';
      WardrobeBrain.opacity = 1;
      WardrobeBrain.offsetY = 0;
      WardrobeBrain.nextChangeAt = performance.now() + rnd(CONFIG.outfitFirstDepartureMinMs, CONFIG.outfitFirstDepartureMaxMs);
    }

    function chooseDifferentWardrobeTarget(){
      const currentName = WardrobeBrain.current && WardrobeBrain.current.outfit;
      let next = chooseWardrobeTarget();
      if (!currentName || next.outfit !== currentName) return next;

      const alternatives = WardrobeBrain.outfits.filter(o => o !== currentName);
      const forced = pick(alternatives);
      const palettes = {
        cloak:{ base:'#0b3b44', shade:'#061b23', accent:'#22e64f', line:'#69fff3' },
        suit:{ base:'#0b6f7a', shade:'#063941', accent:'#a2ff75', line:'#f7fff8' },
        robe:{ base:'#102d3e', shade:'#06141d', accent:'#ff7bea', line:'#69fff3' },
        armor:{ base:'#14343f', shade:'#071016', accent:'#ff3159', line:'#f7fff8' },
        raincoat:{ base:'#09566c', shade:'#062331', accent:'#69fff3', line:'#a8fff2' },
        nightdress:{ base:'#081527', shade:'#03070f', accent:'#ff2bd6', line:'#69fff3' },
        'storm-jacket':{ base:'#17254d', shade:'#060916', accent:'#8a9cff', line:'#ffd35d' },
        ceremonial:{ base:'#11523c', shade:'#061b16', accent:'#ff2bd6', line:'#a2ff75' }
      };
      return { outfit:forced, ...palettes[forced] };
    }

    function updateWardrobe(now, dt){
      if (!WardrobeBrain.current) initWardrobe();

      if (!CONFIG.outfitChangeEnabled) {
        WardrobeBrain.phase = 'present';
        WardrobeBrain.opacity = 1;
        WardrobeBrain.offsetY = 0;
        return;
      }

      if (WardrobeBrain.phase === 'present') {
        WardrobeBrain.opacity = 1;
        WardrobeBrain.offsetY = 0;
        if (now > WardrobeBrain.nextChangeAt) {
          WardrobeBrain.pending = chooseDifferentWardrobeTarget();
          WardrobeBrain.phase = 'leaving';
          WardrobeBrain.phaseStart = now;
          WardrobeBrain.phaseDuration = CONFIG.outfitLeaveMs;
          speech.active = false;
          speech.nextAt = now + rnd(6000, 12000);
        }
        return;
      }

      const p = clamp((now - WardrobeBrain.phaseStart) / Math.max(1, WardrobeBrain.phaseDuration), 0, 1);
      const e = ease(p);

      if (WardrobeBrain.phase === 'leaving') {
        WardrobeBrain.opacity = 1 - e;
        WardrobeBrain.offsetY = e * 46;
        if (p >= 1) {
          WardrobeBrain.current = {...WardrobeBrain.pending};
          WardrobeBrain.target = {...WardrobeBrain.current};
          MemoryBrain.recentOutfit = WardrobeBrain.current.outfit;
          WardrobeBrain.phase = 'away';
          WardrobeBrain.phaseStart = now;
          WardrobeBrain.phaseDuration = CONFIG.outfitAwayMs;
          WardrobeBrain.opacity = 0;
          WardrobeBrain.offsetY = 46;
        }
        return;
      }

      if (WardrobeBrain.phase === 'away') {
        WardrobeBrain.opacity = 0;
        WardrobeBrain.offsetY = 46;
        if (p >= 1) {
          WardrobeBrain.phase = 'returning';
          WardrobeBrain.phaseStart = now;
          WardrobeBrain.phaseDuration = CONFIG.outfitReturnMs;
        }
        return;
      }

      if (WardrobeBrain.phase === 'returning') {
        WardrobeBrain.opacity = e;
        WardrobeBrain.offsetY = (1 - e) * -24;
        if (p >= 1) {
          WardrobeBrain.phase = 'present';
          WardrobeBrain.opacity = 1;
          WardrobeBrain.offsetY = 0;
          WardrobeBrain.nextChangeAt = now + rnd(CONFIG.outfitDepartureMinMs, CONFIG.outfitDepartureMaxMs);
          speech.nextAt = Math.max(speech.nextAt, now + rnd(5000, 11000));
        }
      }
    }

    function updateBlink(now){
      if (now > blink.nextAt) {
        blink.until = now + rnd(95,165);
        blink.nextAt = now + rnd(2600,6800) - WorldBrain.weather.visual.wind * 260;
        if (Math.random() > .88) blink.nextAt += 190;
      }
      const b = clamp(1 - Math.abs(now - (blink.until - 76)) / 78, 0, 1);
      blink.strength = Math.max(blink.strength * .65, b);
    }

    function updatePupils(now, dt){
      // Doel-pupilgrootte op basis van emotie en lichtomstandigheid
      let target = 0.88
        + weights.surprised * 0.50   // verrassing = grote pupillen
        + emotion.curiosity  * 0.22  // nieuwsgierigheid = iets groter
        + (WorldBrain.time.isNight ? 0.32 : 0)  // nacht = groter
        + weights.happy      * 0.10  // blij = licht groter
        - weights.angry      * 0.38  // boosheid = kleiner/scherper
        - emotion.shyness    * 0.16; // verlegen = iets kleiner
      target = clamp(target, 0.44, 1.58);

      // Fourth-wall: maximale dilatatie (snel)
      if (EyeBrain.state === 'fourthWall') {
        const ft = clamp((now - EyeBrain.stateStart) / (EyeBrain.stateDur * 0.25), 0, 1);
        target = lerp(target, 1.56, ft);
      }
      // Winkende oog: pupil trekt samen
      if ((EyeBrain.state === 'winkL') && EyeBrain.leftLid > .5) {
        PupilBrain.left  = damp(PupilBrain.left,  0.32, 8, dt);
        PupilBrain.right = damp(PupilBrain.right, target, 2.5, dt);
      } else if ((EyeBrain.state === 'winkR') && EyeBrain.rightLid > .5) {
        PupilBrain.right = damp(PupilBrain.right, 0.32, 8, dt);
        PupilBrain.left  = damp(PupilBrain.left,  target, 2.5, dt);
      } else {
        PupilBrain.left  = damp(PupilBrain.left,  target, 2.5, dt);
        // Minieme asymmetrie voor organisch gevoel
        PupilBrain.right = damp(PupilBrain.right, clamp(target + Math.sin(now*.00041)*.05, .44, 1.58), 2.5, dt);
      }
    }

    function updateEyeBrain(now){
      if (EyeBrain.state === 'idle') return;
      const t = clamp((now - EyeBrain.stateStart) / EyeBrain.stateDur, 0, 1);

      if (EyeBrain.state === 'slowClose'){
        // 0-.35: sluiten, .35-.65: gesloten houden, .65-1: openen
        const s = t < .35 ? ease(t/.35) : t < .65 ? 1 : ease((1-t)/.35);
        EyeBrain.leftLid = s; EyeBrain.rightLid = s;
        if (t >= 1){ EyeBrain.leftLid=0; EyeBrain.rightLid=0; EyeBrain.state='idle'; }

      } else if (EyeBrain.state === 'winkL' || EyeBrain.state === 'winkR'){
        const w = t < .28 ? ease(t/.28) : t < .55 ? 1 : ease((1-t)/.45);
        if (EyeBrain.state === 'winkL'){ EyeBrain.leftLid=w; EyeBrain.rightLid=0; }
        else                            { EyeBrain.rightLid=w; EyeBrain.leftLid=0; }
        if (t >= 1){ EyeBrain.leftLid=0; EyeBrain.rightLid=0; EyeBrain.state='idle'; }

      } else if (EyeBrain.state === 'heavyLid'){
        const h = t < .3 ? ease(t/.3)*.58 : t < .72 ? .58 : (1-ease((t-.72)/.28))*.58;
        EyeBrain.leftLid=h; EyeBrain.rightLid=h;
        if (t >= 1){ EyeBrain.leftLid=0; EyeBrain.rightLid=0; EyeBrain.state='idle'; }

      } else if (EyeBrain.state === 'wideOpen' || EyeBrain.state === 'fourthWall'){
        EyeBrain.leftLid=0; EyeBrain.rightLid=0;
        if (t >= 1) EyeBrain.state='idle';
      }
    }

    // ── Helpersfuncties voor tier-events ────────────────
    function selectVisitorArchetype(){
      const kw = [...NewsBrain.keywords, ...NewsBrain.topics.join(' ').split(' ')].join(' ').toLowerCase();
      if (/voetbal|wk|sport|football|soccer|atletiek|kampioen/.test(kw)) return 'athlete';
      if (/space|ruimte|nasa|esa|raket|rocket|astronaut|planeet|sterren/.test(kw)) return 'astronaut';
      if (/oorlog|war|conflict|soldaat|soldier|military|aanval|wapen/.test(kw)) return 'soldier';
      if (/robot|ai|tech|cyber|android|model|algoritme|quantu/.test(kw)) return 'android';
      if (/wetenschap|onderzoek|scientist|researcher|lab|studie/.test(kw)) return 'scholar';
      if (NewsBrain.tone < -.35 || WorldBrain.time.isNight) return Math.random() < .45 ? 'ghost' : 'cloaked';
      return pick(['cloaked','traveler','scholar']);
    }

    function spawnVisitor(now){
      const V = VisitorBrain;
      V.archetype = selectVisitorArchetype();
      V.dir = Math.random() < .5 ? 1 : -1;
      V.y = rnd(188, 218);
      V.startX  = V.dir > 0 ? -65  : W + 65;
      V.targetX = V.dir > 0 ? rnd(52, 88) : rnd(W-88, W-52);
      V.endX    = V.dir > 0 ? W + 65 : -65;
      V.presentDur = rnd(7000, 13000);
      V.x = V.startX;
      V.alpha = 0;
      V.phase = 'entering';
      V.phaseStart = now;
      V.gazeOverride = null;
      weights.surprised = clamp(weights.surprised + .35, 0, 1);
    }

    function triggerRarity(id, now){
      const debug = DEBUG ? .05 : 1;
      if (id === 2){
        EyeBrain.state='slowClose'; EyeBrain.stateStart=now; EyeBrain.stateDur=rnd(3000,4400);
      } else if (id === 3){
        EyeBrain.state=Math.random()<.5?'winkL':'winkR'; EyeBrain.stateStart=now; EyeBrain.stateDur=rnd(900,1300);
      } else if (id === 4){
        EyeBrain.state='fourthWall'; EyeBrain.stateStart=now; EyeBrain.stateDur=rnd(3800,6500);
        emotion.curiosity = clamp(emotion.curiosity+.18, 0, 1);
        // Muzikaal: forceer een helder akkoord (III) voor het fourth-wall-moment
        if (MusicBrain.initialized) MusicBrain.forceChord='III';
      } else if (id === 5){
        weights.surprised = clamp(weights.surprised+.75, 0, 1);
        RarityBrain.cascadeQueue.push(
          { at:now+700,  fn:()=>{ weights.surprised=Math.max(0,weights.surprised-.5); weights.happy+=.55; }},
          { at:now+2200, fn:()=>{ weights.happy=Math.max(0,weights.happy-.28); }},
          { at:now+4000, fn:()=>{ weights.happy=Math.max(0,weights.happy-.27); }}
        );
      } else if (id === 6){
        weights.cry = clamp(weights.cry+.65, 0, 1);
        emotion.sadness = clamp(emotion.sadness+.32, 0, 1);
        RarityBrain.cascadeQueue.push(
          { at:now+5000, fn:()=>{ weights.cry=Math.max(0,weights.cry-.4); }},
          { at:now+8000, fn:()=>{ weights.cry=Math.max(0,weights.cry-.25); emotion.sadness=Math.max(0,emotion.sadness-.2); }}
        );
      } else if (id === 7){
        RarityBrain.paletteFlash = { start:now, dur:2600 };
      } else if (id === 8){
        const side = Math.random()<.5 ? -1.12 : 1.12;
        gaze.tx=side; gaze.ty=-.55; gaze.nextAt=now+3800;
        weights.surprised = clamp(weights.surprised+.45, 0, 1);
        EyeBrain.state='wideOpen'; EyeBrain.stateStart=now; EyeBrain.stateDur=3600;
        RarityBrain.cascadeQueue.push(
          { at:now+2800, fn:()=>{ weights.surprised=Math.max(0,weights.surprised-.35); gaze.nextAt=now; }},
          { at:now+4200, fn:()=>{ weights.surprised=Math.max(0,weights.surprised-.1); }}
        );
      } else if (id === 9){
        WorldBrain.weather.visual.storm = .85;
        WorldBrain.weather.visual.cloud = .92;
        emotion.tension = 1; emotion.arousal = .85;
        if (AudioBrain.started) AudioBrain.noiseBurst(2,{gain:.14,type:'lowpass',freq:300,send:.8});
        // Muzikaal: forceer frygisch bij volgende sectie
        if (MusicBrain.initialized) MusicBrain.forceScale='phrygian';
        RarityBrain.cascadeQueue.push(
          { at:now+9000,  fn:()=>{ WorldBrain.weather.visual.storm=Math.max(0,WorldBrain.weather.visual.storm-.5); }},
          { at:now+18000, fn:()=>{ WorldBrain.weather.visual.storm=Math.max(0,WorldBrain.weather.visual.storm-.35); emotion.tension=Math.max(0,emotion.tension-.6); }}
        );
      } else if (id === 10){
        if (VisitorBrain.phase === 'idle') spawnVisitor(now);
      }
    }

    function updateRarity(now, dt){
      // Cascade-wachtrij verwerken (voor expressie-overgangen na een trigger)
      const stillPending = [];
      for (const item of RarityBrain.cascadeQueue){
        if (now >= item.at) item.fn(); else stillPending.push(item);
      }
      RarityBrain.cascadeQueue = stillPending;

      // Tiers checken (hoog→laag: zeldzaamste eerst, maar stoppen bij eerste hit)
      const dbg = DEBUG ? 20 : 1;
      const elapsed = now - RarityBrain._lastCheck;
      RarityBrain._lastCheck = now;
      const sec = Math.min(elapsed, 200) / 1000;

      // Tier 10: alleen triggeren als bezoeker idle is
      for (const tier of [...RarityBrain.tiers].reverse()){
        if (tier.id === 10 && VisitorBrain.phase !== 'idle') continue;
        const cd = tier.cooldown / dbg;
        if (now - tier.lastAt < cd) continue;
        if (Math.random() < tier.chance * sec * dbg){
          tier.lastAt = now;
          triggerRarity(tier.id, now);
          break; // één tier per check-cyclus
        }
      }
    }

    function updateVisitor(now, dt){
      const V = VisitorBrain;
      if (V.phase === 'idle'){ V.alpha=0; V.gazeOverride=null; return; }
      const el = now - V.phaseStart;

      if (V.phase === 'entering'){
        const dur = 7500;
        const t = clamp(el/dur, 0, 1);
        V.alpha = ease(t) * .84;
        V.x = lerp(V.startX, V.targetX, ease(t));
        if (t >= 1){
          V.phase='present'; V.phaseStart=now;
          V.gazeOverride = { tx:clamp((V.x-180)/70,-1.1,1.1), ty:.18 };
          speech.nextAt = Math.min(speech.nextAt, now+rnd(900,2200));
          if (AudioBrain.started) AudioBrain.voice(AudioBrain.root*1.5, 3,'sine',{gain:.06,send:.9,attack:1.2});
        }

      } else if (V.phase === 'present'){
        V.alpha = clamp(.84+Math.sin(now*.0018)*.03, 0, 1);
        V.gazeOverride = { tx:clamp((V.x-180)/70,-1.1,1.1), ty:.18 };
        if (el >= V.presentDur){
          V.phase='departing'; V.phaseStart=now; V.gazeOverride=null;
          weights.surprised = clamp(weights.surprised+.18, 0, 1);
        }

      } else if (V.phase === 'departing'){
        const dur = 5800;
        const t = clamp(el/dur, 0, 1);
        V.alpha = (1-ease(t))*.84;
        V.x = lerp(V.targetX, V.endX, ease(t));
        if (t >= 1){
          V.phase='idle'; V.alpha=0; V.gazeOverride=null;
          // Reset tier-10 cooldown
          const t10 = RarityBrain.tiers.find(t=>t.id===10);
          if (t10) t10.lastAt = now;
        }
      }
    }

    // ── Muziek-synthese (deelt AudioBrain's context en routing) ──────

    function mu_bass(freq, time, dur){
      if (!AudioBrain.ctx) return;
      const ac=AudioBrain.ctx, bus=MusicBrain.bus;
      const g=ac.createGain(); g.gain.value=0;
      const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=340; lp.Q.value=.5;
      [[freq*.5,'sine'],[freq,'triangle']].forEach(([fr,ty])=>{
        const o=ac.createOscillator(); o.type=ty; o.frequency.value=fr;
        o.connect(lp); o.start(time); o.stop(time+dur+2);
      });
      lp.connect(g); g.connect(bus); g.connect(AudioBrain.revSend);
      g.gain.setValueAtTime(0,time);
      g.gain.linearRampToValueAtTime(.20,time+.07);
      g.gain.setTargetAtTime(.09,time+.5,.55);
      g.gain.setTargetAtTime(0,time+dur*.85,.6);
    }

    function mu_pad(notes, time, dur, gain=.042){
      if (!AudioBrain.ctx) return;
      const ac=AudioBrain.ctx, bus=MusicBrain.bus;
      notes.forEach(freq=>{
        const lp=ac.createBiquadFilter(); lp.type='lowpass';
        lp.frequency.value=Math.min(2000,500+freq*1.1); lp.Q.value=.5;
        const g=ac.createGain(); g.gain.value=0;
        // 3 detuned sawtooth per noot (super-saw lite)
        [-8,0,8].forEach(c=>{
          const o=ac.createOscillator(); o.type='sawtooth';
          o.frequency.value=freq; o.detune.value=c;
          o.connect(lp); o.start(time); o.stop(time+dur+5.5);
        });
        lp.connect(g); g.connect(bus); g.connect(AudioBrain.revSend);
        g.gain.setValueAtTime(0,time);
        g.gain.setTargetAtTime(gain/notes.length,time,2.5);   // trage aanslag
        g.gain.setTargetAtTime(0,time+dur,2.0);               // trage uitgang
      });
    }

    function mu_arp(freq, time, dur, vel=.082){
      if (!AudioBrain.ctx) return;
      const ac=AudioBrain.ctx, bus=MusicBrain.bus;
      const o=ac.createOscillator(); o.type='triangle'; o.frequency.value=freq;
      const lp=ac.createBiquadFilter(); lp.type='lowpass';
      lp.frequency.value=Math.min(3600,1000+freq*1.5); lp.Q.value=.38;
      const g=ac.createGain(); g.gain.value=0;
      o.connect(lp).connect(g); g.connect(bus); g.connect(AudioBrain.revSend);
      o.start(time); o.stop(time+dur+.3);
      g.gain.setValueAtTime(0,time);
      g.gain.linearRampToValueAtTime(vel,time+.016);
      g.gain.setTargetAtTime(vel*.5,time+.04,.052);
      g.gain.setTargetAtTime(0,time+dur*.6,.08);
    }

    function mu_melo(freq, time, dur){
      if (!AudioBrain.ctx) return;
      const ac=AudioBrain.ctx, bus=MusicBrain.bus;
      const o=ac.createOscillator(); o.type='sine'; o.frequency.value=freq;
      const g=ac.createGain(); g.gain.value=0;
      o.connect(g); g.connect(bus); g.connect(AudioBrain.revSend);
      o.start(time); o.stop(time+dur+1.2);
      g.gain.setValueAtTime(0,time);
      g.gain.setTargetAtTime(.062,time,.22);
      g.gain.setTargetAtTime(0,time+dur,.42);
    }

    // ── Muzieklogica: mood → muziekparameters ────────────────────

    function mu_selectScale(){
      const w=WorldBrain.weather.visual;
      // Frygisch: boosheid, storm, crisis
      if (w.storm>.55||weights.angry>.38) return 'phrygian';
      // Pentatonisch: verlegen/introvert
      if (weights.shy>.45) return 'penta';
      // Dorian: nieuwsgierigheid, blijdschap, dag
      if (weights.happy>.35||weights.laugh>.25||emotion.curiosity>.60||
          weights.interested>.40) return 'dorian';
      // Aeolisch: neutraal, verdrietig, nacht
      return 'aeolian';
    }

    function mu_selectRoot(){
      const h=WorldBrain.time.hour;
      if (h>=6&&h<10)  return muf(55,7);   // E2 - ochtend
      if (h>=10&&h<17) return muf(55,10);  // G2 - dag
      if (h>=17&&h<21) return muf(55,5);   // D2 - avond
      if (h>=21||h<2)  return 55;           // A1 - nacht
      return muf(55,-2);                    // G♯1 - diepnacht
    }

    function mu_selectBPM(){
      return Math.round(clamp(
        66
        + emotion.arousal*22
        + emotion.curiosity*8
        + weights.laugh*10
        - emotion.sadness*12
        - weights.cry*8
        + WorldBrain.weather.visual.storm*10,
        54, 100
      ));
    }

    function mu_selectBPB(){
      // 5/4 bij spanning of energie
      return (emotion.tension>.40||emotion.arousal>.55||weights.angry>.25) ? 5 : 4;
    }

    function mu_chordNotes(chordKey){
      const ch=MU_CHORDS[chordKey]; if (!ch) return [];
      const root=MusicBrain.rootHz*4;  // 2 oktaven boven bas-root
      const notes=[];
      [0,12,24].forEach(oct=>{
        ch.t.forEach(s=>{ const fr=muf(root,s+oct); if(fr>140&&fr<4000) notes.push(fr); });
      });
      return notes.sort((a,b)=>a-b);
    }

    function mu_pickChord(){
      if (MusicBrain.forceChord){ const c=MusicBrain.forceChord; MusicBrain.forceChord=null; return c; }
      // Pas Markov-gewichten aan op mood
      const base=MU_MARKOV[MusicBrain.chord]||MU_MARKOV.i;
      const adj=base.map(([d,w])=>{
        let m=w;
        if ((d==='iv'||d==='II')&&emotion.sadness>.28) m*=1+emotion.sadness*.8;
        if ((d==='III'||d==='VI')&&emotion.valence>.2) m*=1+emotion.valence*.6;
        if (d==='II'&&(emotion.tension>.45||weights.angry>.2)) m*=1.8;
        if ((d==='III'||d==='VI')&&emotion.sadness>.4) m*=.6;
        return [d, Math.max(.05,m)];
      });
      const tot=adj.reduce((s,[,w])=>s+w,0);
      let r=Math.random()*tot;
      for (const [item,w] of adj){ r-=w; if(r<=0) return item; }
      return adj[0][0];
    }

    function mu_selectPattern(){
      const bpb=MusicBrain.bpb;
      if (bpb===5){
        if (emotion.sadness>.4||weights.cry>.2) return 'breath';
        if (emotion.arousal>.5||weights.angry>.25) return 'drive';
        return 'pulse';
      }
      if (weights.cry>.3||emotion.sadness>.55) return pick(['sparse','lift']);
      if (weights.laugh>.25||weights.happy>.35) return pick(['climb','lift','climb']);
      if (emotion.arousal>.55||weights.angry>.25||WorldBrain.weather.visual.storm>.3)
        return pick(['cascade','climb','cascade']);
      if (emotion.curiosity>.5||weights.interested>.3) return pick(['climb','cascade','lift']);
      return pick(['gentle','gentle','sparse','lift']); // gentle meest waarschijnlijk
    }

    function mu_newChord(time){
      const M=MusicBrain;
      M.chord=mu_pickChord();
      M.chordBeat=0;
      M.chordDur=Math.random()<.28?4:Math.random()<.62?8:12;
      M.patNotes=mu_chordNotes(M.chord);
      M.pattern=mu_selectPattern();
      // Bas op akkoordwisseling
      const bassHz=muf(M.rootHz*2, MU_CHORDS[M.chord].t[0]);
      mu_bass(bassHz, time, (M.chordDur*60)/M.bpm);
      // Pad: laagste 2 noten
      const padGain=.038+emotion.valence*.016+(VisitorBrain.phase==='present'?.010:0);
      mu_pad(M.patNotes.slice(0,2), time, (M.chordDur*60)/M.bpm, padGain);
    }

    function mu_syncToMood(){
      const M=MusicBrain;
      // BPM en maatsoort kunnen frequent bijwerken (geen klikken)
      M.bpm=mu_selectBPM();
      M.bpb=mu_selectBPB();
      // Scale/root alleen aan sectiestart bijwerken (vermijdt abrupte klankverschuivingen)
      if (M.sectionBeat===0){
        M.scale=MusicBrain.forceScale||mu_selectScale();
        MusicBrain.forceScale=null;
        M.rootHz=mu_selectRoot();
        // Pas AudioBrain drone-root aan voor coherentie
        if (AudioBrain.started) AudioBrain.root=M.rootHz;
      }
    }

    function mu_scheduleBeat(beatInBar, time){
      const M=MusicBrain;
      const pats=M.bpb===5?MU_PAT5:MU_PAT4;
      const pat=pats[M.pattern]||Object.values(pats)[0];
      const beatDur=60/M.bpm;
      const notes=M.patNotes; if (!notes.length) return;

      pat.forEach(([pos,ni])=>{
        if (Math.floor(pos)!==beatInBar) return;
        const t=time+(pos-beatInBar)*beatDur;
        if (t<AudioBrain.ctx.currentTime) return;
        const maxIdx=Math.floor(notes.length*.80); // bovenste 20% overslaan
        const idx=Math.min(Math.max(0,ni),maxIdx-1);
        const vel=.055+Math.random()*.028+emotion.arousal*.030+emotion.curiosity*.012;
        mu_arp(notes[idx], t+(Math.random()-.5)*.009, beatDur*.44, vel);
      });

      // Melodie: zeldzaam, alleen op beat 0, middenregister (max ~900Hz om pieptonen te vermijden)
      if (beatInBar===0&&M.beat>4&&Math.random()<.07+(emotion.curiosity*.05)){
        const hi=Math.floor(notes.length*.25+Math.random()*notes.length*.35);
        const mf=notes[Math.min(hi,notes.length-1)];
        if (mf>140&&mf<900) mu_melo(mf, time+.22, (60/M.bpm)*2.8);
      }
    }

    function mu_tick(){
      const M=MusicBrain;
      if (!M.initialized||!AudioBrain.ctx) return;
      const beatDur=60/M.bpm;
      while (M.nextBeat<AudioBrain.ctx.currentTime+M.LOOK){
        if (M.chordBeat>=M.chordDur) mu_newChord(M.nextBeat);
        mu_scheduleBeat(M.beatInBar, M.nextBeat);
        M.beat++; M.chordBeat++; M.sectionBeat++;
        M.beatInBar=(M.beatInBar+1)%M.bpb;
        M.nextBeat+=beatDur;
        if (M.sectionBeat>=M.sectionLen){
          M.sectionBeat=0; M.section++;
          mu_syncToMood(); // toonladder/root bijwerken op sectieovergang
        }
      }
    }

    function initMusic(){
      const M=MusicBrain, ac=AudioBrain.ctx;
      M.bus=ac.createGain(); M.bus.gain.value=.0001;
      M.bus.connect(AudioBrain.master);
      M.bus.gain.setTargetAtTime(.82, ac.currentTime, 4);
      M.rootHz=mu_selectRoot();
      M.scale=mu_selectScale();
      M.bpm=mu_selectBPM();
      M.bpb=mu_selectBPB();
      M.nextBeat=ac.currentTime+.35;
      M.beat=0; M.beatInBar=0; M.chordBeat=999; M.sectionBeat=0;
      M.initialized=true;
      M.handle=setInterval(mu_tick, M.TICK);
    }

    function attentionTarget(){
      if (!CONFIG.attentionToEvents) return null;
      let best = null;
      let score = 0;

      for (const s of ShipBrain.ships) {
        if (s.y > 146) continue;
        const centerBias = 1 - clamp(Math.abs(s.x - W/2) / (W/2), 0, 1);
        const sizeBias = s.depth + (s.archetype === 'carrier' ? .34 : 0) + (s.archetype === 'probe' ? .12 : 0);
        const visible = s.x > -12 && s.x < W + 12 ? 1 : .2;
        const sc = (centerBias * .52 + sizeBias * .48) * visible;
        if (sc > score) { score = sc; best = { x:s.x, y:s.y, strength:clamp(sc,0,1), kind:s.archetype }; }
      }

      if (bgEvents.star.active) {
        const e = bgEvents.star;
        const t = clamp((performance.now() - e.start) / e.duration, 0, 1);
        const x = lerp(e.x0, e.x1, t);
        const y = lerp(e.y0, e.y1, t);
        if (.58 > score) best = { x, y, strength:.58, kind:'falling-star' };
      }

      if (DriftGlyphBrain.glyphs.length && Math.random() < .18) {
        const g = pick(DriftGlyphBrain.glyphs);
        if (.38 > score) best = { x:g.x, y:g.y, strength:.38, kind:'word' };
      }

      // Bezoeker trekt maximale aandacht
      if (VisitorBrain.phase === 'present' && VisitorBrain.alpha > .3) {
        best = { x:VisitorBrain.x, y:VisitorBrain.y - 28, strength:.92, kind:'visitor' };
      }

      return best && best.strength > .30 ? best : null;
    }

    function updateGaze(now, dt){
      const mood = dominantMood();
      // Fourth-wall: blik dwingen naar midden (camera)
      if (EyeBrain.state === 'fourthWall') {
        gaze.tx = 0; gaze.ty = 0;
        gaze.nextAt = now + 400;
      } else if (VisitorBrain.gazeOverride && VisitorBrain.phase === 'present') {
        gaze.tx = VisitorBrain.gazeOverride.tx;
        gaze.ty = VisitorBrain.gazeOverride.ty;
        gaze.nextAt = now + 600;
      } else if (now > gaze.nextAt) {
        const target = attentionTarget();
        if (target && Math.random() > .22) {
          gaze.tx = clamp((target.x - 180) / 70, -1.15, 1.15);
          gaze.ty = clamp((target.y - 106) / 72, -.75, .80);
          gaze.nextAt = now + rnd(900, 2300) + target.strength * 1200;
          if (target.kind === 'carrier' || target.kind === 'falling-star') {
            emotion.curiosity = clamp(emotion.curiosity + .025, 0, 1);
          }
        } else {
          let spreadX = .34 + emotion.curiosity*.25;
          let spreadY = .15 + emotion.sadness*.18;
          if (mood === 'shy') { spreadX=.20; spreadY=.14; }
          if (mood === 'surprised') { spreadX=.10; spreadY=.12; }
          gaze.tx = clamp(expr.gazeX + rnd(-spreadX, spreadX), -1.2, 1.2);
          gaze.ty = clamp(expr.gazeY + rnd(-spreadY, spreadY), -.8, .9);
          gaze.nextAt = now + rnd(1400, 4200);
        }
      }
      gaze.x = damp(gaze.x, gaze.tx, 3.7, dt);
      gaze.y = damp(gaze.y, gaze.ty, 3.7, dt);
    }

    function updateMotion(now, dt){
      const mood = dominantMood();
      const wind = WorldBrain.weather.visual.wind;
      if (now > motion.nextAt) {
        let rangeX = 4.4 + wind * 2.6;
        let rangeY = 2.6 + WorldBrain.weather.visual.fog * 1.0;
        let rangeTilt = .012 + wind * .008;
        if (mood === 'laugh' || mood === 'happy') rangeX += 1.3;
        if (mood === 'angry') rangeTilt *= .65;
        if (mood === 'shy') rangeX *= .65;
        motion.tx = rnd(-rangeX, rangeX);
        motion.ty = rnd(-rangeY, rangeY);
        motion.ttilt = rnd(-rangeTilt, rangeTilt);
        motion.nextAt = now + rnd(5200, 11000);
      }
      motion.x = damp(motion.x, motion.tx, .45, dt);
      motion.y = damp(motion.y, motion.ty, .45, dt);
      motion.tilt = damp(motion.tilt, motion.ttilt, .45, dt);
    }

    function pickPose(now){
      const mood = dominantMood();
      // Gewogen keuze: pose-gewicht × mood-boost; huidige én vorige pose uitgesloten (minder herhaling).
      const cand = []; let total = 0;
      for (const k of POSE_KEYS){
        if (k === PoseBrain.name || k === PoseBrain.prev) continue;
        const p = LIMB_POSES[k];
        const wgt = (p.w || 1) * (p.mood === mood ? 2.2 : 1);
        cand.push({ k, wgt }); total += wgt;
      }
      let r = Math.random() * total, chosen = cand[0].k;
      for (const c of cand){ r -= c.wgt; if (r <= 0){ chosen = c.k; break; } }
      const p = LIMB_POSES[chosen];
      // Intensiteit gekoppeld aan arousal (kalm = ingetogen, levendig = voller). Altijd ≤1 → in-frame.
      const scale = clamp((.66 + emotion.arousal * .5) * (.9 + Math.random() * .14), .5, 1);
      PoseBrain.prev = PoseBrain.name;
      PoseBrain.name = chosen;
      PoseBrain.tar.ls = p.l.s * scale; PoseBrain.tar.le = p.l.e * scale; PoseBrain.tar.lh = p.l.h * scale;
      PoseBrain.tar.rs = p.r.s * scale; PoseBrain.tar.re = p.r.e * scale; PoseBrain.tar.rh = p.r.h * scale;
      // Kortere, gevarieerde hold-tijden zodat het vloeiend doorbeweegt i.p.v. blijft hangen.
      PoseBrain.nextAt = now + (chosen === 'rest' ? rnd(1800, 3400) : rnd(2600, 5200));
    }

    const GreetBrain = { active:false, start:0 };

    function updatePose(now, dt){
      // ── Begroet-zwaai (tijdgestuurde sequentie, heeft voorrang) ────────────
      if (GreetBrain.active){
        const e = (now - GreetBrain.start) / 1000;
        const T_RAISE  = .70;   // onderarm omhoog
        const T_HAND   = .42;   // pols/hand draait daarna apart mee
        const T_WAVE   = 2.05;  // zwaai-fase
        const T_LOWER  = .78;   // arm en pols rustig terug
        const LS_UP    = -.12;  // schouder blijft subtiel; onderarm doet het werk
        const LE_UP    = 2.0;   // onderarm: wijst links-omhoog
        const HAND_REST_ABS = -.10;
        // Linkerhand wordt gespiegeld getekend. Visueel "vingers omhoog / palm naar voren"
        // is daarom een absolute rotatie rond PI, niet een grote negatieve delta.
        const HAND_UP_ABS  = Math.PI + .06;
        const WAVE_AMP = .34;   // natuurlijke polszwaai: ±19°, geen 45° klap
        const ss = f => f*f*(3-2*f);
        const c = PoseBrain.cur, t = PoseBrain.tar;
        let le=0, lh=0, done=false;

        const wristDeltaFor = (forearmDelta, handAbs) => {
          // draw-hand gebruikt: -.10 + (aL2-ARM.L2) + P.lh.
          // P.lh moet dus de polsrotatie zijn die de hand naar een absolute,
          // leesbare palm-forward hoek brengt. Zo stapelt de hand niet onnatuurlijk
          // bovenop de onderarmrotatie.
          return handAbs - (HAND_REST_ABS + forearmDelta);
        };

        if (e < T_RAISE){
          // Onderarm leidt. De hand blijft eerst losjes hangen en begint pas licht te volgen.
          const f = ss(e / T_RAISE);
          le = LE_UP * f;
          const looseHand = HAND_REST_ABS + le * .24;
          lh = wristDeltaFor(le, looseHand);
        } else if (e < T_RAISE + T_HAND){
          // Daarna draait alleen de pols door naar palm-forward.
          const f = ss((e - T_RAISE) / T_HAND);
          le = LE_UP;
          const looseHand = HAND_REST_ABS + LE_UP * .24;
          const handAbs = lerp(looseHand, HAND_UP_ABS, f);
          lh = wristDeltaFor(le, handAbs);
        } else if (e < T_RAISE + T_HAND + T_WAVE){
          // Zwaai uit de pols, met een kleine forearm-bounce zodat het niet mechanisch wordt.
          const w = e - T_RAISE - T_HAND;
          const wavePhase = w * Math.PI * 3.6;
          const envelope = Math.sin(clamp(w / T_WAVE, 0, 1) * Math.PI);
          le = LE_UP + Math.sin(wavePhase + .8) * .045 * envelope;
          const handAbs = HAND_UP_ABS + Math.sin(wavePhase) * WAVE_AMP * (.72 + .28 * envelope);
          lh = wristDeltaFor(le, handAbs);
        } else if (e < T_RAISE + T_HAND + T_WAVE + T_LOWER){
          // Terug: eerst ontspant de pols, daarna zakt de onderarm mee.
          const f = ss((e - T_RAISE - T_HAND - T_WAVE) / T_LOWER);
          le = LE_UP * (1 - f);
          const handAbs = lerp(HAND_UP_ABS, HAND_REST_ABS, f);
          lh = wristDeltaFor(le, handAbs);
        } else { done = true; }

        if (!done){
          c.ls=t.ls=LS_UP; c.le=t.le=le; c.lh=t.lh=lh;
          c.rs=t.rs=0;     c.re=t.re=0;  c.rh=t.rh=0;
          PoseBrain.name='greet';
          return;
        }
        GreetBrain.active=false;
        // Zeker weten dat de rig schoon terugvalt naar de normale autonome pose-pool.
        const z = PoseBrain.tar; z.ls=z.le=z.lh=z.rs=z.re=z.rh=0;
        PoseBrain.nextAt=now+500;
      }

      if (!RIG_MOTION){
        const z = PoseBrain.tar; z.ls=z.le=z.lh=z.rs=z.re=z.rh=0; PoseBrain.name='rest';
      } else if (now > PoseBrain.nextAt){
        pickPose(now);
      }
      const rate = .9, c = PoseBrain.cur, t = PoseBrain.tar;
      c.ls = damp(c.ls, t.ls, rate, dt); c.le = damp(c.le, t.le, rate, dt); c.lh = damp(c.lh, t.lh, rate, dt);
      c.rs = damp(c.rs, t.rs, rate, dt); c.re = damp(c.re, t.re, rate, dt); c.rh = damp(c.rh, t.rh, rate, dt);
    }

    function updateSpeech(now){
      if (WardrobeBrain.phase && WardrobeBrain.phase !== 'present') {
        speech.active = false;
        speech.nextAt = Math.max(speech.nextAt, now + 5000);
        return;
      }
      const mood = dominantMood();
      if (!speech.active && now > speech.nextAt) {
        const data = generateSpeechText(mood);
        speech.active = true;
        speech.start = now;
        speech.duration = rnd(3000, 6000);
        speech.text = data.text;
        speech.mood = mood;
        speech.meaningful = data.meaningful;
        speech.phase = rnd(0,999);
        MemoryBrain.lastSpeechAt = now;
        AudioBrain.murmur(mood);
      }
      if (speech.active && now > speech.start + speech.duration) {
        speech.active = false;
        speech.nextAt = now + (rnd(8500, 22000) - emotion.arousal * 1600) / CONFIG.speechFrequency;
      }
    }

    function speechAlpha(now){
      if (!speech.active) return 0;
      const t = now - speech.start;
      const inDur = 260, outDur = 360, total = speech.duration;
      if (t < inDur) return clamp(t/inDur,0,1);
      if (t > total-outDur) return clamp((total-t)/outDur,0,1);
      return 1;
    }

    function speakOpen(now){
      if (!speech.active) return 0;
      const a = speechAlpha(now);
      const rhythm = .35 + .35 * (0.5 + 0.5 * Math.sin(now*.018 + speech.phase)) + .18 * (0.5 + 0.5 * Math.sin(now*.041 + speech.phase*.67));
      return a * rhythm * .72;
    }

    function createShip(seed, archetype, depth, route=null){
      const rng = mulberry32(seed);
      const specs = {
        needle:[13,5], freighter:[19,7], drone:[9,7], saucer:[15,5], organic:[15,9], broken:[17,7], carrier:[42,11]
      };
      const [gw, gh] = specs[archetype] || specs.freighter;
      const grid = Array.from({length:gh},()=>Array(gw).fill(0));
      const midY = Math.floor(gh/2), midX = Math.floor(gw/2);
      const cell = (x,y,v) => { if (x>=0 && x<gw && y>=0 && y<gh) grid[y][x] = Math.max(grid[y][x], v); };
      const erase = (x,y) => { if (x>=0 && x<gw && y>=0 && y<gh) grid[y][x] = 0; };

      if (archetype === 'needle') {
        for (let x=1; x<gw-2; x++) cell(x, midY, 2);
        for (let x=4; x<gw-5; x++) if (rng()>.45) { cell(x, midY-1, 1); cell(x, midY+1, 1); }
        cell(gw-2, midY, 3); cell(0, midY, 5);
      }

      if (archetype === 'freighter' || archetype === 'carrier') {
        const margin = archetype === 'carrier' ? 2 : 1;
        for (let x=margin; x<gw-margin; x++) {
          cell(x, midY, 2);
          if (x > 3 && x < gw-4) { cell(x, midY-1, 1); cell(x, midY+1, 1); }
          if (archetype === 'carrier' && x > 7 && x < gw-8 && x % 3 !== 0) { cell(x, midY-2, 1); cell(x, midY+2, 1); }
        }
        for (let x=5; x<gw-5; x+=4) { cell(x, 1, 1); cell(x, gh-2, 1); }
        cell(gw-4, midY-1, 3); cell(gw-4, midY, 3);
        cell(1, midY-1, 5); cell(1, midY+1, 5);
        if (archetype === 'carrier') {
          for (let x=8; x<gw-8; x+=6) { cell(x, midY-3, 6); cell(x, midY+3, 6); }
          cell(0, midY, 5); cell(2, 1, 4); cell(2, gh-2, 4);
        }
      }

      if (archetype === 'drone') {
        for (let y=1;y<gh-1;y++) cell(midX, y, 2);
        for (let x=1;x<gw-1;x++) cell(x, midY, 2);
        cell(midX, midY, 3); cell(midX-2, midY-2, 4); cell(midX+2, midY+2, 4);
        cell(1, midY, 5); cell(gw-2, midY, 5);
      }

      if (archetype === 'saucer') {
        for (let x=2;x<gw-2;x++) cell(x, midY, 2);
        for (let x=4;x<gw-4;x++) { cell(x, midY-1, 1); cell(x, midY+1, 1); }
        for (let x=6;x<gw-6;x++) cell(x, midY-2, 3);
        cell(2, midY, 5); cell(gw-3, midY, 5);
      }

      if (archetype === 'organic') {
        for (let x=1;x<gw-1;x++) {
          const wave = Math.round(Math.sin(x*.85 + rng()*1.3) * 1.4);
          const half = 1 + Math.floor(rng()*2);
          for (let d=-half; d<=half; d++) cell(x, clamp(midY + wave + d, 0, gh-1), rng()>.55 ? 2 : 1);
        }
        for (let i=0;i<4;i++) cell(2 + Math.floor(rng()*(gw-4)), Math.floor(rng()*gh), 4);
        cell(gw-3, midY, 3); cell(1, midY, 5);
      }

      if (archetype === 'broken') {
        for (let x=1; x<gw-1; x++) { cell(x, midY, 2); if (rng()>.50) cell(x, midY-1, 1); if (rng()>.50) cell(x, midY+1, 1); }
        cell(gw-2, midY, 3); cell(1, midY, 5);
        for(let i=0;i<Math.floor(gw*gh*.18);i++) erase(Math.floor(rng()*gw), Math.floor(rng()*gh));
        for(let i=0;i<3;i++) cell(Math.floor(rng()*gw), Math.floor(rng()*gh), 6);
      }

      if (rng()>.52) cell(midX, Math.max(0, midY-1), 3);
      if (rng()>.68 && archetype !== 'carrier') cell(midX + Math.floor(rng()*4)-2, 0, 6);

      const dir = rng() > .5 ? 1 : -1;
      const y = route ? route.y + rnd(-route.wobble, route.wobble) : (archetype === 'carrier' ? rnd(26, 64) : rnd(20, 150));
      const speedBase = archetype === 'carrier' ? .00115 : archetype === 'freighter' ? .0032 : archetype === 'needle' ? .0065 : archetype === 'drone' ? .0055 : .0048;
      const routeDepth = route ? route.depth : depth;
      return {
        seed, archetype, grid, gw, gh, depth:routeDepth, dir,
        routeName: route ? route.name : 'wander',
        x:dir > 0 ? -gw*10 : W + gw*10,
        y, baseY:y,
        scale: archetype === 'carrier' ? lerp(1.65, 2.25, routeDepth) : lerp(.82, 1.55, routeDepth),
        speed:speedBase * (route ? route.speedMul : 1) * lerp(.55, 1.05, routeDepth),
        alpha:lerp(.46, .92, routeDepth) * (route ? route.alphaMul : 1),
        phase:rng()*999,
        behavior: route ? 'route' : archetype === 'saucer' ? 'hover' : archetype === 'broken' ? 'glitch' : pick(['straight','hover','arc'])
      };
    }

    function spawnShip(now, rare=false, major=false){
      if (major) {
        const route = { name:'silent carrier route', y:rnd(32,58), wobble:1.2, depth:rnd(.18,.30), speedMul:.55, alphaMul:.52 };
        ShipBrain.ships.push(createShip(++ShipBrain.seed, 'carrier', route.depth, route));
        return;
      }

      if (!rare) {
        const route = pick(FREIGHT_ROUTES);
        const r = Math.random();
        const archetype = r < .58 ? 'freighter' : r < .78 ? 'needle' : r < .90 ? 'drone' : r < .97 ? 'saucer' : 'organic';
        ShipBrain.ships.push(createShip(++ShipBrain.seed, archetype, route.depth, route));
        return;
      }

      const archetype = pick(WorldBrain.time.isNight ? ['drone','saucer','organic','broken'] : ['drone','saucer','needle','organic']);
      const depth = Math.pow(rnd(.12, .74), 1.35);
      ShipBrain.ships.push(createShip(++ShipBrain.seed, archetype, depth, null));
    }

    function updateShips(now, dt){
      const fogPause = WorldBrain.weather.visual.fog * 4500;
      const nightEase = WorldBrain.time.isNight ? -3000 : 0;
      if (now > ShipBrain.nextSpawnAt && ShipBrain.ships.length < ShipBrain.maxShips) {
        spawnShip(now, false, false);
        ShipBrain.nextSpawnAt = now + rnd(7000, 17000) / Math.max(.3, CONFIG.shipDensity) + fogPause * .5 + nightEase;
      }
      if (now > ShipBrain.rareAt && ShipBrain.ships.length < ShipBrain.maxShips + 1) {
        spawnShip(now, true, false);
        ShipBrain.rareAt = now + rnd(48000, 120000);
      }
      if (now > ShipBrain.majorAt) {
        if (ShipBrain.ships.length < ShipBrain.maxShips) {
          spawnShip(now, true, true);
          ShipBrain.majorAt = now + rnd(CONFIG.hugeShipMinMs, CONFIG.hugeShipMaxMs);
        } else {
          ShipBrain.majorAt = now + rnd(6000, 14000); // wacht op rustiger lucht
        }
      }

      const wind = WorldBrain.weather.visual.wind;
      for (const s of ShipBrain.ships) {
        let factor = 1 + wind * .16;
        s.x += s.dir * s.speed * 1000 * dt * factor;
        if (s.behavior === 'route') {
          s.y = s.baseY + Math.sin(now*.00045 + s.phase) * (s.archetype === 'carrier' ? .6 : 1.2);
        } else if (s.behavior === 'arc') {
          s.y += Math.sin(now*.0011 + s.phase) * dt * 4;
        } else if (s.behavior === 'hover') {
          s.y += Math.sin(now*.002 + s.phase) * dt * 3;
        } else if (s.behavior === 'glitch' && hash(Math.floor(now/320) + s.seed) > .992) {
          s.x += s.dir * rnd(2,6);
        }
      }
      ShipBrain.ships = ShipBrain.ships.filter(s => s.dir > 0 ? s.x < W + 180 : s.x > -180);
    }

    function updateBackgroundEvents(now){
      const star = bgEvents.star;
      if (!star.active && now > star.nextAt) {
        star.active = true; star.start = now; star.duration = rnd(650, 1200);
        star.x0 = rnd(W*.62,W-20); star.y0 = rnd(12,70); star.x1 = star.x0 - rnd(90,150); star.y1 = star.y0 + rnd(34,64);
      }
      if (star.active && now > star.start + star.duration) { star.active=false; star.nextAt = now + rnd(6500,15000); }

      const sig = bgEvents.signal;
      if (!sig.active && now > sig.nextAt) {
        sig.active = true; sig.start = now; sig.duration = rnd(900, 1800); sig.x = rnd(30,330); sig.y = rnd(26, H - 60);
      }
      if (sig.active && now > sig.start + sig.duration) { sig.active=false; sig.nextAt = now + rnd(16000, 36000); }
    }

    function maybeGlitch(now){
      if (speech.active || REDUCED) return;
      const stormBoost = WorldBrain.weather.visual.storm * 3000;
      if (now > glitchAt - stormBoost) {
        glitchUntil = now + rnd(70, 170 + WorldBrain.weather.visual.storm * 150);
        glitchAt = now + rnd(10000, 21000);
        AudioBrain.glitch();
      }
    }

    function driftWord(){
      const pool = [];
      if (NewsBrain.keywords.length) pool.push(...NewsBrain.keywords.slice(0, 14));
      pool.push(WorldBrain.weather.mood || 'clear', WorldBrain.time.phaseName || 'night', weatherWord(), 'signaal', 'ruimte');
      return pick(pool.filter(Boolean));
    }

    function updateDriftGlyphs(now, dt){
      if (!CONFIG.ambientGlyphs) return;
      const weather = WorldBrain.weather.visual;
      const urge = CONFIG.ambientGlyphChance + emotion.curiosity * .004 + weather.storm * .010 + WorldBrain.time.isNight * .004;
      if (now > DriftGlyphBrain.nextAt && DriftGlyphBrain.glyphs.length < DriftGlyphBrain.max) {
        const word = Math.random() < .55 ? driftWord() : glyphCluster(rndInt(2, 5));
        DriftGlyphBrain.glyphs.push({
          text: word,
          x: rnd(14, W - 80),
          y: rnd(70, H - 40),
          vy: rnd(-.012, -.004) * (weather.storm > .35 ? 1.5 : 1),
          vx: rnd(-.006, .006) + (weather.wind - .15) * .008,
          life: rnd(6000, 12000),
          born: now,
          color: Math.random() < .5 ? C.cyan4 : (Math.random() < .55 ? C.green2 : C.magentaSoft),
          size: Math.random() < .25 ? 10 : 9
        });
        DriftGlyphBrain.nextAt = now + rnd(9000, 22000) / (1 + urge * 6);
      }
      for (const g of DriftGlyphBrain.glyphs) {
        g.x += g.vx * 1000 * dt;
        g.y += g.vy * 1000 * dt;
      }
      DriftGlyphBrain.glyphs = DriftGlyphBrain.glyphs.filter(g => now - g.born < g.life && g.x > -80 && g.x < W + 80 && g.y > -30);
    }

    function drawDriftGlyphs(now){
      if (!CONFIG.ambientGlyphs) return;
      ctx.save();
      ctx.font = '9px monospace';
      ctx.textBaseline = 'top';
      for (const g of DriftGlyphBrain.glyphs) {
        const age = (now - g.born) / g.life;
        const a = Math.sin(clamp(age, 0, 1) * Math.PI) * .20;
        if (a <= .01) continue;
        ctx.globalAlpha = a * (WorldBrain.weather.visual.fog > .4 ? .55 : 1);
        ctx.fillStyle = g.color;
        ctx.fillText(g.text, Math.round(g.x), Math.round(g.y));
      }
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function drawMoodAura(now){
      if (!RICH_PALETTE) return;   // strak: geen gekleurde gloed achter het hoofd
      const entityAlpha = WardrobeBrain.opacity == null ? 1 : WardrobeBrain.opacity;
      if (entityAlpha <= .02) return;
      const p = expr;
      const auraColor = p.anger > .35 ? C.red : p.sad > .35 ? C.cyan4 : p.blush > .35 ? C.magenta : C.green1;
      const pulse = .5 + .5 * Math.sin(now * .0017);
      ctx.save();
      ctx.globalAlpha = (.045 + p.accent * .05 + pulse * .018) * entityAlpha;
      ctx.fillStyle = auraColor;
      ctx.beginPath();
      ctx.ellipse(181, 124 + (WardrobeBrain.offsetY || 0), 96 + pulse * 4, 112 + pulse * 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawBackground(now){
      const light  = WorldBrain.time.light;
      const phase  = WorldBrain.time.phaseName;
      const hour   = WorldBrain.time.hour;
      const wv     = WorldBrain.weather.visual;
      const t      = now * .001;

      // ── Hemelgradiënt ────────────────────────────────────────────────────────
      // Elke fase heeft een top- en bodemkleur; lerp op basis van light.
      // Nachtkleuren blijven diepe ruimte, dagkleuren echte blauwe lucht.
      const nightTop='#010209', nightBot='#020410';
      const dawnTop ='#1a0a2e', dawnBot ='#c0502a';
      const dayTop  ='#0d3b7a', dayBot  ='#5fa8d8';
      const duskTop ='#1a0828', duskBot ='#c04430';

      function skyColor(nightC, dawnC, dayC, duskC){
        if (phase==='deep-night'||phase==='night') return nightC;
        if (phase==='dawn')  return mixHex(nightC,dawnC,clamp((hour-5)/3,0,1));
        if (phase==='dusk')  return mixHex(dayC,duskC,clamp((hour-17)/4,0,1));
        return dayC;  // day
      }
      const topCol = skyColor(nightTop,dawnTop,dayTop,duskTop);
      const botCol = skyColor(nightBot,dawnBot,dayBot,duskBot);

      const grad = ctx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0, topCol);
      grad.addColorStop(1, botCol);
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,W,H);

      // ── Zon / maan ────────────────────────────────────────────────────────────
      // Zon beweegt van links naar rechts door de dag; maan 's nachts.
      const sunProgress = clamp((hour - 5) / 14, 0, 1);  // 5u→19u
      const sunX = W * (.08 + sunProgress * .84);
      const sunY = H * (.22 - Math.sin(sunProgress * Math.PI) * .16);

      if (phase==='day'||phase==='dawn'||phase==='dusk'){
        const sunAlpha = clamp(light * .82, 0, .82);
        // zon-gloed
        const sg = ctx.createRadialGradient(sunX,sunY,2,sunX,sunY,46);
        sg.addColorStop(0,'rgba(255,230,160,'+sunAlpha+')');
        sg.addColorStop(.38,'rgba(255,180,80,'+(sunAlpha*.5)+')');
        sg.addColorStop(1,'rgba(255,140,40,0)');
        ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
        // zon-schijf
        ctx.globalAlpha=sunAlpha*.9;
        ellipse(sunX,sunY,10,10,'#fff5cc');
        ellipse(sunX,sunY,6,6,'#fffde8');
        ctx.globalAlpha=1;
      }
      if (phase==='night'||phase==='deep-night'){
        const moonX = W*.72 + Math.sin(t*.012)*4;
        const moonY = H*.14 + Math.cos(t*.009)*3;
        const moonA = clamp((1-light)*1.1,.0,.9);
        const mg = ctx.createRadialGradient(moonX,moonY,3,moonX,moonY,22);
        mg.addColorStop(0,'rgba(230,240,255,'+moonA+')');
        mg.addColorStop(.5,'rgba(180,200,240,'+(moonA*.55)+')');
        mg.addColorStop(1,'rgba(100,130,200,0)');
        ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
        ctx.globalAlpha=moonA*.82;
        ellipse(moonX,moonY,9,9,'#e8f0ff');
        ellipse(moonX+4,moonY-2,7,7,nightBot); // maanschaduw (sikkel effect)
        ctx.globalAlpha=1;
      }

      // ── Sterren (faden uit bij daglicht) ────────────────────────────────────
      const starAlpha = clamp((1-light)*.72 + wv.clarity*.18, .04, .72);
      for (const s of stars){
        const tw = .25 + .75*(.5+.5*Math.sin(now*.0012+s.phase));
        ctx.globalAlpha = starAlpha * (.20+tw*.58);
        rect(s.x,s.y,s.size,s.size,s.c);
      }
      ctx.globalAlpha=1;

      // ── Overdag-wolken ────────────────────────────────────────────────────────
      // Wit/lichtblauw overdag; dim cyaan 's nachts. Gebruikt het bestaande cloud-systeem.
      const cloudDay  = clamp(light,.0,1);
      const puffN     = REDUCED ? 4 : 8;
      const cloudAmt  = wv.cloud + cloudDay*.28;  // overdag altijd wat wolken
      if (cloudAmt > .08){
        for (let i=0;i<puffN;i++){
          const seed = i*53.13+WeatherBrain.fallbackSeed;
          const drift= now*(.0018+hash(seed*1.7)*.0022)*(i%2?1:-1);
          const px   = mod(hash(seed)*W*1.5+drift,W*1.5)-W*.25;
          const py   = 18+hash(seed*2.1)*130+Math.sin(now*.0004+seed)*5;
          const rx   = 28+hash(seed*3.7)*48;
          const ry   = 10+hash(seed*1.9)*12;
          // Dag = wit; nacht = donker cyaan
          const col  = cloudDay>.5 ? mixHex('#c8e8ff','#ffffff',cloudDay*.8) : C.cyan0;
          const alph = cloudAmt*(.06+hash(seed*5.5)*.06)*(cloudDay>.5?2.2:1);
          ctx.globalAlpha=clamp(alph,0,.55);
          ellipse(px,     py,        rx,    ry,    col);
          ellipse(px+rx*.55,py+ry*.35,rx*.65,ry*.7, cloudDay>.5?'#dff0ff':C.cyan0);
          ellipse(px-rx*.45,py+ry*.2, rx*.5, ry*.6, col);
        }
        ctx.globalAlpha=1;
      }

      // ── Kosmische laag (altijd zichtbaar, dimmer bij daglicht) ────────────────
      const cosmicDim = clamp(1-light*.6, .28, 1);
      ctx.globalAlpha=cosmicDim;
      drawCosmic(now);
      drawShips(now);
      drawDriftGlyphs(now);
      drawShootingStar(now);
      drawSignal(now);
      ctx.globalAlpha=1;
      drawWeatherBack(now);
    }

    function drawShips(now){
      for (const s of ShipBrain.ships) {
        ctx.save();
        const fogFade = WorldBrain.weather.visual.fog > .5 ? .70 : 1;
        const clarity = .52 + WorldBrain.weather.visual.clarity * .48;
        ctx.globalAlpha = s.alpha * fogFade * clarity;
        const bob = Math.sin(now*.0012 + s.phase) * (s.behavior === 'hover' ? 1.8 : .35);
        const tremble = s.archetype === 'broken' ? Math.sin(now*.018 + s.seed) * .45 : 0;
        ctx.translate(Math.round(s.x + tremble), Math.round(s.y + bob));
        if (s.dir < 0) ctx.scale(-1,1);
        ctx.scale(s.scale, s.scale);

        const cellSize = 2;
        const offX = -s.gw * cellSize / 2, offY = -s.gh * cellSize / 2;
        const wp = WardrobeBrain.current || { accent:C.green1, line:C.cyan4 };
        const pal = [C.black, C.cyan1, C.cyan3, C.white, wp.accent, C.amber, C.magenta];

        if (s.archetype === 'carrier') {
          ctx.globalAlpha *= .48;
          rect(offX - 6, offY + 1, s.gw * cellSize + 12, s.gh * cellSize - 2, C.black);
          ctx.globalAlpha *= 1.35;
        }

        for (let y=0;y<s.gh;y++) {
          for (let x=0;x<s.gw;x++) {
            const v = s.grid[y][x];
            if (!v) continue;
            const flicker = (s.archetype === 'broken' && hash(Math.floor(now/240) + x*13 + y*7 + s.seed) > .95);
            const col = flicker ? C.magenta : (pal[v] || C.cyan4);
            rect(offX + x*cellSize, offY + y*cellSize, cellSize, cellSize, col);
          }
        }

        if (s.archetype === 'drone') {
          ctx.globalAlpha *= .18;
          line(0, offY + s.gh * cellSize, 0, offY + s.gh * cellSize + 14, 1, C.green2);
          rect(-1, offY + s.gh * cellSize + 14, 3, 1, C.green2);
        }

        if (s.archetype === 'saucer' && Math.sin(now*.002+s.phase) > .36) {
          ctx.globalAlpha *= .16;
          path(C.cyan4,[['M',-6,offY+s.gh*cellSize],['L',6,offY+s.gh*cellSize],['L',11,offY+s.gh*cellSize+16],['L',-11,offY+s.gh*cellSize+16]]);
        }

        if (s.archetype === 'organic') {
          ctx.globalAlpha *= .20;
          line(offX - 5, 0, offX - 11, -3 + Math.sin(now*.003+s.phase)*2, 1, C.magenta);
          line(offX - 4, 2, offX - 10, 6 + Math.cos(now*.003+s.phase)*2, 1, C.green2);
        }

        if (s.routeName && s.routeName.includes('freight') && s.depth < .32) {
          ctx.globalAlpha *= .18;
          rect(offX - 7, -1, 5, 1, C.cyan4);
        }
        ctx.restore();
        ctx.globalAlpha = 1;
      }
    }

    function spawnCosmicEvent(now){
      const total = CosmicBrain.pool.reduce((s,e)=>s+e.w,0);
      let r = Math.random() * total, type = CosmicBrain.pool[0].type;
      for (const e of CosmicBrain.pool){ r -= e.w; if (r <= 0){ type = e.type; break; } }

      const ev = { type, start:now, seed:rnd(1,9999) };
      const fromLeft = Math.random() < .5;
      const accent = pick([C.cyan4, C.green2, C.magentaSoft, C.amber]);

      if (type === 'comet'){
        ev.dur = rnd(2600, 4400);
        ev.y0 = rnd(14, 90); ev.y1 = ev.y0 + rnd(30, 80);
        ev.x0 = fromLeft ? -20 : W + 20; ev.x1 = fromLeft ? W + 20 : -20;
        ev.color = accent;
      } else if (type === 'satellite'){
        ev.dur = rnd(7000, 12000);
        ev.y0 = rnd(16, 120); ev.y1 = ev.y0 + rnd(-18, 18);
        ev.x0 = fromLeft ? -10 : W + 10; ev.x1 = fromLeft ? W + 10 : -10;
        ev.blink = rnd(.006, .012);
      } else if (type === 'flash'){
        ev.dur = rnd(1400, 2300);
        ev.x = rnd(30, W - 30); ev.y = rnd(14, H - 40); ev.color = Math.random()<.6 ? C.white : accent;
      } else if (type === 'debris'){
        ev.dur = rnd(5200, 9000);
        const n = REDUCED ? 3 : rndInt(4, 7);
        ev.bits = Array.from({length:n}, (_,i)=>({
          x: fromLeft ? rnd(-30,-4) : rnd(W+4, W+30),
          y: rnd(20, H - 30),
          vx: (fromLeft ? 1 : -1) * rnd(6, 16),
          vy: rnd(-3, 3),
          s: rndInt(1, 3),
          rot: hash(i*9.1+ev.seed)
        }));
        ev.color = Math.random()<.5 ? C.cyan2 : C.green0;
      } else if (type === 'ripple'){
        ev.dur = rnd(2200, 3600);
        ev.x = rnd(40, W - 40); ev.y = rnd(20, H - 50); ev.color = accent;
      } else if (type === 'pulsar'){
        ev.dur = rnd(5000, 9000);
        ev.x = rnd(36, W - 36); ev.y = rnd(16, H - 60); ev.period = rnd(620, 1100); ev.color = accent;
      } else if (type === 'aurora'){
        ev.dur = rnd(7000, 13000);
        ev.y = rnd(20, 64); ev.amp = rnd(6, 16); ev.color = pick([C.green2, C.cyan4, C.magentaSoft]);
      } else if (type === 'meteorShower'){
        ev.dur = rnd(3000, 4600);
        const n = REDUCED ? 4 : rndInt(6, 10);
        ev.streaks = Array.from({length:n}, (_,i)=>({
          t: hash(i*5.7+ev.seed) * .7,
          x: rnd(W*.45, W - 10), y: rnd(8, 60),
          len: rnd(10, 22)
        }));
      } else if (type === 'riftGlow'){
        ev.dur = rnd(5000, 9000);
        ev.x = rnd(50, W - 50); ev.y = rnd(20, H - 50);
        ev.w = rnd(20, 50); ev.h = rnd(2, 5); ev.color = pick([C.magenta, C.cyan4, C.green1]);
      } else if (type === 'driftMoon'){
        ev.dur = rnd(24000, 42000);
        ev.r = rnd(10, 20);
        ev.y0 = rnd(20, 60); ev.y1 = ev.y0 + rnd(8, 26);
        ev.x0 = fromLeft ? -ev.r*2 : W + ev.r*2; ev.x1 = fromLeft ? W + ev.r*2 : -ev.r*2;
        ev.color = Math.random()<.5 ? C.cyan0 : C.hair0;
      }
      CosmicBrain.events.push(ev);
      AudioBrain.event(ev.type);
    }

    function updateCosmic(now){
      if (now > CosmicBrain.nextAt){
        spawnCosmicEvent(now);
        const lively = emotion.curiosity * .35 + (WorldBrain.time.isNight ? .25 : 0);
        CosmicBrain.nextAt = now + rnd(5000, 17000) * (1 - clamp(lively, 0, .55));
      }
      CosmicBrain.events = CosmicBrain.events.filter(e => now - e.start < e.dur);
    }

    function cosmicFade(e, now){
      const t = (now - e.start) / e.dur;
      return Math.sin(clamp(t, 0, 1) * Math.PI);
    }

    function drawCosmic(now){
      for (const e of CosmicBrain.events){
        const t = clamp((now - e.start) / e.dur, 0, 1);
        const fade = cosmicFade(e, now);

        if (e.type === 'comet'){
          const x = lerp(e.x0, e.x1, t), y = lerp(e.y0, e.y1, t);
          const dir = e.x1 > e.x0 ? -1 : 1;
          for (let i=0;i<10;i++){
            ctx.globalAlpha = fade * (1 - i/10) * .5;
            rect(x + dir*i*4, y + i*1.6, i<2?3:2, i<2?2:1, i<3 ? C.white : e.color);
          }
          ctx.globalAlpha = fade * .9; rect(x, y, 3, 3, C.white);

        } else if (e.type === 'satellite'){
          const x = lerp(e.x0, e.x1, t), y = lerp(e.y0, e.y1, t);
          const blink = .35 + .65 * (Math.sin(now * e.blink) > .2 ? 1 : .15);
          ctx.globalAlpha = fade * blink * .85; rect(x, y, 2, 2, C.white);
          ctx.globalAlpha = fade * .18; rect(x-3, y, 2, 1, C.cyan4);

        } else if (e.type === 'flash'){
          const ring = t * 26;
          ctx.globalAlpha = fade * .22;
          line(e.x-ring, e.y, e.x-ring+4, e.y, 1, e.color);
          line(e.x+ring-4, e.y, e.x+ring, e.y, 1, e.color);
          line(e.x, e.y-ring, e.x, e.y-ring+4, 1, e.color);
          line(e.x, e.y+ring-4, e.x, e.y+ring, 1, e.color);
          ctx.globalAlpha = fade * .95;
          rect(e.x-1, e.y-1, 3, 3, C.white);
          ctx.globalAlpha = 1;

        } else if (e.type === 'debris'){
          const dt2 = (now - e.start) / 1000;
          for (const b of e.bits){
            const bx = b.x + b.vx * dt2, by = b.y + b.vy * dt2 + Math.sin(now*.002 + b.rot*9) * 3;
            ctx.globalAlpha = fade * .5;
            rect(bx, by, b.s, b.s, e.color);
            if (b.s > 1){ ctx.globalAlpha = fade * .25; rect(bx+1, by+1, 1, 1, C.white); }
          }

        } else if (e.type === 'ripple'){
          for (let k=0;k<3;k++){
            const rr = (t*30) - k*9;
            if (rr <= 1) continue;
            ctx.globalAlpha = fade * .16 * (1 - k*.3);
            ctx.strokeStyle = e.color; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.ellipse(e.x, e.y, rr, rr*.72, 0, 0, Math.PI*2); ctx.stroke();
          }
          ctx.globalAlpha = 1;

        } else if (e.type === 'pulsar'){
          const beat = (now - e.start) % e.period / e.period;
          const rr = beat * 22;
          ctx.globalAlpha = fade * (1 - beat) * .22;
          ctx.strokeStyle = e.color; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.ellipse(e.x, e.y, rr, rr, 0, 0, Math.PI*2); ctx.stroke();
          ctx.globalAlpha = fade * (.4 + .6*(1-beat)) * .8; rect(e.x-1, e.y-1, 2, 2, C.white);
          ctx.globalAlpha = 1;

        } else if (e.type === 'aurora'){
          ctx.globalAlpha = fade * .10;
          for (let x=0; x<W; x+=4){
            const yy = e.y + Math.sin(x*.05 + now*.001 + e.seed) * e.amp + Math.sin(x*.013 + now*.0006) * e.amp*.5;
            rect(x, yy, 4, 3 + Math.sin(x*.08+now*.002)*2, e.color);
          }
          ctx.globalAlpha = 1;

        } else if (e.type === 'meteorShower'){
          for (const s of e.streaks){
            const lt = clamp((t - s.t) / .22, 0, 1);
            if (lt <= 0 || lt >= 1) continue;
            const x = s.x - lt * 60, y = s.y + lt * 40;
            const a = Math.sin(lt * Math.PI);
            ctx.globalAlpha = a * .7;
            line(x, y, x + s.len*.5, y - s.len*.4, 1, C.white);
            ctx.globalAlpha = a * .3;
            line(x + s.len*.5, y - s.len*.4, x + s.len, y - s.len*.8, 1, C.cyan4);
          }
          ctx.globalAlpha = 1;

        } else if (e.type === 'riftGlow'){
          const pulse = .5 + .5*Math.sin(now*.003 + e.seed);
          ctx.globalAlpha = fade * (.12 + pulse*.06);
          ellipse(e.x, e.y, e.w, e.h, e.color);
          ctx.globalAlpha = fade * .5;
          rect(e.x-1, e.y-1, 2, 2, C.white);
          ctx.globalAlpha = 1;

        } else if (e.type === 'driftMoon'){
          const x = lerp(e.x0, e.x1, t), y = lerp(e.y0, e.y1, t);
          ctx.globalAlpha = fade * .14; ellipse(x, y, e.r+4, e.r+4, e.color);
          ctx.globalAlpha = fade * .5; ellipse(x, y, e.r, e.r, e.color);
          ctx.globalAlpha = fade * .6;
          ellipse(x - e.r*.3, y - e.r*.25, e.r*.3, e.r*.3, C.ink);
          ellipse(x + e.r*.35, y + e.r*.2, e.r*.22, e.r*.22, C.ink);
          ctx.globalAlpha = 1;
        }
        ctx.globalAlpha = 1;
      }
    }

    function drawShootingStar(now){
      const e = bgEvents.star; if (!e.active) return;
      const t = clamp((now-e.start)/e.duration,0,1);
      const x = lerp(e.x0,e.x1,t), y=lerp(e.y0,e.y1,t), a=(1-t)*.9+.1;

      const e = bgEvents.signal; if (!e.active) return;
      const t = clamp((now-e.start)/e.duration,0,1);

      ctx.globalAlpha = a*.32;

      line(e.x-r,e.y,e.x-r/2,e.y,1,C.cyan4);

    function drawWeatherBack(now){
      const v = WorldBrain.weather.visual;
      // Wolken worden nu getekend in drawBackground (dag/nacht-bewust).
      if (v.fog > .03) {
        const veils = REDUCED ? 2 : 3;
        for (let i=0;i<veils;i++) {
          const seed = i * 71.3 + 9.1;
          const drift = now * .0012 * (i % 2 ? 1 : -1);
          const px = mod(hash(seed) * W * 1.4 + drift * 40, W * 1.4) - W * .2;
          const py = 40 + i * 56 + Math.sin(now * .0006 + i * 1.7) * 8;
          ctx.globalAlpha = v.fog * (.07 + i * .015);
          ellipse(px, py, 90 + i * 22, 22 + i * 4, i % 2 ? C.fog : C.cyan4);
        }
        ctx.globalAlpha = 1;
      }
      if (v.heat > .04) {
        ctx.globalAlpha = v.heat * .07;
        rect(0,0,W,H,C.amber);
        ctx.globalAlpha = 1;
      }
      if (v.cold > .04) {
        ctx.globalAlpha = v.cold * .06;
        rect(0,0,W,H,C.cyan4);
        ctx.globalAlpha = 1;
      }
    }

    function drawWeatherFront(now){
      const v = WorldBrain.weather.visual;
      if (v.rain > .03) {
        ctx.globalAlpha = v.rain * .48;
        const rn = REDUCED ? 14 : Math.floor(rainDrops.length * .78);
        for (let i=0;i<rn;i++) {
          const d = rainDrops[i];
          const x = (d.x + now*.032*v.wind*d.s) % W;
          const y = (d.y + now*.085*d.s) % H;
          const foreground = i % 5 === 0;
          line(x,y,x-3-v.wind*(foreground?7:5),y+(foreground?10:7),foreground?2:1,C.cyan4);
        }
        ctx.globalAlpha = 1;
      }
      if (v.snow > .03) {
        ctx.globalAlpha = v.snow * .58;
        const sn = REDUCED ? 12 : Math.floor(snowFlakes.length * .82);
        for (let i=0;i<sn;i++) {
          const f = snowFlakes[i];
          const x = (f.x + Math.sin(now*.001+f.p)*8 + W) % W;
          const y = (f.y + now*.018*f.s) % H;
          rect(x,y,f.s>1.2?2:1,f.s>1.2?2:1,C.white);
        }
        ctx.globalAlpha = 1;
      }
      if (v.fog > .10) {
        ctx.globalAlpha = v.fog * .06;
        const fx = mod(now * .0009, W * 1.3) - W * .15;
        ellipse(fx, 168, 130, 30, C.fog);
        ellipse(W - fx * .6, 188, 110, 24, C.cyan4);
        ctx.globalAlpha = 1;
      }
      if (v.storm > .05 && hash(Math.floor(now/220)) > .975) {
        ctx.globalAlpha = v.storm * .22;
        rect(0,0,W,H,C.white);
        ctx.globalAlpha = 1;
      }
    }

    function getVisitorPalette(archetype){
      return {

        astronaut: { dark:C.cyan1,    light:C.white,    accent:C.cyan3,    skin:C.fog,    suit:C.fog,     visor:C.cyan2  },
        athlete:   { dark:'#1a1a30', light:C.white,    accent:C.red,      skin:'#c8a870', jersey:C.red   },
        android:   { dark:C.black,    light:C.cyan4,    accent:C.green2,   skin:C.black,  body:C.cyan0   },
        soldier:   { dark:'#1a2a1a', light:'#8a9c66', accent:'#6aaa44',  skin:'#9aaa88', body:'#3a4a3a' },

        ghost:     { dark:C.black,    light:C.white,    accent:C.cyan4,    skin:C.white,  body:C.white   },

      }[archetype] || { dark:C.cyan0, light:C.cyan4, accent:C.green1, skin:C.cyan1 };
    }

    function drawVisitor(now){
      const V = VisitorBrain;

      ctx.imageSmoothingEnabled = false;

      const arch=V.archetype;

        sa(.80); ellipse(vx,vy-47,7,7,c.skin);
        sa(.88); path(c.dark,[['M',vx-9,vy-46],['L',vx-8,vy-52],['L',vx+8,vy-52],['L',vx+9,vy-46]]);
        sa(.45); line(vx+f*9,vy-38,vx+f*14,vy-30,2,c.accent);
